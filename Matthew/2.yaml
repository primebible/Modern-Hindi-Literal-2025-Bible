- book: "मत्ती"
  chapter: 2
  verses:
    - verse: 1
      text: "राजा हेरोदेस के समय, जब यीशु का जन्म यहूदिया के बैतलहम में हुआ, तब देखो, पूर्व दिशा से कुछ ज्ञानी पुरुष यरूशलेम आए।"
    - verse: 2
      text: "वे पूछने लगे, \"यहूदियों का नवजात राजा कहाँ है? क्योंकि हमने उसके तारे को उदय होते देखा है और उसकी आराधना करने आए हैं।\""
    - verse: 3
      text: "यह सुनकर राजा हेरोदेस व्याकुल हो उठा, और उसके साथ सारा यरूशलेम भी व्याकुल हो उठा।"
    - verse: 4
      text: "उसने लोगों के सभी प्रधान याजकों और शास्त्रियों को इकट्ठा करके उनसे पूछा कि मसीह का जन्म कहाँ होना था।"
    - verse: 5
      text: "उन्होंने उससे कहा, \"यहूदिया के बैतलहम में, क्योंकि भविष्यवक्ता के द्वारा ऐसा लिखा गया है:"
    - verse: 6
      text: "और हे बैतलहम, तू जो यहूदा की भूमि में है, तू यहूदा के शासकों में किसी भी तरह सबसे छोटा नहीं है; क्योंकि तुझमें से एक शासक निकलेगा, जो मेरी प्रजा इस्राएल की चरवाही करेगा।\""
    - verse: 7
      text: "तब हेरोदेस ने उन ज्ञानी पुरुषों को गुप्त रूप से बुलाकर उनसे ठीक-ठीक पता लगाया कि तारा कब दिखाई दिया था।"
    - verse: 8
      text: "फिर उसने उन्हें बैतलहम भेजा और कहा, \"जाओ और बालक को ध्यान से ढूँढ़ो। जब वह मिल जाए, तो मुझे बता देना, ताकि मैं भी जाकर उसकी आराधना करूँ।\""
    - verse: 9
      text: "राजा की बात सुनकर वे चल दिए। और देखो, जिस तारे को उन्होंने उदय होते देखा था, वह उनके आगे-आगे चलता रहा और उस जगह के ऊपर आकर ठहर गया जहाँ बालक था।"
    - verse: 10
      text: "तारे को देखकर वे अपार आनंद से भर गए।"
    - verse: 11
      text: "घर में जाकर उन्होंने बालक को उसकी माँ मरियम के साथ देखा। वे उसके सामने भूमि पर झुक गए और उसकी आराधना की। फिर उन्होंने अपने खजाने खोलकर उसे सोना, लोबान और गंधरस भेंट किए।"
    - verse: 12
      text: "स्वप्न में हेरोदेस के पास न लौटने की चेतावनी मिलने पर वे दूसरे रास्ते से अपने देश लौट गए।"
    - verse: 13
      text: "उनके चले जाने के बाद, देखो, प्रभु का एक दूत यूसुफ को स्वप्न में दिखाई दिया और कहा, \"उठो, बालक और उसकी माँ को लेकर मिस्र भाग जाओ। वहाँ तब तक रहो जब तक मैं न कहूँ, क्योंकि हेरोदेस बालक को ढूँढ़ेगा, ताकि उसे मार डाले।\""
    - verse: 14
      text: "यूसुफ उठा और उसी रात बालक और उसकी माँ को लेकर मिस्र चला गया।"
    - verse: 15
      text: "वह हेरोदेस की मृत्यु तक वहीं रहा। यह इसलिए हुआ कि प्रभु ने भविष्यवक्ता के द्वारा जो कहा था, वह पूरा हो: \"मिस्र से मैंने अपने पुत्र को बुलाया।\""
    - verse: 16
      text: "जब हेरोदेस समझ गया कि ज्ञानी पुरुषों ने उसे धोखा दिया है, तो वह बहुत क्रोधित हुआ। उसने उनसे तारे के दिखाई देने का जो समय ठीक-ठीक पता लगाया था, उसके आधार पर बैतलहम और उसके आसपास के पूरे क्षेत्र में दो वर्ष या उससे कम उम्र के सभी बालकों को मरवा दिया।"
    - verse: 17
      text: "तब भविष्यवक्ता यिर्मयाह के द्वारा कही गई यह बात पूरी हुई:"
    - verse: 18
      text: "\"रामाह में एक आवाज सुनाई दी: रोने और ज़ोर से विलाप करने की आवाज। राहेल अपने बच्चों के लिए रो रही थी; वह सांत्वना पाने को तैयार नहीं थी, क्योंकि वे नहीं रहे।\""
    - verse: 19
      text: "हेरोदेस की मृत्यु के बाद, देखो, प्रभु का एक दूत मिस्र में यूसुफ को स्वप्न में दिखाई दिया,"
    - verse: 20
      text: "और कहा, \"उठो, बालक और उसकी माँ को लेकर इस्राएल की भूमि में जाओ, क्योंकि जो लोग बालक की जान लेना चाहते थे, वे मर चुके हैं।\""
    - verse: 21
      text: "यूसुफ उठा और बालक और उसकी माँ को लेकर इस्राएल की भूमि में आया।"
    - verse: 22
      text: "परन्तु जब यूसुफ ने सुना कि अरखेलाउस अपने पिता हेरोदेस की जगह यहूदिया पर राज्य कर रहा है, तो वह वहाँ जाने से डर गया। स्वप्न में चेतावनी मिलने पर वह गलील के प्रदेश में चला गया।"
    - verse: 23
      text: "वहाँ जाकर वह नासरत नाम के नगर में बस गया, ताकि भविष्यवक्ताओं के द्वारा कही गई यह बात पूरी हो: \"वह नासरी कहलाएगा।\""
