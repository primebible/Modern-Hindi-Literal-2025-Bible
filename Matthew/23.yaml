- book: "मत्ती"
  chapter: 23
  verses:
    - verse: 1
      text: "तब यीशु ने भीड़ और अपने चेलों से कहा:"
    - verse: 2
      text: "\"शास्त्री और फरीसी मूसा की गद्दी पर बैठे हैं।"
    - verse: 3
      text: "इसलिए वे तुमसे जो कुछ कहें, वह करो और उसका पालन करो; लेकिन उनके कामों के अनुसार मत करो, क्योंकि वे कहते तो हैं, पर करते नहीं।"
    - verse: 4
      text: "वे भारी बोझ बाँधकर लोगों के कंधों पर रखते हैं, लेकिन स्वयं अपनी उँगली से भी उन्हें हिलाना नहीं चाहते।"
    - verse: 5
      text: "वे अपने सभी काम लोगों को दिखाने के लिए करते हैं। वे अपने तावीज़ों को चौड़ा और अपने वस्त्रों के किनारों की लटकनों को लंबा करते हैं।"
    - verse: 6
      text: "उन्हें भोजों में सबसे सम्मानित स्थान और सभाघरों में सबसे आगे के आसन पसंद हैं,"
    - verse: 7
      text: "और बाजारों में अभिवादन तथा लोगों से रब्बी कहलाना भी उन्हें पसंद है।"
    - verse: 8
      text: "लेकिन तुम रब्बी न कहलाओ, क्योंकि तुम्हारा शिक्षक एक ही है और तुम सब भाई हो।"
    - verse: 9
      text: "पृथ्वी पर किसी को अपना पिता न कहो, क्योंकि तुम्हारा एक ही पिता है, स्वर्गीय पिता।"
    - verse: 10
      text: "और तुम मार्गदर्शक भी न कहलाओ, क्योंकि तुम्हारा मार्गदर्शक एक ही है, मसीह।"
    - verse: 11
      text: "तुममें जो बड़ा है, वह तुम्हारा सेवक होगा।"
    - verse: 12
      text: "जो अपने आपको ऊँचा करेगा, वह दीन किया जाएगा, और जो अपने आपको दीन करेगा, वह ऊँचा किया जाएगा।\""
    - verse: 13
      text: "\"हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि तुम लोगों के सामने स्वर्ग का राज्य बंद कर देते हो। तुम स्वयं प्रवेश नहीं करते और प्रवेश करने वालों को भी प्रवेश नहीं करने देते।"
    - verse: 15
      text: "हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि एक व्यक्ति को धर्मांतरित करने के लिए तुम सागर और स्थल का चक्कर लगाते हो; और जब वह धर्मांतरित हो जाता है, तो उसे अपने से दुगना नरक का पुत्र बना देते हो।"
    - verse: 16
      text: "हाय तुम पर, अंधे मार्गदर्शको! तुम कहते हो, 'यदि कोई मंदिर की शपथ खाए, तो वह बाध्य नहीं है; लेकिन यदि कोई मंदिर के सोने की शपथ खाए, तो वह बँध जाता है।'"
    - verse: 17
      text: "मूर्खो और अंधो! कौन बड़ा है: सोना या मंदिर, जिसने सोने को पवित्र ठहराया?"
    - verse: 18
      text: "और तुम कहते हो, 'यदि कोई वेदी की शपथ खाए, तो वह बाध्य नहीं है; लेकिन यदि कोई उस पर रखी भेंट की शपथ खाए, तो वह बँध जाता है।'"
    - verse: 19
      text: "अंधो! कौन बड़ा है: भेंट या वेदी, जो भेंट को पवित्र ठहराती है?"
    - verse: 20
      text: "इसलिए जो वेदी की शपथ खाता है, वह उसकी और उस पर रखी हर वस्तु की शपथ खाता है।"
    - verse: 21
      text: "और जो मंदिर की शपथ खाता है, वह उसकी और उसमें वास करने वाले की शपथ खाता है।"
    - verse: 22
      text: "और जो स्वर्ग की शपथ खाता है, वह परमेश्वर के सिंहासन और उस पर बैठने वाले की शपथ खाता है।"
    - verse: 23
      text: "हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि तुम पुदीने, सोआ और जीरे का दशमांश देते हो, लेकिन व्यवस्था की अधिक महत्वपूर्ण बातों को छोड़ देते हो: न्याय, दया और विश्वासयोग्यता। इन्हें करना आवश्यक था और उन्हें भी नहीं छोड़ना चाहिए था।"
    - verse: 24
      text: "अंधे मार्गदर्शको! तुम मच्छर छानते हो और ऊँट निगल जाते हो!"
    - verse: 25
      text: "हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि तुम प्याले और थाल के बाहरी भाग को साफ करते हो, लेकिन भीतर वे लूट और असंयम से भरे हैं।"
    - verse: 26
      text: "अंधे फरीसी! पहले प्याले और थाल के भीतर को साफ कर, ताकि बाहर का भाग भी साफ हो जाए।"
    - verse: 27
      text: "हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि तुम चूना पुती हुई कब्रों के समान हो, जो बाहर से सुंदर दिखाई देती हैं, लेकिन भीतर मृतकों की हड्डियों और हर प्रकार की अशुद्धता से भरी हैं।"
    - verse: 28
      text: "इसी प्रकार तुम भी बाहर से लोगों को धर्मी दिखाई देते हो, लेकिन भीतर कपट और अधर्म से भरे हो।"
    - verse: 29
      text: "हाय तुम पर, शास्त्रियो और फरीसियो, कपटियो! क्योंकि तुम भविष्यवक्ताओं की कब्रें बनाते और धर्मियों की समाधियाँ सजाते हो,"
    - verse: 30
      text: "और कहते हो, 'यदि हम अपने पूर्वजों के दिनों में होते, तो भविष्यवक्ताओं का लहू बहाने में उनके सहभागी न होते।'"
    - verse: 31
      text: "इस तरह तुम अपने ही विरुद्ध गवाही देते हो कि तुम भविष्यवक्ताओं की हत्या करने वालों के पुत्र हो।"
    - verse: 32
      text: "तो तुम भी अपने पूर्वजों का माप पूरा कर दो!"
    - verse: 33
      text: "साँपो, विषधरों की संतान! तुम नरक के दंड से कैसे बचोगे?"
    - verse: 34
      text: "इसलिए देखो, मैं तुम्हारे पास भविष्यवक्ताओं, ज्ञानियों और शास्त्रियों को भेजता हूँ। उनमें से कुछ को तुम मार डालोगे और क्रूस पर चढ़ाओगे, और कुछ को अपने सभाघरों में कोड़े मारोगे और नगर-नगर सताओगे,"
    - verse: 35
      text: "ताकि पृथ्वी पर बहाया गया धर्मियों का सारा लहू तुम पर आए, धर्मी हाबिल के लहू से लेकर बरकिय्याह के पुत्र जकरिय्याह के लहू तक, जिसे तुमने मंदिर के पवित्र भवन और वेदी के बीच मार डाला।"
    - verse: 36
      text: "मैं तुमसे सच कहता हूँ: यह सब इसी पीढ़ी पर आएगा।"
    - verse: 37
      text: "यरूशलेम, यरूशलेम! तू जो भविष्यवक्ताओं को मार डालती और अपने पास भेजे गए लोगों को पत्थरों से मारती है! कितनी बार मैंने तेरे बच्चों को इकट्ठा करना चाहा, जैसे मुर्गी अपने चूजों को अपने पंखों के नीचे इकट्ठा करती है, लेकिन तुम लोगों ने नहीं चाहा!"
    - verse: 38
      text: "देखो, तुम्हारा घर तुम्हारे लिए उजाड़ छोड़ा जा रहा है।"
    - verse: 39
      text: "क्योंकि मैं तुमसे कहता हूँ: अब से तुम मुझे निश्चय ही नहीं देखोगे, जब तक तुम यह न कहो, 'धन्य है वह जो प्रभु के नाम से आता है।'\""
