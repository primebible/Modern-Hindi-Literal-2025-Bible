- book: "मत्ती"
  chapter: 11
  verses:
    - verse: 1
      text: "जब यीशु अपने बारह चेलों को आदेश दे चुका, तो वह वहाँ से उनके नगरों में शिक्षा देने और प्रचार करने चला गया।"
    - verse: 2
      text: "जब यूहन्ना ने जेल में मसीह के कामों के बारे में सुना, तो उसने अपने चेलों को उसके पास भेजा"
    - verse: 3
      text: "और उनसे कहलवाया, \"क्या आप वही हैं जो आने वाले थे, या हम किसी और की प्रतीक्षा करें?\""
    - verse: 4
      text: "यीशु ने उन्हें उत्तर दिया, \"जाओ और जो कुछ तुम सुन और देख रहे हो, वह यूहन्ना को बता दो:"
    - verse: 5
      text: "अंधे देखने लगते हैं, लंगड़े चलते हैं, कुष्ठ रोगी शुद्ध किए जाते हैं, बहरे सुनते हैं, मरे हुए जिलाए जाते हैं और गरीबों को सुसमाचार सुनाया जाता है।"
    - verse: 6
      text: "और धन्य है वह जो मेरे कारण ठोकर नहीं खाता।\""
    - verse: 7
      text: "जब वे जा रहे थे, तो यीशु यूहन्ना के विषय में भीड़ से कहने लगा, \"तुम निर्जन प्रदेश में क्या देखने गए थे? हवा से हिलते हुए सरकंडे को?"
    - verse: 8
      text: "तो फिर तुम क्या देखने गए थे? मुलायम कपड़े पहने किसी व्यक्ति को? देखो, मुलायम कपड़े पहनने वाले राजाओं के घरों में रहते हैं।"
    - verse: 9
      text: "तो फिर तुम क्या देखने गए थे? किसी भविष्यवक्ता को? हाँ, मैं तुमसे कहता हूँ, भविष्यवक्ता से भी बढ़कर।"
    - verse: 10
      text: "यह वही है जिसके बारे में लिखा है: 'देखो, मैं अपने दूत को तुम्हारे आगे भेजता हूँ, जो तुम्हारे सामने तुम्हारा मार्ग तैयार करेगा।'"
    - verse: 11
      text: "मैं तुमसे सच कहता हूँ: स्त्रियों से जन्म लेने वालों में बपतिस्मा देने वाले यूहन्ना से बड़ा कोई नहीं हुआ; फिर भी स्वर्ग के राज्य में जो सबसे छोटा है, वह उससे बड़ा है।"
    - verse: 12
      text: "बपतिस्मा देने वाले यूहन्ना के दिनों से अब तक स्वर्ग का राज्य हिंसा सहता आया है, और हिंसक लोग उसे बलपूर्वक छीनते हैं।"
    - verse: 13
      text: "क्योंकि सभी भविष्यवक्ताओं और व्यवस्था ने यूहन्ना तक भविष्यवाणी की।"
    - verse: 14
      text: "और यदि तुम इसे स्वीकार करना चाहो, तो यही वह एलिय्याह है जो आने वाला था।"
    - verse: 15
      text: "जिसके कान हों, वह सुन ले।"
    - verse: 16
      text: "पर मैं इस पीढ़ी की तुलना किससे करूँ? यह उन बच्चों के समान है जो बाजारों में बैठकर दूसरे बच्चों को पुकारते हैं"
    - verse: 17
      text: "और कहते हैं, 'हमने तुम्हारे लिए बाँसुरी बजाई, लेकिन तुम नहीं नाचे; हमने विलाप किया, लेकिन तुमने छाती नहीं पीटी।'"
    - verse: 18
      text: "क्योंकि यूहन्ना आया, जो न खाता था न पीता था, और लोग कहते हैं, 'उसमें दुष्टात्मा है।'"
    - verse: 19
      text: "मनुष्य का पुत्र खाता-पीता आया, और लोग कहते हैं, 'देखो, यह आदमी पेटू और पियक्कड़ है, चुंगी लेने वालों और पापियों का मित्र!' फिर भी बुद्धि अपने कामों से धर्मी ठहराई गई है।\""
    - verse: 20
      text: "तब यीशु उन नगरों को धिक्कारने लगा जिनमें उसके अधिकतर सामर्थ्य के काम हुए थे, क्योंकि उन्होंने पश्चाताप नहीं किया था।"
    - verse: 21
      text: "\"हाय तुझ पर, खुराजीन! हाय तुझ पर, बैतसैदा! क्योंकि जो सामर्थ्य के काम तुममें हुए, यदि वे सोर और सैदा में हुए होते, तो वे कब के टाट पहनकर और राख में बैठकर पश्चाताप कर चुके होते।"
    - verse: 22
      text: "पर मैं तुमसे कहता हूँ: न्याय के दिन तुम्हारी दशा से सोर और सैदा की दशा अधिक सहने योग्य होगी।"
    - verse: 23
      text: "और तू, कफरनहूम, क्या तू स्वर्ग तक ऊँचा किया जाएगा? तू अधोलोक तक नीचे उतरेगा; क्योंकि जो सामर्थ्य के काम तुझमें हुए, यदि वे सदोम में हुए होते, तो वह आज तक बना रहता।"
    - verse: 24
      text: "पर मैं तुमसे कहता हूँ: न्याय के दिन तेरी दशा से सदोम की भूमि की दशा अधिक सहने योग्य होगी।\""
    - verse: 25
      text: "उस समय यीशु ने कहा, \"हे पिता, स्वर्ग और पृथ्वी के प्रभु, मैं आपका धन्यवाद करता हूँ कि आपने इन बातों को ज्ञानियों और समझदारों से छिपाया और बालकों पर प्रकट किया।"
    - verse: 26
      text: "हाँ, हे पिता, क्योंकि आपको यही अच्छा लगा।"
    - verse: 27
      text: "सब कुछ मेरे पिता ने मुझे सौंप दिया है। पिता के सिवाय कोई पुत्र को नहीं जानता; और कोई पिता को नहीं जानता, सिवाय पुत्र के और उस व्यक्ति के, जिसे पुत्र पिता को प्रकट करना चाहे।"
    - verse: 28
      text: "तुम सब, जो मेहनत करते-करते थक गए हो और बोझ से दबे हो, मेरे पास आओ; मैं तुम्हें विश्राम दूँगा।"
    - verse: 29
      text: "मेरा जूआ अपने ऊपर उठा लो और मुझसे सीखो, क्योंकि मैं नम्र और हृदय में दीन हूँ; और तुम अपने प्राणों के लिए विश्राम पाओगे।"
    - verse: 30
      text: "क्योंकि मेरा जूआ सुखद है और मेरा बोझ हल्का है।\""
