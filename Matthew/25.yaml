- book: "मत्ती"
  chapter: 25
  verses:
    - verse: 1
      text: "\"तब स्वर्ग का राज्य उन दस कन्याओं के समान होगा, जो अपने दीपक लेकर दूल्हे से मिलने निकलीं।"
    - verse: 2
      text: "उनमें पाँच मूर्ख और पाँच बुद्धिमान थीं।"
    - verse: 3
      text: "मूर्ख कन्याओं ने अपने दीपक तो ले लिए, लेकिन अपने साथ तेल नहीं लिया।"
    - verse: 4
      text: "बुद्धिमान कन्याओं ने अपने दीपकों के साथ पात्रों में तेल भी लिया।"
    - verse: 5
      text: "दूल्हे के देर करने पर वे सब ऊँघने लगीं और सो गईं।"
    - verse: 6
      text: "आधी रात को पुकार हुई, 'देखो, दूल्हा! उससे मिलने बाहर निकलो!'"
    - verse: 7
      text: "तब वे सभी कन्याएँ उठीं और अपने दीपक तैयार किए।"
    - verse: 8
      text: "मूर्ख कन्याओं ने बुद्धिमान कन्याओं से कहा, 'अपने तेल में से कुछ हमें दे दो, क्योंकि हमारे दीपक बुझ रहे हैं।'"
    - verse: 9
      text: "बुद्धिमान कन्याओं ने उत्तर दिया, 'कहीं हमारे और तुम्हारे लिए तेल पर्याप्त न पड़े। बेहतर है, बेचने वालों के पास जाओ और अपने लिए खरीद लो।'"
    - verse: 10
      text: "जब वे तेल खरीदने जा रही थीं, तब दूल्हा आ पहुँचा। जो तैयार थीं, वे उसके साथ विवाह-भोज में चली गईं, और द्वार बंद कर दिया गया।"
    - verse: 11
      text: "बाद में बाकी कन्याएँ भी आईं और कहने लगीं, 'प्रभु, प्रभु, हमारे लिए खोलिए!'"
    - verse: 12
      text: "उसने उत्तर दिया, 'मैं तुमसे सच कहता हूँ, मैं तुम्हें नहीं जानता।'"
    - verse: 13
      text: "इसलिए जागते रहो, क्योंकि तुम न दिन जानते हो, न घड़ी।\""
    - verse: 14
      text: "\"क्योंकि यह उस व्यक्ति के समान है, जो परदेस जाते समय अपने दासों को बुलाकर अपनी संपत्ति उन्हें सौंप गया।"
    - verse: 15
      text: "उसने एक को पाँच तोड़े, दूसरे को दो और तीसरे को एक, हर एक को उसकी क्षमता के अनुसार दिए; फिर वह परदेस चला गया।"
    - verse: 16
      text: "जिसे पाँच तोड़े मिले थे, उसने तुरंत जाकर उनसे व्यापार किया और पाँच तोड़े और कमाए।"
    - verse: 17
      text: "उसी प्रकार जिसे दो मिले थे, उसने भी दो तोड़े और कमाए।"
    - verse: 18
      text: "लेकिन जिसे एक मिला था, उसने जाकर जमीन खोदी और अपने स्वामी का धन छिपा दिया।"
    - verse: 19
      text: "बहुत समय बाद उन दासों का स्वामी आया और उनसे हिसाब किया।"
    - verse: 20
      text: "जिसे पाँच तोड़े मिले थे, वह पाँच और तोड़े लेकर आया और बोला, 'स्वामी, आपने मुझे पाँच तोड़े सौंपे थे; देखिए, मैंने पाँच और कमाए हैं।'"
    - verse: 21
      text: "उसके स्वामी ने उससे कहा, 'शाबाश, अच्छे और विश्वासयोग्य दास! तुम थोड़ी चीजों पर विश्वासयोग्य रहे; मैं तुम्हें बहुत सी चीजों पर नियुक्त करूँगा। अपने स्वामी के आनंद में प्रवेश करो।'"
    - verse: 22
      text: "जिसे दो तोड़े मिले थे, वह भी आया और बोला, 'स्वामी, आपने मुझे दो तोड़े सौंपे थे; देखिए, मैंने दो और कमाए हैं।'"
    - verse: 23
      text: "उसके स्वामी ने उससे कहा, 'शाबाश, अच्छे और विश्वासयोग्य दास! तुम थोड़ी चीजों पर विश्वासयोग्य रहे; मैं तुम्हें बहुत सी चीजों पर नियुक्त करूँगा। अपने स्वामी के आनंद में प्रवेश करो।'"
    - verse: 24
      text: "फिर जिसे एक तोड़ा मिला था, वह आया और बोला, 'स्वामी, मैं जानता था कि आप कठोर व्यक्ति हैं: जहाँ आपने नहीं बोया, वहाँ काटते हैं, और जहाँ आपने नहीं बिखेरा, वहाँ से बटोरते हैं।"
    - verse: 25
      text: "इसलिए मैं डर गया और जाकर आपका तोड़ा जमीन में छिपा दिया। देखिए, जो आपका है, वह यहाँ है।'"
    - verse: 26
      text: "उसके स्वामी ने उत्तर दिया, 'दुष्ट और आलसी दास! तो तुम जानते थे कि मैं जहाँ नहीं बोता वहाँ काटता हूँ और जहाँ नहीं बिखेरता वहाँ से बटोरता हूँ?"
    - verse: 27
      text: "तुम्हें मेरा धन साहूकारों के पास जमा करना चाहिए था; तब लौटकर मैं अपना धन ब्याज समेत पा लेता।'"
    - verse: 28
      text: "इसलिए उससे वह तोड़ा ले लो और उसे दे दो जिसके पास दस तोड़े हैं।"
    - verse: 29
      text: "क्योंकि जिस किसी के पास है, उसे और दिया जाएगा और उसके पास बहुत हो जाएगा; लेकिन जिसके पास नहीं है, उससे वह भी ले लिया जाएगा जो उसके पास है।"
    - verse: 30
      text: "और उस निकम्मे दास को बाहरी अंधकार में फेंक दो; वहाँ रोना और दाँत पीसना होगा।\""
    - verse: 31
      text: "\"जब मनुष्य का पुत्र अपनी महिमा में आएगा और सभी स्वर्गदूत उसके साथ होंगे, तब वह अपनी महिमा के सिंहासन पर बैठेगा।"
    - verse: 32
      text: "सभी राष्ट्र उसके सामने इकट्ठे किए जाएँगे, और वह उन्हें एक-दूसरे से अलग करेगा, जैसे चरवाहा भेड़ों को बकरियों से अलग करता है।"
    - verse: 33
      text: "वह भेड़ों को अपने दाहिने और बकरियों को बाएँ खड़ा करेगा।"
    - verse: 34
      text: "तब राजा अपने दाहिने खड़े लोगों से कहेगा, 'मेरे पिता से आशीष पाए लोगो, आओ। उस राज्य को विरासत में पाओ, जो सृष्टि की नींव डाले जाने से तुम्हारे लिए तैयार किया गया है।"
    - verse: 35
      text: "क्योंकि मैं भूखा था और तुमने मुझे खाने को दिया; प्यासा था और तुमने मुझे पानी पिलाया; अजनबी था और तुमने मुझे अपने यहाँ जगह दी;"
    - verse: 36
      text: "नंगा था और तुमने मुझे कपड़े पहनाए; बीमार था और तुम मुझसे मिलने आए; जेल में था और तुम मेरे पास आए।'"
    - verse: 37
      text: "तब धर्मी उसे उत्तर देंगे, 'प्रभु, हमने आपको कब भूखा देखा और खिलाया, या प्यासा देखा और पानी पिलाया?"
    - verse: 38
      text: "हमने आपको कब अजनबी देखा और अपने यहाँ जगह दी, या नंगा देखा और कपड़े पहनाए?"
    - verse: 39
      text: "हमने आपको कब बीमार या जेल में देखा और आपके पास आए?'"
    - verse: 40
      text: "राजा उन्हें उत्तर देगा, 'मैं तुमसे सच कहता हूँ: तुमने मेरे इन सबसे छोटे भाइयों में से किसी एक के लिए जो किया, वह मेरे लिए किया।'"
    - verse: 41
      text: "फिर वह बाएँ खड़े लोगों से कहेगा, 'मुझसे दूर हो जाओ, शापित लोगो, उस अनंत आग में जो इब्लीस और उसके दूतों के लिए तैयार की गई है।"
    - verse: 42
      text: "क्योंकि मैं भूखा था और तुमने मुझे खाने को नहीं दिया; प्यासा था और तुमने मुझे पानी नहीं पिलाया;"
    - verse: 43
      text: "मैं अजनबी था और तुमने मुझे अपने यहाँ जगह नहीं दी; नंगा था और तुमने मुझे कपड़े नहीं पहनाए; बीमार और जेल में था और तुम मुझसे मिलने नहीं आए।'"
    - verse: 44
      text: "तब वे भी उत्तर देंगे, 'प्रभु, हमने आपको कब भूखा, प्यासा, अजनबी, नंगा, बीमार या जेल में देखा और आपकी सेवा नहीं की?'"
    - verse: 45
      text: "तब वह उन्हें उत्तर देगा, 'मैं तुमसे सच कहता हूँ: जब तुमने इन सबसे छोटे लोगों में से किसी एक के लिए यह नहीं किया, तो मेरे लिए भी नहीं किया।'"
    - verse: 46
      text: "ये लोग अनंत दंड में चले जाएँगे, लेकिन धर्मी अनंत जीवन में।\""
