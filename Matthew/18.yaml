- book: "मत्ती"
  chapter: 18
  verses:
    - verse: 1
      text: "उसी समय चेले यीशु के पास आए और पूछा, \"स्वर्ग के राज्य में सबसे बड़ा कौन है?\""
    - verse: 2
      text: "उसने एक बच्चे को पास बुलाकर उनके बीच खड़ा किया"
    - verse: 3
      text: "और कहा, \"मैं तुमसे सच कहता हूँ: यदि तुम न बदलो और बच्चों के समान न बनो, तो तुम स्वर्ग के राज्य में निश्चय ही प्रवेश नहीं करोगे।"
    - verse: 4
      text: "इसलिए जो अपने आपको इस बच्चे के समान दीन बनाएगा, वही स्वर्ग के राज्य में सबसे बड़ा है।"
    - verse: 5
      text: "और जो मेरे नाम पर ऐसे एक बच्चे को ग्रहण करता है, वह मुझे ग्रहण करता है।"
    - verse: 6
      text: "लेकिन जो मुझ पर विश्वास करने वाले इन छोटों में से किसी एक को ठोकर खिलाए, उसके लिए भला होता कि गधे से चलने वाली चक्की का पाट उसके गले में लटका दिया जाता और उसे सागर की गहराई में डुबो दिया जाता।"
    - verse: 7
      text: "ठोकर के कारणों से संसार पर हाय! ठोकर के कारणों का आना आवश्यक है, लेकिन उस व्यक्ति पर हाय जिसके द्वारा ठोकर का कारण आता है!"
    - verse: 8
      text: "यदि तुम्हारा हाथ या पैर तुम्हें ठोकर खिलाए, तो उसे काटकर अपने से दूर फेंक दो। तुम्हारे लिए अपंग या लंगड़ा होकर जीवन में प्रवेश करना बेहतर है, बजाय इसके कि दो हाथ या दो पैर होते हुए अनंत आग में डाल दिए जाओ।"
    - verse: 9
      text: "और यदि तुम्हारी आँख तुम्हें ठोकर खिलाए, तो उसे निकालकर अपने से दूर फेंक दो। तुम्हारे लिए एक आँख वाला होकर जीवन में प्रवेश करना बेहतर है, बजाय इसके कि दो आँखें होते हुए नरक की आग में डाल दिए जाओ।"
    - verse: 10
      text: "ध्यान रखो कि इन छोटों में से किसी को तुच्छ न समझो, क्योंकि मैं तुमसे कहता हूँ: स्वर्ग में उनके दूत मेरे स्वर्गीय पिता का मुख सदा देखते हैं।"
    - verse: 12
      text: "तुम क्या सोचते हो? यदि किसी व्यक्ति की सौ भेड़ें हों और उनमें से एक भटक जाए, तो क्या वह निन्यानबे को पहाड़ों पर छोड़कर भटकी हुई भेड़ को ढूँढ़ने नहीं जाएगा?"
    - verse: 13
      text: "यदि वह उसे पा ले, तो मैं तुमसे सच कहता हूँ: वह उस एक भेड़ पर उन निन्यानबे से अधिक आनंदित होता है जो नहीं भटकीं।"
    - verse: 14
      text: "इसी प्रकार तुम्हारे स्वर्गीय पिता की इच्छा नहीं कि इन छोटों में से एक भी नष्ट हो।"
    - verse: 15
      text: "यदि तुम्हारा भाई तुम्हारे विरुद्ध पाप करे, तो जाओ और अकेले में उसे उसकी गलती बताओ। यदि वह तुम्हारी सुने, तो तुमने अपने भाई को वापस पा लिया।"
    - verse: 16
      text: "लेकिन यदि वह न सुने, तो अपने साथ एक या दो और लोगों को ले जाओ, ताकि दो या तीन गवाहों के मुँह से हर बात स्थिर हो।"
    - verse: 17
      text: "यदि वह उनकी बात मानने से भी इनकार करे, तो कलीसिया को बता दो। और यदि वह कलीसिया की बात मानने से भी इनकार करे, तो वह तुम्हारे लिए गैर-यहूदी और चुंगी लेने वाले के समान हो।"
    - verse: 18
      text: "मैं तुमसे सच कहता हूँ: जो कुछ तुम पृथ्वी पर बाँधोगे, वह स्वर्ग में बँधा हुआ होगा; और जो कुछ तुम पृथ्वी पर खोलोगे, वह स्वर्ग में खुला हुआ होगा।"
    - verse: 19
      text: "फिर मैं तुमसे सच कहता हूँ: यदि तुममें से दो पृथ्वी पर किसी भी बात के विषय में सहमत होकर उसे माँगें, तो वह उनके लिए मेरे स्वर्गीय पिता की ओर से की जाएगी।"
    - verse: 20
      text: "क्योंकि जहाँ दो या तीन मेरे नाम पर इकट्ठे होते हैं, वहाँ मैं उनके बीच हूँ।\""
    - verse: 21
      text: "तब पतरस यीशु के पास आया और बोला, \"प्रभु, यदि मेरा भाई मेरे विरुद्ध पाप करता रहे, तो मैं उसे कितनी बार क्षमा करूँ? सात बार तक?\""
    - verse: 22
      text: "यीशु ने उससे कहा, \"मैं तुमसे यह नहीं कहता कि सात बार तक, बल्कि सत्तर गुना सात बार तक।"
    - verse: 23
      text: "इसलिए स्वर्ग का राज्य उस राजा के समान है जो अपने दासों से हिसाब लेना चाहता था।"
    - verse: 24
      text: "जब उसने हिसाब लेना शुरू किया, तो एक कर्जदार उसके सामने लाया गया, जिस पर दस हजार तोड़ों का कर्ज था।"
    - verse: 25
      text: "उसके पास चुकाने को कुछ नहीं था, इसलिए उसके स्वामी ने आज्ञा दी कि उसे, उसकी पत्नी, उसके बच्चों और उसकी सारी संपत्ति को बेचकर कर्ज चुकाया जाए।"
    - verse: 26
      text: "तब वह दास गिर पड़ा, उसे दंडवत करने लगा और बोला, 'मेरे साथ धीरज रखिए, और मैं आपको सब चुका दूँगा।'"
    - verse: 27
      text: "उस दास के स्वामी को उस पर करुणा आई। उसने उसे छोड़ दिया और उसका कर्ज माफ कर दिया।"
    - verse: 28
      text: "लेकिन वह दास बाहर गया और अपने साथी दासों में से एक को पाया, जो उसका सौ दीनार का कर्जदार था। उसने उसे पकड़कर उसका गला दबाया और कहा, 'तुम्हें जो कुछ देना है, चुका दो!'"
    - verse: 29
      text: "उसका साथी दास गिर पड़ा और उससे विनती करने लगा, 'मेरे साथ धीरज रखो, और मैं तुम्हें चुका दूँगा।'"
    - verse: 30
      text: "लेकिन वह नहीं माना; उसने जाकर उसे जेल में डाल दिया, जब तक वह कर्ज चुका न दे।"
    - verse: 31
      text: "जो हुआ था उसे देखकर उसके साथी दास बहुत दुःखी हुए। उन्होंने जाकर अपने स्वामी को पूरा हाल बता दिया।"
    - verse: 32
      text: "तब उसके स्वामी ने उसे बुलाकर कहा, 'दुष्ट दास! तुमने मुझसे विनती की थी, इसलिए मैंने तुम्हारा वह सारा कर्ज माफ कर दिया।"
    - verse: 33
      text: "क्या तुम्हें भी अपने साथी दास पर दया नहीं करनी चाहिए थी, जैसे मैंने तुम पर दया की?'"
    - verse: 34
      text: "उसका स्वामी क्रोधित हुआ और उसने उसे यातना देने वालों को सौंप दिया, जब तक वह पूरा कर्ज न चुका दे।"
    - verse: 35
      text: "यदि तुममें से हर एक अपने भाई को अपने हृदय से क्षमा नहीं करेगा, तो मेरा स्वर्गीय पिता भी तुम्हारे साथ ऐसा ही करेगा।\""
