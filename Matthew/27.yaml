- book: "मत्ती"
  chapter: 27
  verses:
    - verse: 1
      text: "सुबह होते ही सभी प्रधान याजकों और लोगों के प्राचीनों ने यीशु के विरुद्ध उसे मार डालने का परामर्श किया।"
    - verse: 2
      text: "उन्होंने उसे बाँधा, ले गए और राज्यपाल पीलातुस को सौंप दिया।"
    - verse: 3
      text: "जब उसे सौंपने वाले यहूदा ने देखा कि यीशु दोषी ठहराया गया है, तो उसने अपना मन बदला और चाँदी के तीस सिक्के प्रधान याजकों और प्राचीनों को लौटा दिए।"
    - verse: 4
      text: "उसने कहा, \"मैंने निर्दोष लहू को सौंपकर पाप किया है।\" उन्होंने कहा, \"इससे हमें क्या? तुम ही देखो।\""
    - verse: 5
      text: "उसने चाँदी के सिक्के मंदिर के पवित्र भवन में फेंक दिए, चला गया और जाकर फाँसी लगा ली।"
    - verse: 6
      text: "प्रधान याजकों ने सिक्के उठाकर कहा, \"इन्हें मंदिर के भंडार में रखना उचित नहीं, क्योंकि यह लहू की कीमत है।\""
    - verse: 7
      text: "उन्होंने परामर्श करके उन सिक्कों से अजनबियों को दफनाने के लिए कुम्हार का खेत खरीद लिया।"
    - verse: 8
      text: "इसी कारण वह खेत आज तक 'लहू का खेत' कहलाता है।"
    - verse: 9
      text: "तब यिर्मयाह भविष्यवक्ता के द्वारा कही गई यह बात पूरी हुई: \"उन्होंने चाँदी के तीस सिक्के लिए, उस व्यक्ति की कीमत, जिसका मूल्य इस्राएल के पुत्रों ने ठहराया था,"
    - verse: 10
      text: "और उन्हें कुम्हार के खेत के लिए दे दिया, जैसा प्रभु ने मुझे आज्ञा दी थी।\""
    - verse: 11
      text: "यीशु राज्यपाल के सामने खड़ा था। राज्यपाल ने उससे पूछा, \"क्या तुम यहूदियों के राजा हो?\" यीशु ने कहा, \"तुमने कहा है।\""
    - verse: 12
      text: "जब प्रधान याजकों और प्राचीनों ने उस पर आरोप लगाए, तो उसने कोई उत्तर नहीं दिया।"
    - verse: 13
      text: "तब पीलातुस ने उससे कहा, \"क्या तुम नहीं सुनते कि ये तुम्हारे विरुद्ध कितनी गवाही दे रहे हैं?\""
    - verse: 14
      text: "लेकिन उसने उसे एक भी बात का उत्तर नहीं दिया, जिससे राज्यपाल बहुत चकित हुआ।"
    - verse: 15
      text: "पर्व के समय राज्यपाल की रीति थी कि वह भीड़ के लिए उनकी पसंद के एक कैदी को छोड़ देता था।"
    - verse: 16
      text: "उस समय उनके पास यीशु बरअब्बा नामक एक कुख्यात कैदी था।"
    - verse: 17
      text: "जब लोग इकट्ठे हुए, तो पीलातुस ने उनसे पूछा, \"तुम किसे चाहते हो कि मैं तुम्हारे लिए छोड़ दूँ: यीशु बरअब्बा को या यीशु को, जो मसीह कहलाता है?\""
    - verse: 18
      text: "क्योंकि वह जानता था कि उन्होंने ईर्ष्या के कारण उसे सौंपा है।"
    - verse: 19
      text: "जब वह न्यायासन पर बैठा था, तो उसकी पत्नी ने उसके पास संदेश भेजा, \"उस धर्मी व्यक्ति के मामले में कुछ मत करना, क्योंकि आज मैंने स्वप्न में उसके कारण बहुत दुख सहा है।\""
    - verse: 20
      text: "लेकिन प्रधान याजकों और प्राचीनों ने भीड़ को मना लिया कि वे बरअब्बा को माँगें और यीशु को नष्ट कराएँ।"
    - verse: 21
      text: "राज्यपाल ने उनसे पूछा, \"इन दोनों में से किसे चाहते हो कि मैं तुम्हारे लिए छोड़ दूँ?\" उन्होंने कहा, \"बरअब्बा को।\""
    - verse: 22
      text: "पीलातुस ने उनसे कहा, \"तो यीशु के साथ, जो मसीह कहलाता है, मैं क्या करूँ?\" सभी ने कहा, \"उसे क्रूस पर चढ़ाया जाए!\""
    - verse: 23
      text: "उसने कहा, \"क्यों? उसने क्या बुराई की है?\" लेकिन वे और भी जोर से चिल्लाने लगे, \"उसे क्रूस पर चढ़ाया जाए!\""
    - verse: 24
      text: "पीलातुस ने देखा कि कोई लाभ नहीं हो रहा, बल्कि हंगामा बढ़ता जा रहा है। उसने पानी लिया, भीड़ के सामने अपने हाथ धोए और कहा, \"मैं इस लहू से निर्दोष हूँ; तुम लोग ही देखो।\""
    - verse: 25
      text: "सभी लोगों ने उत्तर दिया, \"उसका लहू हम पर और हमारे बच्चों पर हो!\""
    - verse: 26
      text: "तब उसने बरअब्बा को उनके लिए छोड़ दिया, लेकिन यीशु को कोड़े लगवाकर क्रूस पर चढ़ाए जाने के लिए सौंप दिया।"
    - verse: 27
      text: "तब राज्यपाल के सैनिक यीशु को राज्यपाल के मुख्यालय में ले गए और उसके चारों ओर पूरी पलटन इकट्ठी कर ली।"
    - verse: 28
      text: "उन्होंने उसके कपड़े उतारकर उसे गहरा लाल सैनिक चोगा पहनाया।"
    - verse: 29
      text: "उन्होंने काँटों का मुकुट गूँथकर उसके सिर पर रखा और उसके दाहिने हाथ में सरकंडा दिया। फिर उसके सामने घुटने टेककर उसका उपहास करते हुए बोले, \"प्रणाम, यहूदियों के राजा!\""
    - verse: 30
      text: "वे उस पर थूकते रहे और सरकंडा लेकर उसके सिर पर मारते रहे।"
    - verse: 31
      text: "उसका उपहास करने के बाद उन्होंने चोगा उतारा, उसके अपने कपड़े पहनाए और उसे क्रूस पर चढ़ाने के लिए ले गए।"
    - verse: 32
      text: "बाहर जाते समय उन्हें कुरेने का शमौन नामक एक व्यक्ति मिला। उन्होंने उसे यीशु का क्रूस उठाने के लिए मजबूर किया।"
    - verse: 33
      text: "वे गोलगथा नामक स्थान पर पहुँचे, जिसका अर्थ है 'खोपड़ी का स्थान'।"
    - verse: 34
      text: "उन्होंने उसे पीने के लिए पित्त मिला दाखरस दिया। उसने चखकर पीना नहीं चाहा।"
    - verse: 35
      text: "उसे क्रूस पर चढ़ाने के बाद उन्होंने चिट्ठियाँ डालकर उसके कपड़े आपस में बाँट लिए।"
    - verse: 36
      text: "फिर वे वहाँ बैठकर उसकी रखवाली करने लगे।"
    - verse: 37
      text: "उन्होंने उसके सिर के ऊपर उसका आरोप लिखकर लगा दिया: \"यह यीशु है, यहूदियों का राजा।\""
    - verse: 38
      text: "तब उसके साथ दो डाकू क्रूस पर चढ़ाए गए, एक उसके दाहिने और एक उसके बाएँ।"
    - verse: 39
      text: "वहाँ से गुजरने वाले सिर हिलाते हुए उसकी निंदा करते"
    - verse: 40
      text: "और कहते, \"मंदिर के पवित्र भवन को ढाने और तीन दिनों में बनाने वाले, अपने आपको बचा! यदि तू परमेश्वर का पुत्र है, तो क्रूस से नीचे उतर आ!\""
    - verse: 41
      text: "इसी प्रकार प्रधान याजक भी शास्त्रियों और प्राचीनों के साथ उसका उपहास करते हुए कहते थे:"
    - verse: 42
      text: "\"इसने दूसरों को बचाया, लेकिन अपने आपको नहीं बचा सकता। यह इस्राएल का राजा है; अब क्रूस से नीचे उतर आए, तब हम इस पर विश्वास करेंगे।"
    - verse: 43
      text: "इसने परमेश्वर पर भरोसा किया है; यदि परमेश्वर इससे प्रसन्न है, तो अब इसे छुड़ा ले, क्योंकि इसने कहा था, 'मैं परमेश्वर का पुत्र हूँ।'\""
    - verse: 44
      text: "उसके साथ क्रूस पर चढ़ाए गए डाकू भी उसी प्रकार उसे ताने देते थे।"
    - verse: 45
      text: "छठे घंटे से नौवें घंटे तक सारी भूमि पर अंधकार छाया रहा।"
    - verse: 46
      text: "नौवें घंटे के आसपास यीशु ने ऊँची आवाज में पुकारा, \"एली, एली, लेमा सबक्तानी?\" अर्थात, \"मेरे परमेश्वर, मेरे परमेश्वर, आपने मुझे क्यों छोड़ दिया?\""
    - verse: 47
      text: "वहाँ खड़े कुछ लोगों ने यह सुनकर कहा, \"यह एलिय्याह को पुकार रहा है।\""
    - verse: 48
      text: "उनमें से एक तुरंत दौड़ा, स्पंज लिया, उसे खट्टे दाखरस से भरा, सरकंडे पर रखकर यीशु को पीने के लिए दिया।"
    - verse: 49
      text: "बाकी लोगों ने कहा, \"रहने दो; देखें, एलिय्याह इसे बचाने आता है या नहीं।\""
    - verse: 50
      text: "यीशु ने फिर ऊँची आवाज से पुकारकर अपनी आत्मा छोड़ दी।"
    - verse: 51
      text: "और देखो, मंदिर के पवित्र भवन का परदा ऊपर से नीचे तक फटकर दो भाग हो गया; पृथ्वी हिल गई और चट्टानें फट गईं।"
    - verse: 52
      text: "कब्रें खुल गईं और सोए हुए बहुत से पवित्र जनों के शरीर जीवित किए गए।"
    - verse: 53
      text: "यीशु के जीवित किए जाने के बाद वे कब्रों से निकलकर पवित्र नगर में गए और बहुत से लोगों को दिखाई दिए।"
    - verse: 54
      text: "शतपति और उसके साथ यीशु की रखवाली कर रहे लोगों ने भूकंप और हुई घटनाएँ देखीं, तो वे बहुत डर गए और बोले, \"निश्चय ही यह परमेश्वर का पुत्र था!\""
    - verse: 55
      text: "बहुत सी स्त्रियाँ भी वहाँ दूर से देख रही थीं। वे गलील से यीशु के पीछे आई थीं और उसकी सेवा करती थीं।"
    - verse: 56
      text: "उनमें मरियम मगदलीनी, याकूब और यूसुफ की माँ मरियम, और जब्दी के पुत्रों की माँ थीं।"
    - verse: 57
      text: "शाम होने पर अरिमथिया से यूसुफ नामक एक धनी व्यक्ति आया, जो स्वयं भी यीशु का चेला बना था।"
    - verse: 58
      text: "वह पीलातुस के पास गया और यीशु की देह माँगी। तब पीलातुस ने देह दे दिए जाने की आज्ञा दी।"
    - verse: 59
      text: "यूसुफ ने देह लेकर साफ मलमल के कपड़े में लपेटी"
    - verse: 60
      text: "और उसे अपनी नई कब्र में रखा, जिसे उसने चट्टान में खुदवाया था। फिर कब्र के द्वार पर एक बड़ा पत्थर लुढ़काकर चला गया।"
    - verse: 61
      text: "मरियम मगदलीनी और दूसरी मरियम वहाँ कब्र के सामने बैठी थीं।"
    - verse: 62
      text: "अगले दिन, अर्थात तैयारी के दिन के बाद, प्रधान याजक और फरीसी पीलातुस के पास इकट्ठे हुए"
    - verse: 63
      text: "और बोले, \"महोदय, हमें याद है कि उस धोखेबाज ने जीवित रहते कहा था, 'तीन दिन बाद मैं जीवित किया जाऊँगा।'"
    - verse: 64
      text: "इसलिए आज्ञा दीजिए कि तीसरे दिन तक कब्र सुरक्षित रखी जाए, कहीं उसके चेले आकर उसे चुरा न लें और लोगों से न कहें, 'वह मरे हुओं में से जीवित किया गया है।' तब अंतिम धोखा पहले से भी बुरा होगा।\""
    - verse: 65
      text: "पीलातुस ने उनसे कहा, \"तुम्हारे पास पहरेदार हैं। जाओ, जितनी अच्छी तरह जानते हो, उतनी अच्छी तरह कब्र सुरक्षित कर लो।\""
    - verse: 66
      text: "वे गए और पत्थर पर मुहर लगाकर तथा पहरेदार तैनात करके कब्र को सुरक्षित कर दिया।"
