- book: "मत्ती"
  chapter: 17
  verses:
    - verse: 1
      text: "छह दिन बाद यीशु पतरस, याकूब और उसके भाई यूहन्ना को साथ लेकर एकांत में एक ऊँचे पहाड़ पर ले गया।"
    - verse: 2
      text: "उनके सामने उसका रूप बदल गया; उसका चेहरा सूर्य की तरह चमका और उसके वस्त्र प्रकाश की तरह उजले हो गए।"
    - verse: 3
      text: "और देखो, मूसा और एलिय्याह उन्हें दिखाई दिए, और वे यीशु से बातें कर रहे थे।"
    - verse: 4
      text: "पतरस ने यीशु से कहा, \"प्रभु, हमारा यहाँ रहना अच्छा है। यदि आप चाहें, तो मैं यहाँ तीन तंबू बनाऊँ: एक आपके लिए, एक मूसा के लिए और एक एलिय्याह के लिए।\""
    - verse: 5
      text: "वह बोल ही रहा था कि देखो, एक उज्ज्वल बादल उन पर छा गया। और देखो, बादल में से एक आवाज आई: \"यह मेरा प्रिय पुत्र है, जिससे मैं प्रसन्न हूँ। उसकी सुनो।\""
    - verse: 6
      text: "यह सुनकर चेले मुँह के बल गिर पड़े और बहुत डर गए।"
    - verse: 7
      text: "यीशु उनके पास आया, उन्हें छुआ और कहा, \"उठो और मत डरो।\""
    - verse: 8
      text: "उन्होंने आँखें उठाईं तो केवल यीशु को ही देखा।"
    - verse: 9
      text: "जब वे पहाड़ से नीचे उतर रहे थे, तो यीशु ने उन्हें आदेश दिया, \"इस दर्शन के बारे में किसी से मत कहना, जब तक मनुष्य का पुत्र मरे हुओं में से जीवित न किया जाए।\""
    - verse: 10
      text: "चेलों ने उससे पूछा, \"तो फिर शास्त्री क्यों कहते हैं कि एलिय्याह का पहले आना आवश्यक है?\""
    - verse: 11
      text: "उसने उत्तर दिया, \"एलिय्याह तो आता है और सब कुछ फिर से स्थापित करेगा।"
    - verse: 12
      text: "लेकिन मैं तुमसे कहता हूँ कि एलिय्याह आ चुका है। उन्होंने उसे नहीं पहचाना, बल्कि उसके साथ जो चाहा किया। इसी तरह मनुष्य का पुत्र भी उनके हाथों दुःख उठाने वाला है।\""
    - verse: 13
      text: "तब चेलों ने समझा कि उसने उनसे बपतिस्मा देने वाले यूहन्ना के विषय में कहा था।"
    - verse: 14
      text: "जब वे भीड़ के पास पहुँचे, तो एक व्यक्ति यीशु के पास आया और उसके सामने घुटने टेककर बोला:"
    - verse: 15
      text: "\"प्रभु, मेरे बेटे पर दया कीजिए, क्योंकि उसे मिर्गी के दौरे पड़ते हैं और वह बहुत कष्ट उठाता है। वह बार-बार आग में और बार-बार पानी में गिर जाता है।"
    - verse: 16
      text: "मैं उसे आपके चेलों के पास लाया, लेकिन वे उसे चंगा नहीं कर सके।\""
    - verse: 17
      text: "यीशु ने उत्तर दिया, \"अविश्वासी और टेढ़ी पीढ़ी! मैं कब तक तुम्हारे साथ रहूँगा? कब तक तुम्हें सहूँगा? उसे यहाँ मेरे पास लाओ।\""
    - verse: 18
      text: "यीशु ने दुष्टात्मा को डाँटा; वह लड़के में से निकल गई, और लड़का उसी घड़ी चंगा हो गया।"
    - verse: 19
      text: "तब चेले अकेले में यीशु के पास आए और पूछा, \"हम उसे क्यों नहीं निकाल सके?\""
    - verse: 20
      text: "उसने उनसे कहा, \"तुम्हारे कम विश्वास के कारण। क्योंकि मैं तुमसे सच कहता हूँ: यदि तुम्हारे पास राई के दाने जितना भी विश्वास हो, तो तुम इस पहाड़ से कहोगे, 'यहाँ से वहाँ चला जा,' और वह चला जाएगा; तुम्हारे लिए कुछ भी असंभव नहीं होगा।\""
    - verse: 22
      text: "जब वे गलील में इकट्ठे हो रहे थे, तो यीशु ने उनसे कहा, \"मनुष्य का पुत्र मनुष्यों के हाथों में सौंपा जाने वाला है,"
    - verse: 23
      text: "और वे उसे मार डालेंगे, और तीसरे दिन वह जीवित किया जाएगा।\" यह सुनकर वे बहुत दुःखी हुए।"
    - verse: 24
      text: "जब वे कफरनहूम पहुँचे, तो दो-द्रम्म का कर वसूलने वाले पतरस के पास आए और बोले, \"क्या तुम्हारा गुरु दो-द्रम्म का कर नहीं देता?\""
    - verse: 25
      text: "उसने कहा, \"हाँ।\" जब पतरस घर में आया, तो यीशु ने उससे पहले ही पूछा, \"शमौन, तुम क्या सोचते हो? पृथ्वी के राजा चुंगी या कर किससे लेते हैं: अपने पुत्रों से या पराए लोगों से?\""
    - verse: 26
      text: "पतरस ने कहा, \"पराए लोगों से।\" यीशु ने उससे कहा, \"तो पुत्र स्वतंत्र हैं।\""
    - verse: 27
      text: "फिर भी, ऐसा न हो कि हम उन्हें ठोकर खिलाएँ, तुम सागर पर जाओ, बंसी डालो और जो मछली सबसे पहले निकले उसे उठा लो। उसका मुँह खोलने पर तुम्हें चार-द्रम्म का एक सिक्का मिलेगा। उसे लेकर मेरे और अपने लिए उन्हें दे देना।"
