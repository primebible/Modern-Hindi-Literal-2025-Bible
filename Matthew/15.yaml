- book: "मत्ती"
  chapter: 15
  verses:
    - verse: 1
      text: "तब यरूशलेम से फरीसी और शास्त्री यीशु के पास आए और कहने लगे:"
    - verse: 2
      text: "\"आपके चेले प्राचीनों की परंपरा का उल्लंघन क्यों करते हैं? वे रोटी खाते समय अपने हाथ नहीं धोते।\""
    - verse: 3
      text: "उसने उन्हें उत्तर दिया, \"तुम भी अपनी परंपरा के कारण परमेश्वर की आज्ञा का उल्लंघन क्यों करते हो?"
    - verse: 4
      text: "क्योंकि परमेश्वर ने कहा: 'अपने पिता और माँ का आदर करो,' और 'जो अपने पिता या माँ को कोसे, उसे अवश्य मार डाला जाए।'"
    - verse: 5
      text: "लेकिन तुम कहते हो, 'जो कोई अपने पिता या माँ से कहे, \"मुझसे आपको जो सहायता मिल सकती थी, वह परमेश्वर को दी गई भेंट है,\""
    - verse: 6
      text: "वह अपने पिता का आदर निश्चय ही नहीं करेगा।' इस तरह तुमने अपनी परंपरा के कारण परमेश्वर के वचन को रद्द कर दिया है।"
    - verse: 7
      text: "कपटियो! यशायाह ने तुम्हारे विषय में ठीक भविष्यवाणी की:"
    - verse: 8
      text: "'ये लोग अपने होठों से मेरा आदर करते हैं, लेकिन उनका हृदय मुझसे बहुत दूर है।"
    - verse: 9
      text: "वे व्यर्थ मेरी आराधना करते हैं, क्योंकि वे मनुष्यों की आज्ञाओं को सिद्धांत बनाकर सिखाते हैं।'\""
    - verse: 10
      text: "तब उसने भीड़ को पास बुलाकर कहा, \"सुनो और समझो:"
    - verse: 11
      text: "जो मुँह में जाता है, वह मनुष्य को अशुद्ध नहीं करता; बल्कि जो मुँह से निकलता है, वही मनुष्य को अशुद्ध करता है।\""
    - verse: 12
      text: "तब चेलों ने उसके पास आकर कहा, \"क्या आप जानते हैं कि यह बात सुनकर फरीसी ठोकर खा गए?\""
    - verse: 13
      text: "उसने उत्तर दिया, \"हर वह पौधा जिसे मेरे स्वर्गीय पिता ने नहीं लगाया, उखाड़ दिया जाएगा।"
    - verse: 14
      text: "उन्हें छोड़ दो। वे अंधों के अंधे अगुवे हैं। यदि एक अंधा दूसरे अंधे की अगुवाई करे, तो दोनों गड्ढे में गिरेंगे।\""
    - verse: 15
      text: "पतरस ने उससे कहा, \"यह दृष्टांत हमें समझाइए।\""
    - verse: 16
      text: "उसने कहा, \"क्या तुम भी अब तक नहीं समझते?"
    - verse: 17
      text: "क्या तुम नहीं समझते कि जो कुछ मुँह में जाता है, वह पेट में पहुँचता है और फिर शरीर से निकलकर शौचालय में चला जाता है?"
    - verse: 18
      text: "लेकिन जो बातें मुँह से निकलती हैं, वे हृदय से निकलती हैं, और वही मनुष्य को अशुद्ध करती हैं।"
    - verse: 19
      text: "क्योंकि हृदय से बुरे विचार, हत्याएँ, व्यभिचार, अनैतिक यौन-संबंध, चोरियाँ, झूठी गवाहियाँ और निंदाएँ निकलती हैं।"
    - verse: 20
      text: "यही बातें मनुष्य को अशुद्ध करती हैं; लेकिन बिना धोए हाथों से खाना मनुष्य को अशुद्ध नहीं करता।\""
    - verse: 21
      text: "यीशु वहाँ से निकलकर सोर और सैदा के क्षेत्र में चला गया।"
    - verse: 22
      text: "और देखो, उस क्षेत्र से एक कनानी स्त्री निकलकर आई और पुकारती रही, \"प्रभु, दाऊद के पुत्र, मुझ पर दया कीजिए! मेरी बेटी बुरी तरह दुष्टात्मा से ग्रस्त है।\""
    - verse: 23
      text: "लेकिन उसने उसे एक शब्द का भी उत्तर नहीं दिया। उसके चेले आए और उससे विनती करने लगे, \"उसे विदा कर दीजिए, क्योंकि वह हमारे पीछे चिल्लाती आ रही है।\""
    - verse: 24
      text: "उसने उत्तर दिया, \"मुझे केवल इस्राएल के घराने की खोई हुई भेड़ों के पास भेजा गया है।\""
    - verse: 25
      text: "तब वह आई और उसे दंडवत करती हुई बोली, \"प्रभु, मेरी सहायता कीजिए।\""
    - verse: 26
      text: "उसने उत्तर दिया, \"बच्चों की रोटी लेकर छोटे कुत्तों के आगे डालना ठीक नहीं है।\""
    - verse: 27
      text: "उसने कहा, \"हाँ, प्रभु; फिर भी छोटे कुत्ते भी अपने मालिकों की मेज से गिरने वाले टुकड़े खाते हैं।\""
    - verse: 28
      text: "तब यीशु ने उसे उत्तर दिया, \"हे स्त्री, तुम्हारा विश्वास बड़ा है! जैसा तुम चाहती हो, वैसा ही तुम्हारे लिए हो।\" और उसी घड़ी उसकी बेटी चंगी हो गई।"
    - verse: 29
      text: "यीशु वहाँ से चलकर गलील सागर के किनारे आया। फिर वह पहाड़ पर चढ़कर वहाँ बैठ गया।"
    - verse: 30
      text: "लोगों की बड़ी-बड़ी भीड़ें उसके पास आईं। वे अपने साथ मूक, अंधे, लंगड़े, अपंग और बहुत से अन्य लोगों को लाए और उन्हें उसके पैरों के पास रख दिया। उसने उन्हें चंगा किया।"
    - verse: 31
      text: "भीड़ यह देखकर चकित हो गई कि मूक बोल रहे थे, अपंग स्वस्थ हो गए थे, लंगड़े चल रहे थे और अंधे देख रहे थे; और लोगों ने इस्राएल के परमेश्वर की महिमा की।"
    - verse: 32
      text: "यीशु ने अपने चेलों को पास बुलाकर कहा, \"मुझे इस भीड़ पर करुणा आती है, क्योंकि वे तीन दिन से मेरे साथ ठहरे हुए हैं और उनके पास खाने को कुछ नहीं है। मैं उन्हें भूखा विदा नहीं करना चाहता, कहीं वे रास्ते में निढाल न हो जाएँ।\""
    - verse: 33
      text: "चेलों ने उससे कहा, \"इस निर्जन स्थान में हमें इतनी रोटियाँ कहाँ से मिलेंगी कि इतनी बड़ी भीड़ को तृप्त कर सकें?\""
    - verse: 34
      text: "यीशु ने उनसे कहा, \"तुम्हारे पास कितनी रोटियाँ हैं?\" उन्होंने कहा, \"सात और कुछ छोटी मछलियाँ।\""
    - verse: 35
      text: "उसने भीड़ को भूमि पर बैठने की आज्ञा दी।"
    - verse: 36
      text: "उसने सात रोटियाँ और मछलियाँ लीं, धन्यवाद दिया, रोटियाँ तोड़ीं और चेलों को देता गया; और चेले लोगों को देते गए।"
    - verse: 37
      text: "सबने खाया और तृप्त हो गए। फिर उन्होंने बचे हुए टुकड़ों से भरे सात बड़े टोकरे उठाए।"
    - verse: 38
      text: "खाने वाले पुरुष चार हजार थे; इनके अलावा स्त्रियाँ और बच्चे भी थे।"
    - verse: 39
      text: "भीड़ को विदा करने के बाद वह नाव में चढ़ा और मगदन के क्षेत्र में आया।"
