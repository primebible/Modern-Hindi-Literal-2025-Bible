- book: "मत्ती"
  chapter: 5
  verses:
    - verse: 1
      text: "भीड़ को देखकर यीशु पहाड़ पर चढ़ गया। जब वह बैठ गया, तो उसके चेले उसके पास आए।"
    - verse: 2
      text: "तब उसने बोलना शुरू किया और उन्हें यह शिक्षा दी:"
    - verse: 3
      text: "\"धन्य हैं वे जो आत्मा में दीन हैं, क्योंकि स्वर्ग का राज्य उन्हीं का है।"
    - verse: 4
      text: "धन्य हैं वे जो शोक करते हैं, क्योंकि वे सांत्वना पाएँगे।"
    - verse: 5
      text: "धन्य हैं वे जो नम्र हैं, क्योंकि वे पृथ्वी को विरासत में पाएँगे।"
    - verse: 6
      text: "धन्य हैं वे जो धार्मिकता के भूखे और प्यासे हैं, क्योंकि वे तृप्त किए जाएँगे।"
    - verse: 7
      text: "धन्य हैं वे जो दयावान हैं, क्योंकि उन पर दया की जाएगी।"
    - verse: 8
      text: "धन्य हैं वे जिनका हृदय शुद्ध है, क्योंकि वे परमेश्वर को देखेंगे।"
    - verse: 9
      text: "धन्य हैं वे जो शांति स्थापित करते हैं, क्योंकि वे परमेश्वर के पुत्र कहलाएँगे।"
    - verse: 10
      text: "धन्य हैं वे जो धार्मिकता के कारण सताए गए हैं, क्योंकि स्वर्ग का राज्य उन्हीं का है।"
    - verse: 11
      text: "तुम धन्य हो जब लोग मेरे कारण तुम्हारा अपमान करें, तुम्हें सताएँ और झूठ बोलकर तुम्हारे विरुद्ध हर प्रकार की बुरी बात कहें।"
    - verse: 12
      text: "आनंदित हो और हर्ष से भर जाओ, क्योंकि स्वर्ग में तुम्हारा प्रतिफल बड़ा है; क्योंकि तुमसे पहले हुए भविष्यवक्ताओं को भी इसी तरह सताया गया था।"
    - verse: 13
      text: "तुम पृथ्वी के नमक हो। परन्तु यदि नमक अपना स्वाद खो दे, तो उसे फिर नमकीन कैसे बनाया जाएगा? फिर वह किसी काम का नहीं रहता; उसे बाहर फेंक दिया जाता है और लोगों के पैरों तले रौंदा जाता है।"
    - verse: 14
      text: "तुम संसार का प्रकाश हो। पहाड़ पर बसा नगर छिप नहीं सकता।"
    - verse: 15
      text: "लोग दीया जलाकर उसे टोकरी के नीचे नहीं रखते, बल्कि दीवट पर रखते हैं, और वह घर में सभी को प्रकाश देता है।"
    - verse: 16
      text: "इसी प्रकार तुम्हारा प्रकाश लोगों के सामने चमके, ताकि वे तुम्हारे भले काम देखें और तुम्हारे स्वर्गीय पिता की महिमा करें।"
    - verse: 17
      text: "यह मत समझो कि मैं व्यवस्था या भविष्यवक्ताओं को रद्द करने आया हूँ। मैं उन्हें रद्द करने नहीं, बल्कि पूरा करने आया हूँ।"
    - verse: 18
      text: "क्योंकि मैं तुमसे सच कहता हूँ: जब तक आकाश और पृथ्वी मिट न जाएँ, तब तक व्यवस्था से एक भी छोटा अक्षर या एक भी बिंदु नहीं मिटेगा, जब तक सब कुछ पूरा न हो जाए।"
    - verse: 19
      text: "इसलिए जो कोई इन सबसे छोटी आज्ञाओं में से किसी एक को तोड़े और लोगों को भी ऐसा करना सिखाए, वह स्वर्ग के राज्य में सबसे छोटा कहलाएगा; परन्तु जो उनका पालन करे और सिखाए, वह स्वर्ग के राज्य में महान कहलाएगा।"
    - verse: 20
      text: "क्योंकि मैं तुमसे कहता हूँ: यदि तुम्हारी धार्मिकता शास्त्रियों और फरीसियों की धार्मिकता से बढ़कर न हो, तो तुम स्वर्ग के राज्य में कभी भी प्रवेश नहीं करोगे।"
    - verse: 21
      text: "तुमने सुना है कि पुराने समय के लोगों को यह कहा गया था: 'हत्या मत करना,' और 'जो हत्या करेगा, वह न्याय के अधीन होगा।'"
    - verse: 22
      text: "परन्तु मैं तुमसे कहता हूँ: जो कोई अपने भाई पर क्रोध करता है, वह न्यायालय के सामने उत्तरदायी होगा; जो अपने भाई से कहे, 'रका (नालायक)!' वह महासभा के सामने उत्तरदायी होगा; और जो कहे, 'मूर्ख!' वह नरक की आग के योग्य होगा।"
    - verse: 23
      text: "इसलिए यदि तुम वेदी पर अपनी भेंट चढ़ा रहे हो और वहीं तुम्हें याद आए कि तुम्हारे भाई को तुमसे कोई शिकायत है,"
    - verse: 24
      text: "तो अपनी भेंट वहीं वेदी के सामने छोड़ दो। पहले जाकर अपने भाई से मेल कर लो; फिर आकर अपनी भेंट चढ़ाओ।"
    - verse: 25
      text: "जब तक तुम अपने विरोधी के साथ रास्ते में हो, जल्दी उससे सुलह कर लो। कहीं ऐसा न हो कि विरोधी तुम्हें न्यायाधीश को सौंप दे, न्यायाधीश तुम्हें अधिकारी को सौंप दे और तुम्हें जेल में डाल दिया जाए।"
    - verse: 26
      text: "मैं तुमसे सच कहता हूँ: जब तक तुम आखिरी कौड़ी तक न चुका दो, तब तक वहाँ से नहीं निकलोगे।"
    - verse: 27
      text: "तुमने सुना है कि कहा गया था: 'व्यभिचार मत करना।'"
    - verse: 28
      text: "परन्तु मैं तुमसे कहता हूँ: जो कोई किसी स्त्री को वासना की दृष्टि से देखता है, वह अपने हृदय में उसके साथ व्यभिचार कर चुका है।"
    - verse: 29
      text: "यदि तुम्हारी दाहिनी आँख तुम्हें ठोकर खिलाए, तो उसे निकालकर अपने से दूर फेंक दो; क्योंकि तुम्हारे लिए यह भला है कि तुम्हारे अंगों में से एक नष्ट हो जाए और तुम्हारा पूरा शरीर नरक में न डाला जाए।"
    - verse: 30
      text: "और यदि तुम्हारा दाहिना हाथ तुम्हें ठोकर खिलाए, तो उसे काटकर अपने से दूर फेंक दो; क्योंकि तुम्हारे लिए यह भला है कि तुम्हारे अंगों में से एक नष्ट हो जाए और तुम्हारा पूरा शरीर नरक में न जाए।"
    - verse: 31
      text: "यह भी कहा गया था: 'जो अपनी पत्नी को तलाक दे, वह उसे तलाक-पत्र दे।'"
    - verse: 32
      text: "परन्तु मैं तुमसे कहता हूँ: जो कोई अपनी पत्नी को उसके अनैतिक यौन-संबंध के अलावा किसी और कारण से तलाक देता है, वह उसके व्यभिचार का कारण बनता है; और जो कोई तलाक दी गई स्त्री से विवाह करता है, वह व्यभिचार करता है।"
    - verse: 33
      text: "फिर तुमने सुना है कि पुराने समय के लोगों को यह कहा गया था: 'झूठी शपथ मत खाना, बल्कि प्रभु से की गई अपनी शपथें पूरी करना।'"
    - verse: 34
      text: "परन्तु मैं तुमसे कहता हूँ: किसी भी प्रकार की शपथ मत खाओ; न स्वर्ग की, क्योंकि वह परमेश्वर का सिंहासन है;"
    - verse: 35
      text: "न पृथ्वी की, क्योंकि वह उसके पैरों की चौकी है; न यरूशलेम की, क्योंकि वह महान राजा का नगर है।"
    - verse: 36
      text: "अपने सिर की शपथ भी मत खाओ, क्योंकि तुम अपने एक भी बाल को सफेद या काला नहीं कर सकते।"
    - verse: 37
      text: "तुम्हारी बात ऐसी हो: 'हाँ' तो हाँ, और 'नहीं' तो नहीं। इससे अधिक जो कुछ है, वह दुष्ट से आता है।"
    - verse: 38
      text: "तुमने सुना है कि कहा गया था: 'आँख के बदले आँख और दाँत के बदले दाँत।'"
    - verse: 39
      text: "परन्तु मैं तुमसे कहता हूँ: दुष्ट व्यक्ति का विरोध मत करो। बल्कि जो तुम्हारे दाहिने गाल पर थप्पड़ मारे, उसकी ओर दूसरा गाल भी कर दो।"
    - verse: 40
      text: "यदि कोई तुम पर मुकदमा करके तुम्हारा कुर्ता लेना चाहे, तो उसे अपना चोगा भी ले लेने दो।"
    - verse: 41
      text: "जो कोई तुम्हें एक मील चलने के लिए मजबूर करे, उसके साथ दो मील चले जाओ।"
    - verse: 42
      text: "जो तुमसे माँगे, उसे दो; और जो तुमसे उधार लेना चाहे, उससे मुँह मत मोड़ो।"
    - verse: 43
      text: "तुमने सुना है कि कहा गया था: 'अपने पड़ोसी से प्रेम करो और अपने शत्रु से बैर रखो।'"
    - verse: 44
      text: "परन्तु मैं तुमसे कहता हूँ: अपने शत्रुओं से प्रेम करो और जो तुम्हें सताते हैं उनके लिए प्रार्थना करो,"
    - verse: 45
      text: "ताकि तुम अपने स्वर्गीय पिता के पुत्र बनो; क्योंकि वह बुरों और भलों दोनों पर अपना सूर्य उगाता है और धर्मियों और अधर्मियों दोनों पर वर्षा करता है।"
    - verse: 46
      text: "क्योंकि यदि तुम केवल उनसे प्रेम करते हो जो तुमसे प्रेम करते हैं, तो तुम्हें क्या प्रतिफल मिलेगा? क्या चुंगी लेने वाले भी ऐसा नहीं करते?"
    - verse: 47
      text: "और यदि तुम केवल अपने भाइयों को नमस्कार करते हो, तो तुम दूसरों से बढ़कर क्या करते हो? क्या गैर-यहूदी भी ऐसा नहीं करते?"
    - verse: 48
      text: "इसलिए तुम पूर्ण बनो, जैसे तुम्हारा स्वर्गीय पिता पूर्ण है।\""
