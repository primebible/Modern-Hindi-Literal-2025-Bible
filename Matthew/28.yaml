- book: "मत्ती"
  chapter: 28
  verses:
    - verse: 1
      text: "सब्त के बाद, सप्ताह के पहले दिन भोर होने पर, मरियम मगदलीनी और दूसरी मरियम कब्र देखने आईं।"
    - verse: 2
      text: "और देखो, एक बड़ा भूकंप हुआ, क्योंकि प्रभु का एक स्वर्गदूत आकाश से उतरा, पास आया, पत्थर लुढ़काकर उसके ऊपर बैठ गया।"
    - verse: 3
      text: "उसका रूप बिजली जैसा था और उसका वस्त्र बर्फ जैसा सफेद था।"
    - verse: 4
      text: "उसके भय से पहरेदार काँप उठे और मरे हुओं जैसे हो गए।"
    - verse: 5
      text: "स्वर्गदूत ने स्त्रियों से कहा, \"तुम मत डरो। मैं जानता हूँ कि तुम क्रूस पर चढ़ाए गए यीशु को ढूँढ़ रही हो।"
    - verse: 6
      text: "वह यहाँ नहीं है, क्योंकि जैसा उसने कहा था, वह जीवित किया गया है। आओ, वह स्थान देखो जहाँ वह रखा गया था।"
    - verse: 7
      text: "अब जल्दी जाओ और उसके चेलों से कहो, 'वह मरे हुओं में से जीवित किया गया है। देखो, वह तुमसे पहले गलील जा रहा है; वहाँ तुम उसे देखोगे।' देखो, मैंने तुम्हें बता दिया है।\""
    - verse: 8
      text: "वे भय और बड़े आनंद के साथ जल्दी कब्र से चली गईं और उसके चेलों को समाचार देने दौड़ीं।"
    - verse: 9
      text: "और देखो, यीशु उनसे मिला और बोला, \"प्रणाम!\" उन्होंने पास आकर उसके पाँव पकड़ लिए और उसे दंडवत किया।"
    - verse: 10
      text: "तब यीशु ने उनसे कहा, \"मत डरो। जाओ, मेरे भाइयों से कहो कि वे गलील जाएँ; वहाँ वे मुझे देखेंगे।\""
    - verse: 11
      text: "जब वे जा रही थीं, तो देखो, पहरेदारों में से कुछ नगर में आए और जो कुछ हुआ था, वह सब प्रधान याजकों को बताया।"
    - verse: 12
      text: "प्रधान याजकों ने प्राचीनों के साथ इकट्ठे होकर परामर्श किया और सैनिकों को बहुत से चाँदी के सिक्के दिए"
    - verse: 13
      text: "और कहा, \"कहना, 'उसके चेले रात में आए और जब हम सो रहे थे, उसे चुरा ले गए।'\""
    - verse: 14
      text: "\"यदि यह बात राज्यपाल तक पहुँची, तो हम उसे राजी कर लेंगे और तुम्हें चिंता से मुक्त कर देंगे।\""
    - verse: 15
      text: "उन्होंने चाँदी के सिक्के लिए और जैसा उन्हें सिखाया गया था, वैसा किया। यह बात यहूदियों में आज तक फैली हुई है।"
    - verse: 16
      text: "ग्यारह चेले गलील में उस पहाड़ पर गए, जहाँ जाने का निर्देश यीशु ने उन्हें दिया था।"
    - verse: 17
      text: "उसे देखकर उन्होंने दंडवत किया, लेकिन कुछ संदेह में थे।"
    - verse: 18
      text: "यीशु उनके पास आया और उनसे कहा, \"स्वर्ग में और पृथ्वी पर सारा अधिकार मुझे दिया गया है।"
    - verse: 19
      text: "इसलिए जाओ, सभी राष्ट्रों को चेला बनाओ और उन्हें पिता, पुत्र और पवित्र आत्मा के नाम में बपतिस्मा दो।"
    - verse: 20
      text: "उन्हें उन सभी बातों का पालन करना सिखाओ जिनकी मैंने तुम्हें आज्ञा दी है। और देखो, मैं युग के अंत तक हर दिन तुम्हारे साथ हूँ।\""
