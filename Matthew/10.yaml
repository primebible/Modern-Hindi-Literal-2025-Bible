- book: "मत्ती"
  chapter: 10
  verses:
    - verse: 1
      text: "यीशु ने अपने बारह चेलों को पास बुलाया और उन्हें अशुद्ध आत्माओं पर अधिकार दिया, ताकि वे उन्हें निकालें और लोगों को हर प्रकार की बीमारी और हर प्रकार की दुर्बलता से चंगा करें।"
    - verse: 2
      text: "बारह प्रेरितों के नाम ये हैं: पहला, शमौन, जो पतरस कहलाता है, और उसका भाई अन्द्रियास; जब्दी का पुत्र याकूब और उसका भाई यूहन्ना;"
    - verse: 3
      text: "फिलिप्पुस और बरतुलमै; थोमा और मत्ती चुंगी लेने वाला; हलफई का पुत्र याकूब और तद्दयुस;"
    - verse: 4
      text: "शमौन कनानाई और यहूदा इस्करियोती, जिसने उसे सौंप दिया।"
    - verse: 5
      text: "यीशु ने इन बारहों को भेजा और उन्हें यह आदेश दिया: \"गैर-यहूदियों की ओर जाने वाले मार्ग पर मत जाना और सामरियों के किसी नगर में प्रवेश मत करना।"
    - verse: 6
      text: "बल्कि इस्राएल के घराने की खोई हुई भेड़ों के पास जाओ।"
    - verse: 7
      text: "जाते हुए यह प्रचार करो: 'स्वर्ग का राज्य निकट आ गया है।'"
    - verse: 8
      text: "बीमारों को चंगा करो, मरे हुओं को जिलाओ, कुष्ठ रोगियों को शुद्ध करो और दुष्टात्माओं को निकालो। तुमने बिना मूल्य पाया है; बिना मूल्य दो।"
    - verse: 9
      text: "अपने कमरबंदों में रखने के लिए सोना, चाँदी या ताँबा मत जुटाओ;"
    - verse: 10
      text: "और यात्रा के लिए न झोली, न दो कुर्ते, न चप्पलें, न लाठी जुटाओ; क्योंकि मजदूर अपने भोजन का अधिकारी है।"
    - verse: 11
      text: "जिस नगर या गाँव में प्रवेश करो, पता लगाओ कि वहाँ कौन योग्य है, और वहाँ से निकलने तक उसी के यहाँ ठहरो।"
    - verse: 12
      text: "घर में प्रवेश करते समय घरवालों को नमस्कार करो।"
    - verse: 13
      text: "यदि वह घर योग्य हो, तो तुम्हारी शांति उस पर आए; पर यदि वह योग्य न हो, तो तुम्हारी शांति तुम्हारे पास लौट आए।"
    - verse: 14
      text: "जो तुम्हें ग्रहण न करे और न तुम्हारी बातें सुने, उस घर या नगर से बाहर निकलते समय अपने पैरों की धूल झाड़ दो।"
    - verse: 15
      text: "मैं तुमसे सच कहता हूँ: न्याय के दिन सदोम और अमोरा की भूमि की दशा उस नगर की दशा से अधिक सहने योग्य होगी।"
    - verse: 16
      text: "देखो, मैं तुम्हें भेड़ियों के बीच भेड़ों की तरह भेज रहा हूँ। इसलिए साँपों की तरह समझदार और कबूतरों की तरह निष्कपट बनो।"
    - verse: 17
      text: "लोगों से सावधान रहो, क्योंकि वे तुम्हें परिषदों को सौंप देंगे और अपने सभाघरों में तुम्हें कोड़े मारेंगे।"
    - verse: 18
      text: "मेरे कारण तुम्हें राज्यपालों और राजाओं के सामने भी ले जाया जाएगा, ताकि उनके और गैर-यहूदियों के सामने गवाही हो।"
    - verse: 19
      text: "जब वे तुम्हें सौंपें, तो चिंता मत करना कि कैसे या क्या बोलोगे, क्योंकि उसी घड़ी तुम्हें बता दिया जाएगा कि क्या बोलना है।"
    - verse: 20
      text: "क्योंकि बोलने वाले तुम नहीं हो, बल्कि तुम्हारे पिता की आत्मा है, जो तुममें बोलती है।"
    - verse: 21
      text: "भाई अपने भाई को मृत्यु के लिए सौंप देगा और पिता अपने बच्चे को; बच्चे माता-पिता के विरुद्ध उठेंगे और उन्हें मरवा देंगे।"
    - verse: 22
      text: "मेरे नाम के कारण सब लोग तुमसे घृणा करेंगे; पर जो अंत तक धीरज धरेगा, वही बचाया जाएगा।"
    - verse: 23
      text: "जब वे इस नगर में तुम्हें सताएँ, तो दूसरे नगर में भाग जाओ; क्योंकि मैं तुमसे सच कहता हूँ: तुम इस्राएल के नगरों में जाना पूरा भी नहीं कर पाओगे कि मनुष्य का पुत्र आ जाएगा।"
    - verse: 24
      text: "चेला अपने गुरु से ऊपर नहीं होता, न दास अपने स्वामी से।"
    - verse: 25
      text: "चेले के लिए अपने गुरु जैसा और दास के लिए अपने स्वामी जैसा होना ही पर्याप्त है। यदि उन्होंने घर के स्वामी को बेलज़ेबूल कहा, तो उसके घरवालों को कितना अधिक कहेंगे!"
    - verse: 26
      text: "इसलिए उनसे मत डरो, क्योंकि ऐसा कुछ ढका नहीं है जो प्रकट न किया जाएगा, और ऐसा कुछ छिपा नहीं है जो जाना न जाएगा।"
    - verse: 27
      text: "जो मैं तुमसे अंधकार में कहता हूँ, उसे प्रकाश में कहो; और जो तुम कान में सुनते हो, उसका छतों से प्रचार करो।"
    - verse: 28
      text: "उनसे मत डरो जो शरीर को मार डालते हैं, लेकिन प्राण को नहीं मार सकते। बल्कि उससे डरो जो प्राण और शरीर दोनों को नरक में नष्ट कर सकता है।"
    - verse: 29
      text: "क्या दो गौरैयाँ एक पैसे में नहीं बिकतीं? फिर भी तुम्हारे पिता के बिना उनमें से एक भी धरती पर नहीं गिरती।"
    - verse: 30
      text: "और तुम्हारे सिर के सारे बाल भी गिने हुए हैं।"
    - verse: 31
      text: "इसलिए मत डरो; तुम बहुत-सी गौरैयों से अधिक मूल्यवान हो।"
    - verse: 32
      text: "इसलिए जो कोई लोगों के सामने मुझे स्वीकार करेगा, उसे मैं भी अपने स्वर्गीय पिता के सामने स्वीकार करूँगा।"
    - verse: 33
      text: "पर जो लोगों के सामने मुझे नकारेगा, उसे मैं भी अपने स्वर्गीय पिता के सामने नकार दूँगा।"
    - verse: 34
      text: "यह मत समझो कि मैं पृथ्वी पर शांति लाने आया हूँ। मैं शांति लाने नहीं, बल्कि तलवार लाने आया हूँ।"
    - verse: 35
      text: "क्योंकि मैं मनुष्य को उसके पिता के विरुद्ध, बेटी को उसकी माँ के विरुद्ध और बहू को उसकी सास के विरुद्ध खड़ा करने आया हूँ;"
    - verse: 36
      text: "और मनुष्य के शत्रु उसके अपने घरवाले होंगे।"
    - verse: 37
      text: "जो अपने पिता या माँ को मुझसे बढ़कर प्रेम करता है, वह मेरे योग्य नहीं; और जो अपने बेटे या बेटी को मुझसे बढ़कर प्रेम करता है, वह मेरे योग्य नहीं।"
    - verse: 38
      text: "और जो अपना क्रूस नहीं उठाता और मेरे पीछे नहीं चलता, वह मेरे योग्य नहीं।"
    - verse: 39
      text: "जो अपने प्राण बचाता है, वह उसे खो देगा; और जो मेरे कारण अपना प्राण खो देता है, वह उसे पाएगा।"
    - verse: 40
      text: "जो तुम्हें ग्रहण करता है, वह मुझे ग्रहण करता है; और जो मुझे ग्रहण करता है, वह उसे ग्रहण करता है जिसने मुझे भेजा है।"
    - verse: 41
      text: "जो किसी भविष्यवक्ता को भविष्यवक्ता जानकर ग्रहण करता है, उसे भविष्यवक्ता का प्रतिफल मिलेगा; और जो किसी धर्मी को धर्मी जानकर ग्रहण करता है, उसे धर्मी का प्रतिफल मिलेगा।"
    - verse: 42
      text: "और जो कोई इन छोटों में से किसी एक को चेला जानकर केवल एक प्याला ठंडा पानी भी पिलाए, मैं तुमसे सच कहता हूँ: वह अपना प्रतिफल किसी भी तरह नहीं खोएगा।\""
