- book: "मत्ती"
  chapter: 22
  verses:
    - verse: 1
      text: "यीशु ने फिर उत्तर देते हुए उनसे दृष्टांतों में कहा:"
    - verse: 2
      text: "\"स्वर्ग का राज्य उस राजा के समान है जिसने अपने पुत्र के लिए विवाह-भोज रखा।"
    - verse: 3
      text: "उसने अपने दासों को भेजा कि निमंत्रित लोगों को विवाह-भोज में बुलाएँ, लेकिन वे आना नहीं चाहते थे।"
    - verse: 4
      text: "उसने फिर दूसरे दासों को भेजते हुए कहा, 'निमंत्रित लोगों से कहो: देखो, मैंने अपना भोज तैयार कर लिया है। मेरे बैल और पाले-पोसे पशु काटे जा चुके हैं, और सब कुछ तैयार है। विवाह-भोज में आओ।'"
    - verse: 5
      text: "लेकिन उन्होंने परवाह नहीं की और चले गए, कोई अपने खेत में और कोई अपने व्यापार में।"
    - verse: 6
      text: "बाकी लोगों ने उसके दासों को पकड़ लिया, उनका अपमान किया और उन्हें मार डाला।"
    - verse: 7
      text: "राजा क्रोधित हुआ। उसने अपनी सेनाएँ भेजीं, उन हत्यारों को नष्ट कर दिया और उनका नगर जला दिया।"
    - verse: 8
      text: "तब उसने अपने दासों से कहा, 'विवाह-भोज तैयार है, लेकिन निमंत्रित लोग योग्य नहीं थे।"
    - verse: 9
      text: "इसलिए रास्तों के चौराहों पर जाओ और जितनों को पाओ, उन्हें विवाह-भोज में बुला लो।'"
    - verse: 10
      text: "वे दास रास्तों पर निकले और जितनों को पाया, बुरे और भले, सबको इकट्ठा कर लाए; और विवाह-भोज अतिथियों से भर गया।"
    - verse: 11
      text: "जब राजा अतिथियों को देखने आया, तो उसने वहाँ एक व्यक्ति को देखा जिसने विवाह का वस्त्र नहीं पहना था।"
    - verse: 12
      text: "उसने उससे कहा, 'मित्र, तुम विवाह का वस्त्र पहने बिना यहाँ कैसे आ गए?' वह निरुत्तर हो गया।"
    - verse: 13
      text: "तब राजा ने सेवकों से कहा, 'इसके हाथ-पैर बाँधकर इसे बाहरी अंधकार में फेंक दो; वहाँ रोना और दाँत पीसना होगा।'"
    - verse: 14
      text: "क्योंकि बुलाए हुए बहुत हैं, लेकिन चुने हुए थोड़े हैं।\""
    - verse: 15
      text: "तब फरीसियों ने जाकर आपस में सलाह की कि उसे उसकी बातों में कैसे फँसाएँ।"
    - verse: 16
      text: "उन्होंने अपने चेलों को हेरोदियों के साथ उसके पास भेजा। उन्होंने कहा, \"गुरु, हम जानते हैं कि आप सच्चे हैं और परमेश्वर का मार्ग सच्चाई से सिखाते हैं। आप किसी के दबाव में नहीं आते, क्योंकि आप मनुष्यों का मुँह देखकर पक्षपात नहीं करते।"
    - verse: 17
      text: "इसलिए हमें बताइए, आपका क्या विचार है: कैसर को कर देना उचित है या नहीं?\""
    - verse: 18
      text: "यीशु ने उनकी दुष्टता जानकर कहा, \"कपटियो, मुझे क्यों परखते हो?"
    - verse: 19
      text: "कर का सिक्का मुझे दिखाओ।\" वे उसके पास एक दीनार लाए।"
    - verse: 20
      text: "उसने उनसे पूछा, \"इस पर किसकी आकृति और किसका लेख है?\""
    - verse: 21
      text: "उन्होंने कहा, \"कैसर का।\" तब उसने उनसे कहा, \"इसलिए कैसर का जो है उसे कैसर को और परमेश्वर का जो है उसे परमेश्वर को लौटा दो।\""
    - verse: 22
      text: "यह सुनकर वे चकित हुए और उसे छोड़कर चले गए।"
    - verse: 23
      text: "उसी दिन सदूकी, जो कहते हैं कि पुनरुत्थान नहीं होता, उसके पास आए और उससे पूछा:"
    - verse: 24
      text: "\"गुरु, मूसा ने कहा, 'यदि कोई बिना संतान के मर जाए, तो उसका भाई उसकी पत्नी से विवाह करे और अपने मृत भाई के लिए संतान उत्पन्न करे।'"
    - verse: 25
      text: "हमारे यहाँ सात भाई थे। पहले ने विवाह किया और मर गया। संतान न होने के कारण वह अपनी पत्नी अपने भाई के लिए छोड़ गया।"
    - verse: 26
      text: "ऐसा ही दूसरे, तीसरे और सातों के साथ हुआ।"
    - verse: 27
      text: "सबके बाद वह स्त्री भी मर गई।"
    - verse: 28
      text: "तो पुनरुत्थान में वह सातों में से किसकी पत्नी होगी? क्योंकि सबने उससे विवाह किया था।\""
    - verse: 29
      text: "यीशु ने उन्हें उत्तर दिया, \"तुम भूल में हो, क्योंकि तुम न शास्त्रों को जानते हो और न परमेश्वर की सामर्थ्य को।"
    - verse: 30
      text: "पुनरुत्थान में लोग न विवाह करते हैं, न विवाह में दिए जाते हैं; बल्कि स्वर्ग में परमेश्वर के स्वर्गदूतों के समान होते हैं।"
    - verse: 31
      text: "और मरे हुओं के पुनरुत्थान के विषय में, क्या तुमने वह नहीं पढ़ा जो परमेश्वर ने तुमसे कहा:"
    - verse: 32
      text: "'मैं अब्राहम का परमेश्वर, इसहाक का परमेश्वर और याकूब का परमेश्वर हूँ'? वह मरे हुओं का नहीं, बल्कि जीवितों का परमेश्वर है।\""
    - verse: 33
      text: "यह सुनकर भीड़ें उसकी शिक्षा से चकित थीं।"
    - verse: 34
      text: "फरीसियों ने सुना कि उसने सदूकियों को निरुत्तर कर दिया है, तो वे एक साथ इकट्ठे हुए।"
    - verse: 35
      text: "उनमें से व्यवस्था के एक जानकार ने उसे परखने के लिए पूछा:"
    - verse: 36
      text: "\"गुरु, व्यवस्था में कौन सी आज्ञा सबसे बड़ी है?\""
    - verse: 37
      text: "उसने उससे कहा, \"अपने प्रभु परमेश्वर से अपने पूरे हृदय, अपने पूरे प्राण और अपनी पूरी बुद्धि से प्रेम करो।"
    - verse: 38
      text: "यही बड़ी और पहली आज्ञा है।"
    - verse: 39
      text: "और दूसरी इसके समान है: अपने पड़ोसी से अपने समान प्रेम करो।"
    - verse: 40
      text: "इन्हीं दो आज्ञाओं पर पूरी व्यवस्था और भविष्यवक्ता टिके हुए हैं।\""
    - verse: 41
      text: "जब फरीसी इकट्ठे थे, तो यीशु ने उनसे पूछा:"
    - verse: 42
      text: "\"मसीह के विषय में तुम क्या सोचते हो? वह किसका पुत्र है?\" उन्होंने कहा, \"दाऊद का।\""
    - verse: 43
      text: "उसने उनसे कहा, \"तो दाऊद आत्मा में उसे प्रभु कैसे कहता है:"
    - verse: 44
      text: "'प्रभु ने मेरे प्रभु से कहा: मेरे दाहिने बैठ, जब तक मैं तेरे शत्रुओं को तेरे पैरों के नीचे न रख दूँ।'"
    - verse: 45
      text: "यदि दाऊद उसे प्रभु कहता है, तो वह उसका पुत्र कैसे है?\""
    - verse: 46
      text: "कोई उसे एक शब्द भी उत्तर न दे सका, और उस दिन से किसी ने उससे फिर कोई प्रश्न करने का साहस नहीं किया।"
