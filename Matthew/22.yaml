 book: "मत्ती"
  chapter: 12
  verses:
    - verse: 1
      text: "उस समय यीशु सब्त के दिन अनाज के खेतों से होकर जा रहा था। उसके चेले भूखे थे और अनाज की बालें तोड़कर खाने लगे।"
    - verse: 2
      text: "यह देखकर फरीसियों ने उससे कहा, \"देखिए, आपके चेले वह कर रहे हैं जो सब्त के दिन करना उचित नहीं है।\""
    - verse: 3
      text: "उसने उनसे कहा, \"क्या तुमने नहीं पढ़ा कि दाऊद ने क्या किया, जब वह और उसके साथी भूखे थे?"
    - verse: 4
      text: "वह परमेश्वर के घर में गया और उन्होंने भेंट की रोटियाँ खाईं, जिन्हें खाना न उसके लिए उचित था, न उसके साथियों के लिए, बल्कि केवल याजकों के लिए?"
    - verse: 5
      text: "या क्या तुमने व्यवस्था में नहीं पढ़ा कि याजक सब्त के दिन मंदिर में सब्त की पवित्रता भंग करते हैं, फिर भी निर्दोष हैं?"
    - verse: 6
      text: "पर मैं तुमसे कहता हूँ: यहाँ मंदिर से भी कुछ बड़ा है।"
    - verse: 7
      text: "यदि तुम जानते कि इसका अर्थ क्या है, 'मैं दया चाहता हूँ, बलिदान नहीं,' तो निर्दोषों को दोषी न ठहराते।"
    - verse: 8
      text: "क्योंकि मनुष्य का पुत्र सब्त का प्रभु है।\""
    - verse: 9
      text: "यीशु वहाँ से चलकर उनके सभाघर में गया।"
    - verse: 10
      text: "और देखो, वहाँ एक व्यक्ति था जिसका हाथ सूख गया था। उन्होंने उस पर आरोप लगाने के लिए उससे पूछा, \"क्या सब्त के दिन चंगा करना उचित है?\""
    - verse: 11
      text: "उसने उनसे कहा, \"तुममें ऐसा कौन है जिसकी एक भेड़ हो और यदि वह सब्त के दिन गड्ढे में गिर जाए, तो वह उसे पकड़कर बाहर न निकाले?"
    - verse: 12
      text: "तो मनुष्य भेड़ से कितना अधिक मूल्यवान है! इसलिए सब्त के दिन भला करना उचित है।\""
    - verse: 13
      text: "तब उसने उस व्यक्ति से कहा, \"अपना हाथ बढ़ाओ।\" उसने हाथ बढ़ाया, और वह दूसरे हाथ की तरह स्वस्थ हो गया।"
    - verse: 14
      text: "लेकिन फरीसी बाहर गए और उसके विरुद्ध यह योजना बनाने लगे कि उसे कैसे मार डालें।"
    - verse: 15
      text: "यीशु यह जानकर वहाँ से चला गया। बहुत से लोग उसके पीछे हो लिए, और उसने उन सबको चंगा किया।"
    - verse: 16
      text: "उसने उन्हें कड़ी चेतावनी दी कि वे उसे प्रकट न करें,"
    - verse: 17
      text: "ताकि भविष्यवक्ता यशायाह के द्वारा कही गई यह बात पूरी हो:"
    - verse: 18
      text: "\"देखो, मेरा सेवक, जिसे मैंने चुना है; मेरा प्रिय, जिससे मेरा प्राण प्रसन्न है। मैं अपनी आत्मा उस पर रखूँगा, और वह गैर-यहूदियों को न्याय की घोषणा करेगा।"
    - verse: 19
      text: "वह न झगड़ेगा, न चिल्लाएगा, और न सड़कों पर कोई उसकी आवाज सुनेगा।"
    - verse: 20
      text: "वह कुचले हुए सरकंडे को नहीं तोड़ेगा और सुलगती हुई बाती को नहीं बुझाएगा, जब तक वह न्याय को विजय तक न पहुँचा दे।"
    - verse: 21
      text: "और गैर-यहूदी उसके नाम पर आशा रखेंगे।\""
    - verse: 22
      text: "तब एक दुष्टात्मा से ग्रस्त अंधा और मूक व्यक्ति उसके पास लाया गया। यीशु ने उसे चंगा किया, और वह बोलने और देखने लगा।"
    - verse: 23
      text: "भीड़ें चकित होकर कहने लगीं, \"क्या यह दाऊद का पुत्र हो सकता है?\""
    - verse: 24
      text: "यह सुनकर फरीसियों ने कहा, \"यह दुष्टात्माओं को केवल दुष्टात्माओं के सरदार बेलज़ेबूल के द्वारा निकालता है।\""
    - verse: 25
      text: "उनके विचार जानकर यीशु ने उनसे कहा, \"हर राज्य जो अपने ही विरुद्ध बँट जाता है, उजड़ जाता है; और हर नगर या घर जो अपने ही विरुद्ध बँट जाता है, टिक नहीं सकता।"
    - verse: 26
      text: "यदि शैतान शैतान को निकालता है, तो वह अपने ही विरुद्ध बँट गया है। फिर उसका राज्य कैसे टिकेगा?"
    - verse: 27
      text: "और यदि मैं बेलज़ेबूल के द्वारा दुष्टात्माओं को निकालता हूँ, तो तुम्हारे अपने लोग किसके द्वारा निकालते हैं? इसलिए वे ही तुम्हारा न्याय करेंगे।"
    - verse: 28
      text: "पर यदि मैं परमेश्वर की आत्मा के द्वारा दुष्टात्माओं को निकालता हूँ, तो परमेश्वर का राज्य तुम पर आ पहुँचा है।"
    - verse: 29
      text: "या कोई किसी बलवान व्यक्ति के घर में घुसकर उसकी संपत्ति कैसे लूट सकता है, जब तक पहले उस बलवान को बाँध न ले? तब वह उसके घर को लूट लेगा।"
    - verse: 30
      text: "जो मेरे साथ नहीं है, वह मेरे विरुद्ध है; और जो मेरे साथ इकट्ठा नहीं करता, वह बिखेरता है।"
    - verse: 31
      text: "इसलिए मैं तुमसे कहता हूँ: लोगों के हर पाप और हर निंदा को क्षमा किया जाएगा, लेकिन आत्मा के विरुद्ध निंदा को क्षमा नहीं किया जाएगा।"
    - verse: 32
      text: "जो कोई मनुष्य के पुत्र के विरुद्ध कुछ कहे, उसे क्षमा किया जाएगा; पर जो कोई पवित्र आत्मा के विरुद्ध बोले, उसे न इस युग में, न आने वाले युग में क्षमा किया जाएगा।"
    - verse: 33
      text: "या तो पेड़ को अच्छा बनाओ और उसके फल को भी अच्छा, या पेड़ को सड़ा हुआ बनाओ और उसके फल को भी सड़ा हुआ; क्योंकि पेड़ अपने फल से पहचाना जाता है।"
    - verse: 34
      text: "विषधरों की संतान! तुम बुरे होकर भली बातें कैसे कह सकते हो? क्योंकि हृदय में जो भरा है, मुँह वही बोलता है।"
    - verse: 35
      text: "भला व्यक्ति अपने भले खजाने से भली चीजें निकालता है, और बुरा व्यक्ति अपने बुरे खजाने से बुरी चीजें निकालता है।"
    - verse: 36
      text: "मैं तुमसे कहता हूँ: लोग जो भी निरर्थक बात कहेंगे, न्याय के दिन उसका लेखा देंगे।"
    - verse: 37
      text: "क्योंकि अपनी बातों से तुम धर्मी ठहराए जाओगे, और अपनी बातों से दोषी ठहराए जाओगे।\""
    - verse: 38
      text: "तब कुछ शास्त्रियों और फरीसियों ने उससे कहा, \"गुरु, हम आपसे एक चिन्ह देखना चाहते हैं।\""
    - verse: 39
      text: "उसने उन्हें उत्तर दिया, \"बुरी और व्यभिचारी पीढ़ी चिन्ह की खोज करती है, लेकिन योना भविष्यवक्ता के चिन्ह के सिवाय उसे कोई चिन्ह नहीं दिया जाएगा।"
    - verse: 40
      text: "क्योंकि जैसे योना तीन दिन और तीन रात विशाल मछली के पेट में रहा, वैसे ही मनुष्य का पुत्र तीन दिन और तीन रात पृथ्वी के हृदय में रहेगा।"
    - verse: 41
      text: "नीनवे के लोग न्याय के दिन इस पीढ़ी के साथ उठ खड़े होंगे और इसे दोषी ठहराएँगे, क्योंकि उन्होंने योना के प्रचार पर पश्चाताप किया; और देखो, यहाँ योना से भी कुछ बड़ा है।"
    - verse: 42
      text: "दक्षिण की रानी न्याय के दिन इस पीढ़ी के साथ उठेगी और इसे दोषी ठहराएगी, क्योंकि वह सुलैमान की बुद्धि सुनने के लिए पृथ्वी के छोर से आई थी; और देखो, यहाँ सुलैमान से भी कुछ बड़ा है।"
    - verse: 43
      text: "जब अशुद्ध आत्मा किसी व्यक्ति से निकल जाती है, तो वह सूखी जगहों में विश्राम खोजती फिरती है, पर उसे नहीं पाती।"
    - verse: 44
      text: "तब वह कहती है, 'मैं अपने उस घर में लौट जाऊँगी जहाँ से निकली थी।' लौटने पर वह उसे खाली, झाड़ा-बुहारा और सजा हुआ पाती है।"
    - verse: 45
      text: "तब वह जाकर अपने से भी अधिक बुरी सात और आत्माओं को अपने साथ ले आती है। वे भीतर जाकर वहाँ रहने लगती हैं, और उस व्यक्ति की अंतिम दशा पहली से भी बुरी हो जाती है। इस बुरी पीढ़ी के साथ भी ऐसा ही होगा।\""
    - verse: 46
      text: "जब वह अभी भी भीड़ से बात कर रहा था, तो देखो, उसकी माँ और उसके भाई बाहर खड़े थे और उससे बात करना चाहते थे।"
    - verse: 47
      text: "किसी ने उससे कहा, \"देखिए, आपकी माँ और आपके भाई बाहर खड़े हैं और आपसे बात करना चाहते हैं।\""
    - verse: 48
      text: "उसने यह कहने वाले को उत्तर दिया, \"कौन है मेरी माँ, और कौन हैं मेरे भाई?\""
    - verse: 49
      text: "फिर उसने अपने चेलों की ओर हाथ बढ़ाकर कहा, \"देखो, ये हैं मेरी माँ और मेरे भाई!"
    - verse: 50
      text: "क्योंकि जो कोई मेरे स्वर्गीय पिता की इच्छा पूरी करता है, वही मेरा भाई, बहन और माँ है।\""
