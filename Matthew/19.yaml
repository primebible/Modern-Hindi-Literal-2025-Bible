- book: "मत्ती"
  chapter: 19
  verses:
    - verse: 1
      text: "जब यीशु ये बातें कह चुका, तो वह गलील से चला गया और यर्दन के पार यहूदिया के क्षेत्र में पहुँचा।"
    - verse: 2
      text: "लोगों की बड़ी-बड़ी भीड़ें उसके पीछे हो लीं, और उसने वहाँ उन्हें चंगा किया।"
    - verse: 3
      text: "फरीसी उसके पास आए और उसे परखने के लिए पूछा, \"क्या किसी पुरुष के लिए अपनी पत्नी को किसी भी कारण से तलाक देना उचित है?\""
    - verse: 4
      text: "उसने उत्तर दिया, \"क्या तुमने नहीं पढ़ा कि आरंभ से सृष्टिकर्ता ने उन्हें पुरुष और स्त्री बनाया"
    - verse: 5
      text: "और कहा, 'इस कारण पुरुष अपने पिता और माँ को छोड़कर अपनी पत्नी से जुड़ जाएगा, और वे दोनों एक तन होंगे'?"
    - verse: 6
      text: "इसलिए वे अब दो नहीं, बल्कि एक तन हैं। अतः जिसे परमेश्वर ने जोड़ा है, उसे मनुष्य अलग न करे।\""
    - verse: 7
      text: "उन्होंने उससे पूछा, \"तो फिर मूसा ने तलाक-पत्र देकर उसे छोड़ देने की आज्ञा क्यों दी?\""
    - verse: 8
      text: "उसने उनसे कहा, \"मूसा ने तुम्हारे हृदय की कठोरता के कारण तुम्हें अपनी पत्नियों को तलाक देने की अनुमति दी, लेकिन आरंभ से ऐसा नहीं था।"
    - verse: 9
      text: "मैं तुमसे कहता हूँ: जो कोई अनैतिक यौन-संबंध के सिवा अपनी पत्नी को तलाक देकर दूसरी से विवाह करता है, वह व्यभिचार करता है; और जो तलाक दी हुई स्त्री से विवाह करता है, वह भी व्यभिचार करता है।\""
    - verse: 10
      text: "चेलों ने उससे कहा, \"यदि पुरुष की अपनी पत्नी के साथ यही स्थिति है, तो विवाह न करना ही अच्छा है।\""
    - verse: 11
      text: "उसने उनसे कहा, \"सब लोग यह बात ग्रहण नहीं कर सकते, बल्कि केवल वे जिन्हें यह दिया गया है।"
    - verse: 12
      text: "क्योंकि कुछ नपुंसक ऐसे हैं जो अपनी माँ के गर्भ से ही ऐसे जन्मे हैं; कुछ ऐसे हैं जिन्हें मनुष्यों ने नपुंसक बनाया; और कुछ ऐसे हैं जिन्होंने स्वर्ग के राज्य के कारण अपने आपको नपुंसक बना लिया। जो इसे ग्रहण कर सके, वह करे।\""
    - verse: 13
      text: "तब बच्चे उसके पास लाए गए, ताकि वह उन पर हाथ रखे और प्रार्थना करे; लेकिन चेलों ने उन्हें डाँटा।"
    - verse: 14
      text: "यीशु ने कहा, \"बच्चों को मेरे पास आने दो और उन्हें मत रोको, क्योंकि स्वर्ग का राज्य ऐसों का है।\""
    - verse: 15
      text: "उन पर हाथ रखकर वह वहाँ से चला गया।"
    - verse: 16
      text: "और देखो, एक व्यक्ति उसके पास आया और बोला, \"गुरु, मैं कौन सा भला काम करूँ कि अनंत जीवन पाऊँ?\""
    - verse: 17
      text: "उसने उससे कहा, \"तुम मुझसे भले के विषय में क्यों पूछते हो? भला तो एक ही है। यदि तुम जीवन में प्रवेश करना चाहते हो, तो आज्ञाओं का पालन करो।\""
    - verse: 18
      text: "उसने पूछा, \"कौन सी?\" यीशु ने कहा, \"हत्या मत करना; व्यभिचार मत करना; चोरी मत करना; झूठी गवाही मत देना;"
    - verse: 19
      text: "अपने पिता और माँ का आदर करो; और अपने पड़ोसी से अपने समान प्रेम करो।\""
    - verse: 20
      text: "युवक ने उससे कहा, \"मैंने इन सबका पालन किया है। अब मुझमें किस बात की कमी है?\""
    - verse: 21
      text: "यीशु ने उससे कहा, \"यदि तुम पूर्ण होना चाहते हो, तो जाओ, अपनी संपत्ति बेचकर गरीबों को दे दो, और तुम्हें स्वर्ग में खजाना मिलेगा। फिर आकर मेरे पीछे चलो।\""
    - verse: 22
      text: "यह वचन सुनकर युवक दुःखी होकर चला गया, क्योंकि उसके पास बहुत संपत्ति थी।"
    - verse: 23
      text: "यीशु ने अपने चेलों से कहा, \"मैं तुमसे सच कहता हूँ: धनी व्यक्ति का स्वर्ग के राज्य में प्रवेश करना कठिन है।"
    - verse: 24
      text: "फिर मैं तुमसे कहता हूँ: ऊँट का सुई के छेद से निकलना धनी व्यक्ति के परमेश्वर के राज्य में प्रवेश करने से आसान है।\""
    - verse: 25
      text: "यह सुनकर चेले बहुत चकित हुए और बोले, \"तो फिर कौन बचाया जा सकता है?\""
    - verse: 26
      text: "यीशु ने उनकी ओर देखकर कहा, \"मनुष्यों के लिए यह असंभव है, लेकिन परमेश्वर के लिए सब कुछ संभव है।\""
    - verse: 27
      text: "तब पतरस ने उससे कहा, \"देखिए, हम सब कुछ छोड़कर आपके पीछे हो लिए हैं। तो हमें क्या मिलेगा?\""
    - verse: 28
      text: "यीशु ने उनसे कहा, \"मैं तुमसे सच कहता हूँ: नई सृष्टि में, जब मनुष्य का पुत्र अपनी महिमा के सिंहासन पर बैठेगा, तब तुम जो मेरे पीछे चले हो, बारह सिंहासनों पर बैठकर इस्राएल के बारह गोत्रों का न्याय करोगे।"
    - verse: 29
      text: "और जिसने भी मेरे नाम के कारण घरों, भाइयों, बहनों, पिता, माँ, पत्नी, बच्चों या खेतों को छोड़ा है, उसे सौ गुना मिलेगा और वह अनंत जीवन विरासत में पाएगा।"
    - verse: 30
      text: "लेकिन बहुत से पहले अंतिम होंगे, और अंतिम पहले होंगे।\""
