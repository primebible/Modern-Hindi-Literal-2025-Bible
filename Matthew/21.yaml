- book: "मत्ती"
  chapter: 21
  verses:
    - verse: 1
      text: "जब वे यरूशलेम के निकट पहुँचे और जैतून के पहाड़ पर स्थित बैतफगे आए, तब यीशु ने दो चेलों को भेजा।"
    - verse: 2
      text: "उसने उनसे कहा, \"तुम्हारे सामने वाले गाँव में जाओ। तुम्हें तुरंत एक गदही बँधी हुई मिलेगी और उसके साथ उसका बच्चा भी। उन्हें खोलकर मेरे पास ले आओ।"
    - verse: 3
      text: "यदि कोई तुमसे कुछ कहे, तो कहना, 'प्रभु को इनकी आवश्यकता है,' और वह उन्हें तुरंत भेज देगा।\""
    - verse: 4
      text: "यह इसलिए हुआ ताकि भविष्यवक्ता के द्वारा कही गई यह बात पूरी हो:"
    - verse: 5
      text: "\"सिय्योन की बेटी से कहो, 'देखो, तेरा राजा तेरे पास आ रहा है, नम्र, गदही पर सवार, और उसके बच्चे पर, बोझ ढोने वाले पशु के बच्चे पर।'\""
    - verse: 6
      text: "चेलों ने जाकर वैसा ही किया जैसा यीशु ने उन्हें आदेश दिया था।"
    - verse: 7
      text: "वे गदही और उसके बच्चे को ले आए, अपने वस्त्र उन पर रखे, और यीशु उन पर बैठ गया।"
    - verse: 8
      text: "भीड़ के अधिकतर लोगों ने अपने वस्त्र रास्ते पर बिछा दिए, और कुछ अन्य लोगों ने पेड़ों से डालियाँ काटकर रास्ते पर बिछाईं।"
    - verse: 9
      text: "उसके आगे चलने वाली और पीछे आने वाली भीड़ें पुकार रही थीं, \"होशाना दाऊद के पुत्र को! धन्य है वह जो प्रभु के नाम से आता है! सर्वोच्च स्थानों में होशाना!\""
    - verse: 10
      text: "जब उसने यरूशलेम में प्रवेश किया, तो सारा नगर हिल उठा और लोग पूछने लगे, \"यह कौन है?\""
    - verse: 11
      text: "भीड़ें कह रही थीं, \"यह भविष्यवक्ता यीशु है, जो गलील के नासरत से है।\""
    - verse: 12
      text: "यीशु मंदिर में गया और वहाँ बेचने और खरीदने वाले सभी लोगों को बाहर निकाल दिया। उसने सिक्के बदलने वालों की मेजें और कबूतर बेचने वालों की कुर्सियाँ उलट दीं।"
    - verse: 13
      text: "उसने उनसे कहा, \"लिखा है: 'मेरा घर प्रार्थना का घर कहलाएगा,' लेकिन तुम उसे डाकुओं की गुफा बना रहे हो।\""
    - verse: 14
      text: "अंधे और लंगड़े मंदिर में उसके पास आए, और उसने उन्हें चंगा किया।"
    - verse: 15
      text: "प्रधान याजकों और शास्त्रियों ने उसके किए अद्भुत काम देखे और मंदिर में बच्चों को पुकारते सुना, \"होशाना दाऊद के पुत्र को!\" तब वे नाराज हो गए"
    - verse: 16
      text: "और उससे बोले, \"क्या आप सुन रहे हैं कि ये क्या कह रहे हैं?\" यीशु ने उनसे कहा, \"हाँ। क्या तुमने कभी नहीं पढ़ा, 'बालकों और दूध पीते बच्चों के मुँह से आपने स्तुति तैयार की है'?\""
    - verse: 17
      text: "फिर वह उन्हें छोड़कर नगर से बाहर बैतनिया चला गया और वहाँ रात बिताई।"
    - verse: 18
      text: "सुबह जब वह नगर में लौट रहा था, तो उसे भूख लगी।"
    - verse: 19
      text: "रास्ते के किनारे एक अंजीर का पेड़ देखकर वह उसके पास गया, लेकिन पत्तों के सिवा उस पर कुछ नहीं पाया। उसने उससे कहा, \"अब तुझ पर कभी फल न लगे!\" और अंजीर का पेड़ तुरंत सूख गया।"
    - verse: 20
      text: "यह देखकर चेले चकित हुए और बोले, \"अंजीर का पेड़ तुरंत कैसे सूख गया?\""
    - verse: 21
      text: "यीशु ने उन्हें उत्तर दिया, \"मैं तुमसे सच कहता हूँ: यदि तुम विश्वास रखो और संदेह न करो, तो केवल अंजीर के पेड़ के साथ हुआ काम ही नहीं करोगे, बल्कि यदि इस पहाड़ से कहो, 'उठकर सागर में जा गिर,' तो ऐसा हो जाएगा।"
    - verse: 22
      text: "और प्रार्थना में विश्वास के साथ जो कुछ माँगोगे, वह सब पाओगे।\""
    - verse: 23
      text: "जब वह मंदिर में आया और शिक्षा दे रहा था, तो प्रधान याजक और लोगों के प्राचीन उसके पास आए और बोले, \"आप ये काम किस अधिकार से करते हैं? और आपको यह अधिकार किसने दिया?\""
    - verse: 24
      text: "यीशु ने उन्हें उत्तर दिया, \"मैं भी तुमसे एक बात पूछूँगा। यदि तुम मुझे उसका उत्तर दो, तो मैं भी तुम्हें बता दूँगा कि मैं ये काम किस अधिकार से करता हूँ।"
    - verse: 25
      text: "यूहन्ना का बपतिस्मा कहाँ से था: स्वर्ग से या मनुष्यों से?\" वे आपस में विचार करने लगे, \"यदि हम कहें, 'स्वर्ग से,' तो वह हमसे कहेगा, 'फिर तुमने उस पर विश्वास क्यों नहीं किया?'"
    - verse: 26
      text: "लेकिन यदि हम कहें, 'मनुष्यों से,' तो हमें भीड़ का डर है, क्योंकि सभी लोग यूहन्ना को भविष्यवक्ता मानते हैं।\""
    - verse: 27
      text: "उन्होंने यीशु को उत्तर दिया, \"हम नहीं जानते।\" उसने उनसे कहा, \"तो मैं भी तुम्हें नहीं बताता कि मैं ये काम किस अधिकार से करता हूँ।\""
    - verse: 28
      text: "\"तुम क्या सोचते हो? किसी व्यक्ति के दो बेटे थे। वह पहले के पास गया और बोला, 'बेटे, आज दाख की बारी में जाकर काम करो।'"
    - verse: 29
      text: "उसने उत्तर दिया, 'मैं नहीं जाना चाहता,' लेकिन बाद में उसने अपना मन बदला और चला गया।"
    - verse: 30
      text: "फिर पिता दूसरे के पास गया और वही बात कही। उसने उत्तर दिया, 'जी, स्वामी,' लेकिन वह नहीं गया।"
    - verse: 31
      text: "इन दोनों में से किसने पिता की इच्छा पूरी की?\" उन्होंने कहा, \"पहले ने।\" यीशु ने उनसे कहा, \"मैं तुमसे सच कहता हूँ: चुंगी लेने वाले और वेश्याएँ तुमसे पहले परमेश्वर के राज्य में प्रवेश कर रहे हैं।"
    - verse: 32
      text: "क्योंकि यूहन्ना धार्मिकता के मार्ग पर तुम्हारे पास आया, और तुमने उस पर विश्वास नहीं किया; लेकिन चुंगी लेने वालों और वेश्याओं ने उस पर विश्वास किया। फिर भी यह देखकर तुमने बाद में अपना मन नहीं बदला और उस पर विश्वास नहीं किया।\""
    - verse: 33
      text: "\"एक और दृष्टांत सुनो। एक गृहस्थ था जिसने दाख की बारी लगाई, उसके चारों ओर बाड़ लगाई, उसमें दाखरस का कुंड खोदा, एक मीनार बनाई, उसे किसानों को बटाई पर दे दिया और परदेस चला गया।"
    - verse: 34
      text: "जब फल का समय निकट आया, तो उसने अपने दासों को किसानों के पास अपना फल लेने भेजा।"
    - verse: 35
      text: "किसानों ने उसके दासों को पकड़ लिया; किसी को पीटा, किसी को मार डाला और किसी पर पत्थर बरसाए।"
    - verse: 36
      text: "उसने फिर पहले से अधिक दास भेजे, और किसानों ने उनके साथ भी वैसा ही किया।"
    - verse: 37
      text: "अंत में उसने अपने पुत्र को उनके पास भेजते हुए कहा, 'वे मेरे पुत्र का आदर करेंगे।'"
    - verse: 38
      text: "लेकिन किसानों ने पुत्र को देखकर आपस में कहा, 'यह उत्तराधिकारी है। आओ, इसे मार डालें और इसकी विरासत पर कब्जा कर लें।'"
    - verse: 39
      text: "उन्होंने उसे पकड़कर दाख की बारी से बाहर निकाल दिया और मार डाला।"
    - verse: 40
      text: "इसलिए जब दाख की बारी का स्वामी आएगा, तो वह उन किसानों के साथ क्या करेगा?\""
    - verse: 41
      text: "उन्होंने उससे कहा, \"वह उन दुष्टों को बुरी तरह नष्ट करेगा और दाख की बारी दूसरे किसानों को बटाई पर देगा, जो समय आने पर उसे उसके फल देंगे।\""
    - verse: 42
      text: "यीशु ने उनसे कहा, \"क्या तुमने शास्त्रों में कभी नहीं पढ़ा: 'जिस पत्थर को राजमिस्त्रियों ने ठुकरा दिया, वही कोने का मुख्य पत्थर बन गया। यह प्रभु की ओर से हुआ, और हमारी आँखों में अद्भुत है'?"
    - verse: 43
      text: "इसलिए मैं तुमसे कहता हूँ: परमेश्वर का राज्य तुमसे ले लिया जाएगा और ऐसी प्रजा को दिया जाएगा जो उसके फल उत्पन्न करेगी।"
    - verse: 44
      text: "जो इस पत्थर पर गिरेगा, वह चकनाचूर हो जाएगा; और जिस पर यह पत्थर गिरेगा, उसे पीसकर धूल बना देगा।\""
    - verse: 45
      text: "प्रधान याजकों और फरीसियों ने उसके दृष्टांत सुने और समझ गए कि वह उन्हीं के विषय में कह रहा है।"
    - verse: 46
      text: "वे उसे पकड़ना चाहते थे, लेकिन भीड़ों से डरते थे, क्योंकि लोग उसे भविष्यवक्ता मानते थे।"
