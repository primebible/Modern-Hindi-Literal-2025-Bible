- book: "मत्ती"
  chapter: 8
  verses:
    - verse: 1
      text: "जब यीशु पहाड़ से नीचे उतरा, तो लोगों की बड़ी-बड़ी भीड़ें उसके पीछे हो लीं।"
    - verse: 2
      text: "और देखो, एक कुष्ठ रोगी उसके पास आया, उसे दंडवत किया और कहा, \"प्रभु, यदि आप चाहें, तो मुझे शुद्ध कर सकते हैं।\""
    - verse: 3
      text: "यीशु ने हाथ बढ़ाकर उसे छुआ और कहा, \"मैं चाहता हूँ; शुद्ध हो जाओ।\" और तुरंत वह अपने कुष्ठ से शुद्ध हो गया।"
    - verse: 4
      text: "यीशु ने उससे कहा, \"देखो, किसी से कुछ मत कहना। बल्कि जाओ, अपने आप को याजक को दिखाओ और जिस भेंट की आज्ञा मूसा ने दी थी, उसे चढ़ाओ, ताकि यह उनके लिए गवाही हो।\""
    - verse: 5
      text: "जब यीशु कफरनहूम में आया, तो एक शतपति (सौ सैनिकों का अधिकारी) उसके पास आया और उससे विनती करने लगा:"
    - verse: 6
      text: "\"प्रभु, मेरा सेवक घर में लकवे से पड़ा है और भयंकर पीड़ा सह रहा है।\""
    - verse: 7
      text: "यीशु ने उससे कहा, \"मैं आकर उसे चंगा करूँगा।\""
    - verse: 8
      text: "शतपति ने उत्तर दिया, \"प्रभु, मैं इस योग्य नहीं कि आप मेरी छत के नीचे आएँ। बस एक वचन कह दीजिए, और मेरा सेवक चंगा हो जाएगा।"
    - verse: 9
      text: "क्योंकि मैं भी अधिकार के अधीन व्यक्ति हूँ और मेरे अधीन सैनिक हैं। मैं एक से कहता हूँ, 'जाओ,' और वह जाता है; दूसरे से, 'आओ,' और वह आता है; और अपने दास से, 'यह करो,' और वह करता है।\""
    - verse: 10
      text: "यह सुनकर यीशु को आश्चर्य हुआ और उसने अपने पीछे आने वालों से कहा, \"मैं तुमसे सच कहता हूँ: इस्राएल में भी मैंने किसी में इतना विश्वास नहीं पाया।"
    - verse: 11
      text: "मैं तुमसे कहता हूँ कि पूर्व और पश्चिम से बहुत से लोग आएँगे और अब्राहम, इसहाक और याकूब के साथ स्वर्ग के राज्य में भोजन करने बैठेंगे,"
    - verse: 12
      text: "परन्तु राज्य के पुत्र बाहरी अंधकार में डाल दिए जाएँगे। वहाँ रोना और दाँत पीसना होगा।\""
      #राज्य के पुत्र: अर्थात वे लोग जिन्हें राज्य का स्वाभाविक वारिस या सदस्य माना जाता था। यह अभिव्यक्ति केवल पुरुषों तक सीमित नहीं है।
    - verse: 13
      text: "तब यीशु ने शतपति से कहा, \"जाओ; जैसा तुमने विश्वास किया है, वैसा ही तुम्हारे लिए हो।\" और उसी घड़ी उसका सेवक चंगा हो गया।"
    - verse: 14
      text: "जब यीशु पतरस के घर आया, तो उसने पतरस की सास को बुखार से तपती हुई पड़ी देखा।"
    - verse: 15
      text: "उसने उसका हाथ छुआ और उसका बुखार उतर गया। वह उठी और यीशु की सेवा करने लगी।"
    - verse: 16
      text: "शाम होने पर लोग दुष्टात्माओं से ग्रस्त बहुत से लोगों को उसके पास लाए। उसने एक वचन से दुष्टात्माओं को निकाल दिया और सभी बीमारों को चंगा किया,"
    - verse: 17
      text: "ताकि भविष्यवक्ता यशायाह के द्वारा कही गई यह बात पूरी हो: \"उसने स्वयं हमारी दुर्बलताएँ ले लीं और हमारी बीमारियाँ उठा लीं।\""
    - verse: 18
      text: "जब यीशु ने अपने चारों ओर बड़ी-बड़ी भीड़ें देखीं, तो उसने उस पार जाने की आज्ञा दी।"
    - verse: 19
      text: "तब एक शास्त्री उसके पास आया और कहा, \"गुरु, आप जहाँ कहीं जाएँगे, मैं आपके पीछे आऊँगा।\""
    - verse: 20
      text: "यीशु ने उससे कहा, \"लोमड़ियों के बिल और आकाश के पक्षियों के घोंसले होते हैं, पर मनुष्य के पुत्र के पास सिर रखने की जगह नहीं है।\""
    - verse: 21
      text: "उसके चेलों में से एक और ने उससे कहा, \"प्रभु, मुझे पहले जाकर अपने पिता को दफनाने दीजिए।\""
    - verse: 22
      text: "पर यीशु ने उससे कहा, \"मेरे पीछे आओ और मरे हुओं को अपने मरे हुओं को दफनाने दो।\""
    - verse: 23
      text: "जब यीशु नाव में चढ़ा, तो उसके चेले उसके पीछे हो लिए।"
    - verse: 24
      text: "और देखो, सागर में ऐसी भयंकर हलचल मची कि नाव लहरों से ढकने लगी; पर यीशु सो रहा था।"
    - verse: 25
      text: "चेलों ने उसके पास आकर उसे जगाया और कहा, \"प्रभु, हमें बचाइए! हम नष्ट हो रहे हैं!\""
    - verse: 26
      text: "उसने उनसे कहा, \"कम विश्वास रखने वालो, तुम क्यों डरते हो?\" तब उसने उठकर हवाओं और सागर को डाँटा, और बड़ी शांति छा गई।"
    - verse: 27
      text: "वे आश्चर्यचकित होकर बोले, \"यह कैसा मनुष्य है कि हवाएँ और सागर भी उसकी आज्ञा मानते हैं?\""
    - verse: 28
      text: "जब यीशु उस पार गदरेनियों के क्षेत्र में पहुँचा, तो दुष्टात्माओं से ग्रस्त दो लोग कब्रों से निकलकर उससे मिले। वे इतने हिंसक थे कि कोई उस रास्ते से नहीं जा सकता था।"
    - verse: 29
      text: "और देखो, वे चिल्लाकर बोले, \"परमेश्वर के पुत्र, हमारा तुझसे क्या लेना-देना? क्या तू समय से पहले हमें यातना देने यहाँ आया है?\""
    - verse: 30
      text: "उनसे दूर बहुत से सूअरों का एक झुंड चर रहा था।"
    - verse: 31
      text: "दुष्टात्माओं ने उससे विनती की, \"यदि तू हमें निकाल रहा है, तो हमें सूअरों के झुंड में भेज दे।\""
    - verse: 32
      text: "उसने उनसे कहा, \"जाओ।\" दुष्टात्माएँ निकलकर सूअरों में चली गईं। और देखो, पूरा झुंड खड़ी ढलान से सागर में जा गिरा और पानी में डूबकर मर गया।"
    - verse: 33
      text: "सूअर चराने वाले भाग गए। नगर में जाकर उन्होंने सब कुछ बता दिया और दुष्टात्माओं से ग्रस्त लोगों के साथ जो हुआ था, वह भी बताया।"
    - verse: 34
      text: "और देखो, सारा नगर यीशु से मिलने बाहर निकल आया। उसे देखकर उन्होंने विनती की कि वह उनके क्षेत्र से चला जाए।"
