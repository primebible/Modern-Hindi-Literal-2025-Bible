- book: "मत्ती"
  chapter: 20
  verses:
    - verse: 1
      text: "\"क्योंकि स्वर्ग का राज्य उस गृहस्थ के समान है, जो भोर होते ही अपनी दाख की बारी में मजदूरों को काम पर रखने निकला।"
    - verse: 2
      text: "उसने मजदूरों के साथ दिन भर की मजदूरी एक दीनार तय की और उन्हें अपनी दाख की बारी में भेज दिया।"
    - verse: 3
      text: "तीसरे घंटे के आसपास वह फिर निकला और उसने कुछ और लोगों को बाजार में खाली खड़े देखा।"
    - verse: 4
      text: "उसने उनसे कहा, 'तुम भी दाख की बारी में जाओ, और जो उचित होगा वह मैं तुम्हें दूँगा।' वे चले गए।"
    - verse: 5
      text: "फिर वह छठे और नौवें घंटे के आसपास निकला और वैसा ही किया।"
    - verse: 6
      text: "ग्यारहवें घंटे के आसपास वह फिर निकला और उसने कुछ और लोगों को खड़े पाया। उसने उनसे पूछा, 'तुम यहाँ सारा दिन खाली क्यों खड़े रहे?'"
    - verse: 7
      text: "उन्होंने उससे कहा, 'क्योंकि किसी ने हमें काम पर नहीं रखा।' उसने उनसे कहा, 'तुम भी दाख की बारी में जाओ।'"
    - verse: 8
      text: "शाम होने पर दाख की बारी के स्वामी ने अपने प्रबंधक से कहा, 'मजदूरों को बुलाकर उनकी मजदूरी दे दो, अंतिम से शुरू करके पहले तक।'"
    - verse: 9
      text: "ग्यारहवें घंटे के आसपास काम पर आए मजदूरों को एक-एक दीनार मिला।"
    - verse: 10
      text: "जब पहले मजदूर आए, तो उन्होंने सोचा कि उन्हें अधिक मिलेगा; लेकिन उन्हें भी एक-एक दीनार ही मिला।"
    - verse: 11
      text: "दीनार पाकर वे गृहस्थ के विरुद्ध बड़बड़ाने लगे"
    - verse: 12
      text: "और बोले, 'इन अंतिम लोगों ने केवल एक घंटा काम किया, और आपने उन्हें हमारे बराबर कर दिया, जबकि हमने दिन का बोझ और झुलसाती गर्मी सही!'"
    - verse: 13
      text: "उसने उनमें से एक को उत्तर दिया, 'मित्र, मैं तुम्हारे साथ अन्याय नहीं कर रहा। क्या तुमने मुझसे एक दीनार पर सहमति नहीं की थी?"
    - verse: 14
      text: "अपनी मजदूरी लो और चले जाओ। मैं इस अंतिम को भी तुम्हारे बराबर देना चाहता हूँ।"
    - verse: 15
      text: "क्या मुझे अपनी संपत्ति के साथ जो चाहूँ करने का अधिकार नहीं? या क्या इसलिए तुम्हारी आँख बुरी है कि मैं भला हूँ?'"
    - verse: 16
      text: "इसी प्रकार अंतिम पहले होंगे, और पहले अंतिम होंगे।\""
    - verse: 17
      text: "जब यीशु यरूशलेम की ओर चढ़ रहा था, तो उसने बारह चेलों को अलग ले लिया और रास्ते में उनसे कहा:"
    - verse: 18
      text: "\"देखो, हम यरूशलेम की ओर चढ़ रहे हैं। मनुष्य का पुत्र प्रधान याजकों और शास्त्रियों को सौंपा जाएगा, और वे उसे मृत्यु की सजा सुनाएँगे।"
    - verse: 19
      text: "वे उसे गैर-यहूदियों को सौंप देंगे, ताकि वे उसका उपहास करें, उसे कोड़े मारें और क्रूस पर चढ़ाएँ; और तीसरे दिन वह जीवित किया जाएगा।\""
    - verse: 20
      text: "तब जब्दी के पुत्रों की माँ अपने पुत्रों के साथ यीशु के पास आई, उसे दंडवत करती हुई उससे कुछ माँगने लगी।"
    - verse: 21
      text: "उसने उससे पूछा, \"तुम क्या चाहती हो?\" उसने कहा, \"आज्ञा दीजिए कि मेरे ये दोनों पुत्र आपके राज्य में एक आपके दाहिने और एक आपके बाएँ बैठें।\""
    - verse: 22
      text: "यीशु ने उत्तर दिया, \"तुम नहीं जानते कि क्या माँग रहे हो। क्या तुम वह प्याला पी सकते हो जिसे मैं पीने वाला हूँ?\" उन्होंने उससे कहा, \"हम पी सकते हैं।\""
    - verse: 23
      text: "उसने उनसे कहा, \"मेरा प्याला तो तुम पियोगे; लेकिन मेरे दाहिने और बाएँ बैठने का स्थान देना मेरे अधिकार में नहीं है। वह उन लोगों के लिए है जिनके लिए मेरे पिता ने उसे तैयार किया है।\""
    - verse: 24
      text: "यह सुनकर बाकी दस चेले उन दोनों भाइयों से बहुत नाराज हुए।"
    - verse: 25
      text: "यीशु ने उन्हें पास बुलाकर कहा, \"तुम जानते हो कि गैर-यहूदियों के शासक उन पर प्रभुता करते हैं, और उनके बड़े अधिकारी उन पर अधिकार चलाते हैं।"
    - verse: 26
      text: "तुममें ऐसा नहीं होगा। बल्कि जो तुममें बड़ा होना चाहे, वह तुम्हारा सेवक होगा;"
    - verse: 27
      text: "और जो तुममें पहला होना चाहे, वह तुम्हारा दास होगा।"
    - verse: 28
      text: "इसी प्रकार मनुष्य का पुत्र इसलिए नहीं आया कि उसकी सेवा की जाए, बल्कि सेवा करने और बहुतों के बदले छुड़ौती के रूप में अपना प्राण देने आया है।\""
    - verse: 29
      text: "जब वे यरीहो से निकल रहे थे, तो लोगों की बड़ी भीड़ उसके पीछे हो ली।"
    - verse: 30
      text: "और देखो, सड़क के किनारे बैठे दो अंधों ने सुना कि यीशु वहाँ से जा रहा है। वे चिल्लाकर बोले, \"प्रभु, दाऊद के पुत्र, हम पर दया कीजिए!\""
    - verse: 31
      text: "भीड़ ने उन्हें चुप रहने के लिए डाँटा, लेकिन वे और भी जोर से चिल्लाए, \"प्रभु, दाऊद के पुत्र, हम पर दया कीजिए!\""
    - verse: 32
      text: "यीशु रुक गया, उन्हें बुलाया और पूछा, \"तुम क्या चाहते हो कि मैं तुम्हारे लिए करूँ?\""
    - verse: 33
      text: "उन्होंने उससे कहा, \"प्रभु, हमारी आँखें खुल जाएँ।\""
    - verse: 34
      text: "यीशु को उन पर करुणा आई और उसने उनकी आँखें छुईं। तुरंत वे देखने लगे और उसके पीछे हो लिए।"
