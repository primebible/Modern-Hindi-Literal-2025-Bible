- book: "मत्ती"
  chapter: 7
  verses:
    - verse: 1
      text: "न्याय मत करो, ताकि तुम्हारा भी न्याय न किया जाए।"
    - verse: 2
      text: "क्योंकि जिस न्याय से तुम न्याय करते हो, उसी से तुम्हारा भी न्याय किया जाएगा; और जिस नाप से तुम नापते हो, उसी से तुम्हारे लिए भी नापा जाएगा।"
    - verse: 3
      text: "तुम अपने भाई की आँख में पड़ा तिनका क्यों देखते हो, पर अपनी ही आँख में पड़े शहतीर पर ध्यान नहीं देते?"
    - verse: 4
      text: "जब तुम्हारी अपनी आँख में शहतीर पड़ा है, तो तुम अपने भाई से कैसे कह सकते हो, 'मुझे तुम्हारी आँख से तिनका निकालने दो'?"
    - verse: 5
      text: "कपटी! पहले अपनी आँख से शहतीर निकालो; तब तुम साफ देख सकोगे और अपने भाई की आँख से तिनका निकाल पाओगे।"
    - verse: 6
      text: "जो पवित्र है, उसे कुत्तों को मत दो, और अपने मोती सूअरों के आगे मत फेंको; कहीं ऐसा न हो कि वे उन्हें अपने पैरों तले रौंदें और फिर पलटकर तुम्हें फाड़ डालें।"
    - verse: 7
      text: "माँगो और तुम्हें दिया जाएगा; खोजो और तुम पाओगे; खटखटाओ और तुम्हारे लिए खोला जाएगा।"
    - verse: 8
      text: "क्योंकि जो कोई माँगता है, उसे मिलता है; जो खोजता है, वह पाता है; और जो खटखटाता है, उसके लिए खोला जाएगा।"
    - verse: 9
      text: "तुममें से कौन ऐसा व्यक्ति है जो अपने पुत्र के रोटी माँगने पर उसे पत्थर देगा?"
    - verse: 10
      text: "या उसके मछली माँगने पर उसे साँप देगा?"
    - verse: 11
      text: "इसलिए यदि तुम बुरे होकर भी अपने बच्चों को अच्छे उपहार देना जानते हो, तो तुमसे कितना बढ़कर तुम्हारा स्वर्गीय पिता उससे माँगने वालों को अच्छी चीज़ें देगा!"
    - verse: 12
      text: "इसलिए जो कुछ तुम चाहते हो कि लोग तुम्हारे साथ करें, तुम भी उनके साथ वैसा ही करो; क्योंकि यही व्यवस्था और भविष्यवक्ता हैं।"
    - verse: 13
      text: "संकरे फाटक से प्रवेश करो; क्योंकि विनाश की ओर ले जाने वाला फाटक चौड़ा और मार्ग विशाल है, और बहुत से लोग उस फाटक से प्रवेश करते हैं।"
    - verse: 14
      text: "क्योंकि जीवन की ओर ले जाने वाला फाटक संकरा और मार्ग तंग है, और उसे पाने वाले थोड़े ही हैं।"
    - verse: 15
      text: "झूठे भविष्यवक्ताओं से सावधान रहो। वे भेड़ों के भेष में तुम्हारे पास आते हैं, पर भीतर से लुटेरे भेड़िये हैं।"
    - verse: 16
      text: "उनके फलों से तुम उन्हें पहचान लोगे। क्या काँटेदार झाड़ियों से अंगूर या ऊँट-कटारों से अंजीर तोड़े जाते हैं?"
    - verse: 17
      text: "इसी प्रकार हर अच्छा पेड़ अच्छे फल लाता है, पर सड़ा हुआ पेड़ बुरे फल लाता है।"
    - verse: 18
      text: "अच्छा पेड़ बुरे फल नहीं ला सकता, और न सड़ा हुआ पेड़ अच्छे फल ला सकता है।"
    - verse: 19
      text: "जो भी पेड़ अच्छा फल नहीं लाता, उसे काटकर आग में डाल दिया जाता है।"
    - verse: 20
      text: "इसलिए उनके फलों से तुम उन्हें पहचान लोगे।"
    - verse: 21
      text: "मुझसे 'प्रभु, प्रभु' कहने वाला हर कोई स्वर्ग के राज्य में प्रवेश नहीं करेगा, बल्कि वही, जो मेरे स्वर्गीय पिता की इच्छा पूरी करता है।"
    - verse: 22
      text: "उस दिन बहुत से लोग मुझसे कहेंगे, 'प्रभु, प्रभु, क्या हमने आपके नाम से भविष्यवाणी नहीं की, आपके नाम से दुष्टात्माएँ नहीं निकालीं और आपके नाम से बहुत से सामर्थ्य के काम नहीं किए?'"
    - verse: 23
      text: "तब मैं उनसे साफ-साफ कह दूँगा, 'मैंने तुम्हें कभी नहीं जाना। मुझसे दूर हो जाओ, अधर्म के काम करने वालो!'"
    - verse: 24
      text: "इसलिए जो कोई मेरी ये बातें सुनता है और उनका पालन करता है, वह उस बुद्धिमान व्यक्ति के समान होगा जिसने अपना घर चट्टान पर बनाया।"
    - verse: 25
      text: "बारिश बरसी, नदियाँ उमड़ पड़ीं, आँधियाँ चलीं और उस घर पर टूट पड़ीं; फिर भी वह नहीं गिरा, क्योंकि उसकी नींव चट्टान पर डाली गई थी।"
    - verse: 26
      text: "और जो कोई मेरी ये बातें सुनता है लेकिन उनका पालन नहीं करता, वह उस मूर्ख व्यक्ति के समान होगा जिसने अपना घर रेत पर बनाया।"
    - verse: 27
      text: "बारिश बरसी, नदियाँ उमड़ पड़ीं, आँधियाँ चलीं और उस घर से टकराईं। वह गिर पड़ा, और उसका गिरना बहुत भयानक था।"
    - verse: 28
      text: "जब यीशु ये बातें कह चुका, तो भीड़ उसकी शिक्षा से चकित रह गई,"
    - verse: 29
      text: "क्योंकि वह उन्हें उनके शास्त्रियों की तरह नहीं, बल्कि अधिकार रखने वाले की तरह शिक्षा देता था।"
