- book: "मत्ती"
  chapter: 6
  verses:
    - verse: 1
      text: "सावधान रहो कि तुम अपनी धार्मिकता के काम लोगों के सामने केवल इसलिए न करो कि वे तुम्हें देखें; नहीं तो तुम्हें अपने स्वर्गीय पिता से कोई प्रतिफल नहीं मिलेगा।"
    - verse: 2
      text: "इसलिए जब तुम दान दो, तो अपने आगे तुरही मत बजवाओ, जैसा कपटी सभाघरों और गलियों में करते हैं, ताकि लोग उनकी महिमा करें। मैं तुमसे सच कहता हूँ: वे अपना पूरा प्रतिफल पा चुके हैं।"
    - verse: 3
      text: "परन्तु जब तुम दान दो, तो तुम्हारा बायाँ हाथ न जाने कि तुम्हारा दाहिना हाथ क्या कर रहा है,"
    - verse: 4
      text: "ताकि तुम्हारा दान गुप्त में रहे। तब तुम्हारा पिता, जो गुप्त में देखता है, तुम्हें प्रतिफल देगा।"
      # ὁ βλέπων ἐν τῷ κρυπτῷ — कोई καί नहीं, इसलिए "भी" हटाया गया
    - verse: 5
      text: "और जब तुम प्रार्थना करो, तो कपटियों की तरह मत बनो। उन्हें सभाघरों और सड़कों के मोड़ों पर खड़े होकर प्रार्थना करना पसंद है, ताकि लोग उन्हें देखें। मैं तुमसे सच कहता हूँ: वे अपना पूरा प्रतिफल पा चुके हैं।"
    - verse: 6
      text: "परन्तु जब तुम प्रार्थना करो, तो अपने कमरे में जाओ, दरवाज़ा बंद करो और अपने पिता से, जो गुप्त में है, प्रार्थना करो। तब तुम्हारा पिता, जो गुप्त में देखता है, तुम्हें प्रतिफल देगा।"
      # τῷ πατρί σου τῷ ἐν τῷ κρυπτῷ — "जो गुप्त में है" पिता का विशेषण है, प्रार्थना की विधि नहीं
    - verse: 7
      text: "प्रार्थना करते समय गैर-यहूदियों की तरह व्यर्थ बातें बार-बार मत दोहराओ, क्योंकि उन्हें लगता है कि बहुत बोलने से उनकी प्रार्थना सुनी जाएगी।"
    - verse: 8
      text: "इसलिए उनके जैसे मत बनो, क्योंकि तुम्हारे माँगने से पहले ही तुम्हारा पिता जानता है कि तुम्हें क्या चाहिए।"
    - verse: 9
      text: "इसलिए तुम इस प्रकार प्रार्थना करो: \"हे हमारे पिता, जो स्वर्ग में हैं, आपका नाम पवित्र किया जाए।"
      # ἁγιασθήτω — निष्क्रिय आदेश; "माना जाए" हटाया गया
      # सम्बोधन-रजिस्टर: परम्परागत हिन्दी अनुवाद "तू/तेरा" रखते हैं (भक्ति-परम्परा की आत्मीयता,
      # यूनानी एकवचन σου के अनुरूप); "आप" आधुनिक पाठकों के लिए चुना गया विकल्प है — पूरी पुस्तक में एकरूप रखें
    - verse: 10
      text: "आपका राज्य आए। आपकी इच्छा पूरी हो, जैसे स्वर्ग में, वैसे पृथ्वी पर भी।"
    - verse: 11
      text: "आज हमें हमारी रोज़ की रोटी दें।"
      # ἐπιούσιον — अर्थ अनिश्चित (hapax legomenon); विकल्प: "आने वाले दिन की रोटी" या "आवश्यक रोटी"
    - verse: 12
      text: "और हमारे ऋण क्षमा करें, जैसे हमने भी अपने ऋणियों को क्षमा किया है।"
    - verse: 13
      text: "और हमें परीक्षा में न लाएँ, बल्कि दुष्ट से बचाएँ।\""
      # प्राचीनतम हस्तलिपियों में स्तुति-वाक्य ("क्योंकि राज्य...") नहीं है
    - verse: 14
      text: "क्योंकि यदि तुम लोगों के अपराध क्षमा करोगे, तो तुम्हारा स्वर्गीय पिता भी तुम्हें क्षमा करेगा।"
    - verse: 15
      text: "परन्तु यदि तुम लोगों के अपराध क्षमा नहीं करोगे, तो तुम्हारा पिता भी तुम्हारे अपराध क्षमा नहीं करेगा।"
    - verse: 16
      text: "और जब तुम उपवास करो, तो कपटियों की तरह उदास चेहरा मत बनाओ। वे अपना चेहरा बिगाड़ लेते हैं, ताकि लोगों को दिखाएँ कि वे उपवास कर रहे हैं। मैं तुमसे सच कहता हूँ: वे अपना पूरा प्रतिफल पा चुके हैं।"
    - verse: 17
      text: "परन्तु जब तुम उपवास करो, तो अपने सिर पर तेल लगाओ और अपना चेहरा धोओ,"
    - verse: 18
      text: "ताकि तुम लोगों को उपवास करते हुए न दिखाई दो, बल्कि अपने पिता को, जो गुप्त में है। तब तुम्हारा पिता, जो गुप्त में देखता है, तुम्हें प्रतिफल देगा।"
      # v6 में κρυπτῷ, यहाँ κρυφαίῳ — निकट-पर्याय; दोनों "गुप्त" रखा गया
    - verse: 19
      text: "अपने लिए पृथ्वी पर खजाने जमा मत करो, जहाँ कपड़ों का कीड़ा और जंग उन्हें नष्ट कर देते हैं और जहाँ चोर सेंध लगाकर चुरा लेते हैं।"
    - verse: 20
      text: "बल्कि अपने लिए स्वर्ग में खजाने जमा करो, जहाँ न कपड़ों का कीड़ा और न जंग उन्हें नष्ट करते हैं, और जहाँ चोर न सेंध लगाते हैं, न चुराते हैं।"
    - verse: 21
      text: "क्योंकि जहाँ तुम्हारा खजाना है, वहाँ तुम्हारा हृदय भी होगा।"
    - verse: 22
      text: "शरीर का दीपक आँख है। इसलिए यदि तुम्हारी आँख एकनिष्ठ है, तो तुम्हारा पूरा शरीर प्रकाश से भरा होगा।"
      # ἁπλοῦς — "एकल/अविभक्त"; v24 के "दो स्वामियों" से जुड़ता है। विकल्प: "निर्मल", "स्वस्थ"
    - verse: 23
      text: "परन्तु यदि तुम्हारी आँख बुरी है, तो तुम्हारा पूरा शरीर अंधकार से भरा होगा। इसलिए यदि तुम्हारे भीतर का प्रकाश ही अंधकार है, तो वह अंधकार कितना गहरा होगा!"
    - verse: 24
      text: "कोई भी दो स्वामियों की सेवा नहीं कर सकता, क्योंकि वह या तो एक से बैर रखेगा और दूसरे से प्रेम करेगा, या एक से जुड़ा रहेगा और दूसरे को तुच्छ समझेगा। तुम परमेश्वर और मामोन (धन-संपत्ति) दोनों की सेवा नहीं कर सकते।"
    - verse: 25
      text: "इसलिए मैं तुमसे कहता हूँ: अपने जीवन की चिंता मत करो कि क्या खाओगे या क्या पीओगे, और न अपने शरीर की कि क्या पहनोगे। क्या जीवन भोजन से और शरीर कपड़ों से बढ़कर नहीं है?"
      # ἢ τί πίητε — SBL में सम्मिलित; कुछ प्राचीन हस्तलिपियों (Sinaiticus) में नहीं
    - verse: 26
      text: "आकाश के पक्षियों को देखो। वे न बोते हैं, न फसल काटते हैं और न भंडारों में इकट्ठा करते हैं, फिर भी तुम्हारा स्वर्गीय पिता उन्हें खिलाता है। क्या तुम उनसे कहीं अधिक मूल्यवान नहीं हो?"
    - verse: 27
      text: "तुममें से कौन चिंता करके अपने कद में एक हाथ भी बढ़ा सकता है?"
      # ἡλικία/πῆχυν — शाब्दिक: "कद में एक हाथ"; वैकल्पिक अर्थ: "अपनी आयु में कुछ भी बढ़ा सकता है"
    - verse: 28
      text: "और कपड़ों के लिए क्यों चिंता करते हो? मैदान के सोसन के फूलों को ध्यान से देखो कि वे कैसे बढ़ते हैं। वे न मेहनत करते हैं, न सूत कातते हैं।"
    - verse: 29
      text: "फिर भी मैं तुमसे कहता हूँ: सुलैमान भी अपने पूरे वैभव में इनमें से किसी एक के समान वस्त्र पहने हुए नहीं था।"
    - verse: 30
      text: "यदि परमेश्वर मैदान की घास को, जो आज है और कल भट्ठी में झोंक दी जाएगी, इस तरह वस्त्र पहनाता है, तो हे कम विश्वास रखने वालो, क्या वह तुम्हें उससे कहीं अधिक वस्त्र नहीं पहनाएगा?"
      # ὀλιγόπιστοι — सम्बोधन; "हे" जोड़कर सीधा सम्बोधन स्पष्ट किया गया
    - verse: 31
      text: "इसलिए चिंता करके यह मत कहो: 'हम क्या खाएँगे?' या 'हम क्या पीएँगे?' या 'हम क्या पहनेंगे?'"
    - verse: 32
      text: "क्योंकि गैर-यहूदी इन सब चीज़ों की तलाश में लगे रहते हैं, और तुम्हारा स्वर्गीय पिता जानता है कि तुम्हें इन सबकी आवश्यकता है।"
    - verse: 33
      text: "बल्कि पहले उसके राज्य और उसकी धार्मिकता की खोज करो, और ये सब चीज़ें भी तुम्हें दी जाएँगी।"
    - verse: 34
      text: "इसलिए कल की चिंता मत करो, क्योंकि कल का दिन अपनी चिंता खुद करेगा। आज के लिए आज की परेशानी ही काफी है।"
