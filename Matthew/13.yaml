- book: "मत्ती"
  chapter: 13
  verses:
    - verse: 1
      text: "उसी दिन यीशु घर से निकलकर सागर के किनारे बैठ गया।"
    - verse: 2
      text: "लोगों की बड़ी-बड़ी भीड़ें उसके पास इकट्ठी हो गईं, इसलिए वह नाव में चढ़कर बैठ गया, और सारी भीड़ किनारे पर खड़ी रही।"
    - verse: 3
      text: "उसने उनसे दृष्टांतों में बहुत-सी बातें कहीं: \"देखो, एक बीज बोने वाला बीज बोने निकला।"
    - verse: 4
      text: "जब वह बो रहा था, तो कुछ बीज रास्ते के किनारे गिरे, और पक्षियों ने आकर उन्हें खा लिया।"
    - verse: 5
      text: "कुछ बीज पथरीली जगहों पर गिरे, जहाँ उन्हें अधिक मिट्टी नहीं मिली। मिट्टी गहरी न होने के कारण वे तुरंत उग आए,"
    - verse: 6
      text: "लेकिन सूर्य निकलने पर वे झुलस गए और जड़ न होने के कारण सूख गए।"
    - verse: 7
      text: "कुछ बीज काँटों के बीच गिरे। काँटे बढ़े और उन्होंने उनका दम घोंट दिया।"
    - verse: 8
      text: "कुछ बीज अच्छी जमीन पर गिरे और फल देने लगे: कोई सौ गुना, कोई साठ गुना और कोई तीस गुना।"
    - verse: 9
      text: "जिसके कान हों, वह सुन ले।\""
    - verse: 10
      text: "चेलों ने उसके पास आकर पूछा, \"आप उनसे दृष्टांतों में क्यों बोलते हैं?\""
    - verse: 11
      text: "उसने उन्हें उत्तर दिया, \"तुम्हें स्वर्ग के राज्य के भेद जानने दिए गए हैं, लेकिन उन्हें नहीं।"
    - verse: 12
      text: "क्योंकि जिसके पास है, उसे और दिया जाएगा और उसके पास बहुत हो जाएगा; लेकिन जिसके पास नहीं है, उससे वह भी ले लिया जाएगा जो उसके पास है।"
    - verse: 13
      text: "इसलिए मैं उनसे दृष्टांतों में बोलता हूँ, क्योंकि वे देखते हुए भी नहीं देखते, सुनते हुए भी नहीं सुनते और न समझते हैं।"
    - verse: 14
      text: "उनमें यशायाह की यह भविष्यवाणी पूरी होती है: 'तुम सुनते रहोगे, फिर भी कभी नहीं समझोगे; देखते रहोगे, फिर भी कभी नहीं पहचानोगे।"
    - verse: 15
      text: "क्योंकि इन लोगों का हृदय सुन्न हो गया है, उनके कान सुनने में सुस्त हो गए हैं और उन्होंने अपनी आँखें बंद कर ली हैं; कहीं ऐसा न हो कि वे आँखों से देखें, कानों से सुनें, हृदय से समझें और लौटें, और मैं उन्हें चंगा करूँ।'"
    - verse: 16
      text: "लेकिन तुम्हारी आँखें धन्य हैं क्योंकि वे देखती हैं, और तुम्हारे कान क्योंकि वे सुनते हैं।"
    - verse: 17
      text: "क्योंकि मैं तुमसे सच कहता हूँ: बहुत से भविष्यवक्ताओं और धर्मियों ने उन बातों को देखने की इच्छा की जो तुम देखते हो, लेकिन नहीं देखीं; और उन बातों को सुनने की इच्छा की जो तुम सुनते हो, लेकिन नहीं सुनीं।\""
    - verse: 18
      text: "\"इसलिए तुम बीज बोने वाले का दृष्टांत सुनो।"
    - verse: 19
      text: "जब कोई राज्य का वचन सुनता है और नहीं समझता, तो वह दुष्ट आकर उसके हृदय में बोए गए वचन को छीन लेता है। यही वह है जो रास्ते के किनारे बोया गया था।"
    - verse: 20
      text: "पथरीली जगहों पर बोया गया वह व्यक्ति है जो वचन सुनता है और तुरंत आनंद के साथ उसे ग्रहण करता है,"
    - verse: 21
      text: "लेकिन उसके भीतर जड़ नहीं होती और वह थोड़े समय तक ही टिकता है। जब वचन के कारण कष्ट या सताव आता है, तो वह तुरंत ठोकर खाता है।"
    - verse: 22
      text: "काँटों के बीच बोया गया वह व्यक्ति है जो वचन सुनता है, लेकिन इस युग की चिंता और धन का धोखा वचन का दम घोंट देते हैं, और वह निष्फल हो जाता है।"
    - verse: 23
      text: "अच्छी जमीन पर बोया गया वह व्यक्ति है जो वचन सुनता और समझता है। वह सचमुच फल लाता और उपज देता है: कोई सौ गुना, कोई साठ गुना और कोई तीस गुना।\""
    - verse: 24
      text: "उसने उनके सामने एक और दृष्टांत रखा: \"स्वर्ग का राज्य उस व्यक्ति के समान है जिसने अपने खेत में अच्छा बीज बोया।"
    - verse: 25
      text: "लेकिन जब लोग सो रहे थे, तो उसका शत्रु आया, गेहूँ के बीच जंगली घास बो गया और चला गया।"
    - verse: 26
      text: "जब गेहूँ उगा और उसमें बालें आईं, तब जंगली घास भी दिखाई दी।"
    - verse: 27
      text: "घर के स्वामी के दासों ने आकर उससे कहा, 'स्वामी, क्या आपने अपने खेत में अच्छा बीज नहीं बोया था? फिर उसमें जंगली घास कहाँ से आ गई?'"
    - verse: 28
      text: "उसने उनसे कहा, 'किसी शत्रु ने यह किया है।' दासों ने उससे पूछा, 'तो क्या आप चाहते हैं कि हम जाकर उसे इकट्ठा करें?'"
    - verse: 29
      text: "उसने कहा, 'नहीं, कहीं ऐसा न हो कि जंगली घास इकट्ठी करते समय तुम उसके साथ गेहूँ भी उखाड़ दो।"
    - verse: 30
      text: "फसल कटने तक दोनों को साथ-साथ बढ़ने दो। फसल के समय मैं काटने वालों से कहूँगा: पहले जंगली घास इकट्ठी करके जलाने के लिए उसे गट्ठरों में बाँध दो, फिर गेहूँ मेरे भंडार में जमा करो।'\""
    - verse: 31
      text: "उसने उनके सामने एक और दृष्टांत रखा: \"स्वर्ग का राज्य राई के एक दाने के समान है, जिसे एक व्यक्ति ने लेकर अपने खेत में बोया।"
    - verse: 32
      text: "वह सभी बीजों से छोटा है, लेकिन बढ़ने पर सब साग-पात से बड़ा हो जाता है और पेड़ बन जाता है, यहाँ तक कि आकाश के पक्षी आकर उसकी डालियों में बसेरा करते हैं।\""
    - verse: 33
      text: "उसने उनसे एक और दृष्टांत कहा: \"स्वर्ग का राज्य खमीर के समान है, जिसे एक स्त्री ने लेकर तीन पसेरी आटे में छिपा दिया, जब तक सारा आटा खमीर से फूल न गया।\""
    - verse: 34
      text: "यीशु ने ये सब बातें भीड़ से दृष्टांतों में कहीं; वह बिना दृष्टांत के उनसे कुछ नहीं कहता था,"
    - verse: 35
      text: "ताकि भविष्यवक्ता के द्वारा कही गई यह बात पूरी हो: \"मैं दृष्टांतों में अपना मुँह खोलूँगा; सृष्टि की नींव डाले जाने से छिपी बातें बताऊँगा।\""
    - verse: 36
      text: "तब यीशु भीड़ को विदा करके घर में चला गया। उसके चेले उसके पास आए और कहा, \"खेत की जंगली घास का दृष्टांत हमें समझाइए।\""
    - verse: 37
      text: "उसने उत्तर दिया, \"अच्छा बीज बोने वाला मनुष्य का पुत्र है।"
    - verse: 38
      text: "खेत संसार है; अच्छा बीज राज्य के पुत्र हैं, और जंगली घास के पौधे दुष्ट के पुत्र हैं।"
    - verse: 39
      text: "जिस शत्रु ने उसे बोया, वह इब्लीस है। फसल युग का अंत है, और काटने वाले स्वर्गदूत हैं।"
    - verse: 40
      text: "इसलिए जैसे जंगली घास इकट्ठी करके आग में जलाई जाती है, वैसे ही युग के अंत में होगा।"
    - verse: 41
      text: "मनुष्य का पुत्र अपने स्वर्गदूतों को भेजेगा, और वे उसके राज्य से ठोकर के सभी कारणों और अधर्म के काम करने वालों को इकट्ठा करेंगे,"
    - verse: 42
      text: "और उन्हें आग की भट्ठी में डालेंगे। वहाँ रोना और दाँत पीसना होगा।"
    - verse: 43
      text: "तब धर्मी अपने पिता के राज्य में सूर्य के समान चमकेंगे। जिसके कान हों, वह सुन ले।\""
    - verse: 44
      text: "\"स्वर्ग का राज्य खेत में छिपे खजाने के समान है, जिसे एक व्यक्ति ने पाकर छिपा दिया। आनंद के कारण वह जाकर अपना सब कुछ बेच देता है और उस खेत को खरीद लेता है।\""
    - verse: 45
      text: "\"फिर, स्वर्ग का राज्य उस व्यापारी के समान है जो उत्तम मोतियों की खोज कर रहा था।"
    - verse: 46
      text: "एक बहुमूल्य मोती पाकर वह गया, अपना सब कुछ बेच दिया और उसे खरीद लिया।\""
    - verse: 47
      text: "\"फिर, स्वर्ग का राज्य एक बड़े जाल के समान है, जिसे सागर में डाला गया और जिसने हर प्रकार की मछलियाँ समेट लीं।"
    - verse: 48
      text: "जब वह भर गया, तो मछुआरे उसे खींचकर किनारे पर ले आए। उन्होंने बैठकर अच्छी मछलियाँ बर्तनों में इकट्ठी कीं, लेकिन सड़ी हुई मछलियाँ बाहर फेंक दीं।"
    - verse: 49
      text: "युग के अंत में भी ऐसा ही होगा। स्वर्गदूत आएँगे और दुष्टों को धर्मियों के बीच से अलग करेंगे,"
    - verse: 50
      text: "और उन्हें आग की भट्ठी में डालेंगे। वहाँ रोना और दाँत पीसना होगा।\""
    - verse: 51
      text: "यीशु ने उनसे पूछा, \"क्या तुमने ये सब बातें समझ लीं?\" उन्होंने कहा, \"हाँ।\""
    - verse: 52
      text: "उसने उनसे कहा, \"इसलिए हर शास्त्री जो स्वर्ग के राज्य का चेला बना है, उस गृहस्थ के समान है जो अपने खजाने से नई और पुरानी चीजें निकालता है।\""
    - verse: 53
      text: "जब यीशु ये दृष्टांत कह चुका, तो वह वहाँ से चला गया।"
    - verse: 54
      text: "अपने नगर में आकर वह उनके सभाघर में शिक्षा देने लगा। वे चकित होकर कहने लगे, \"इसे यह बुद्धि और ये सामर्थ्य के काम कहाँ से मिले?"
    - verse: 55
      text: "क्या यह बढ़ई का बेटा नहीं है? क्या इसकी माँ का नाम मरियम नहीं है? और क्या इसके भाई याकूब, यूसुफ, शमौन और यहूदा नहीं हैं?"
    - verse: 56
      text: "और क्या इसकी सभी बहनें हमारे बीच नहीं हैं? तो फिर इसे ये सब बातें कहाँ से मिलीं?\""
    - verse: 57
      text: "वे उसके कारण ठोकर खाने लगे। लेकिन यीशु ने उनसे कहा, \"भविष्यवक्ता का अपने नगर और अपने घर के सिवा कहीं अनादर नहीं होता।\""
    - verse: 58
      text: "उसने वहाँ उनके अविश्वास के कारण बहुत से सामर्थ्य के काम नहीं किए।"
