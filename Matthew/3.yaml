- book: "मत्ती"
  chapter: 3
  verses:
    - verse: 1
      text: "उन दिनों बपतिस्मा देने वाला यूहन्ना आया और यहूदिया के निर्जन प्रदेश में यह प्रचार करने लगा:"
    - verse: 2
      text: "\"पश्चाताप करो, क्योंकि स्वर्ग का राज्य निकट आ गया है।\""
    - verse: 3
      text: "क्योंकि यह वही है जिसके विषय में भविष्यवक्ता यशायाह ने कहा था: \"निर्जन प्रदेश में पुकारने वाले की आवाज: 'प्रभु का मार्ग तैयार करो; उसके रास्ते सीधे करो।'\""
    - verse: 4
      text: "यूहन्ना ऊँट के बालों से बना वस्त्र पहनता था और कमर पर चमड़े का पट्टा बाँधता था। उसका भोजन टिड्डियाँ और जंगली शहद था।"
    - verse: 5
      text: "तब यरूशलेम, पूरे यहूदिया और यर्दन नदी के आसपास के पूरे क्षेत्र से लोग उसके पास आने लगे।"
    - verse: 6
      text: "वे अपने पापों को स्वीकार करते हुए यर्दन नदी में यूहन्ना से बपतिस्मा लेते थे।"
    - verse: 7
      text: "जब यूहन्ना ने बहुत से फरीसियों और सदूकियों को बपतिस्मा लेने के लिए आते देखा, तो उसने उनसे कहा, \"वाइपरों (विषधर साँपों) की संतान! आने वाले क्रोध से बच निकलने की चेतावनी तुम्हें किसने दी?"
    - verse: 8
      text: "इसलिए पश्चाताप के अनुरूप फल लाओ।"
    - verse: 9
      text: "और अपने मन में यह मत सोचो कि 'अब्राहम हमारे पिता हैं।' क्योंकि मैं तुमसे कहता हूँ कि परमेश्वर इन पत्थरों से भी अब्राहम की संतान पैदा कर सकता है।"
    - verse: 10
      text: "अब कुल्हाड़ी पेड़ों की जड़ों पर रखी है। इसलिए जो भी पेड़ अच्छा फल नहीं लाता, उसे काटकर आग में डाल दिया जाता है।"
    - verse: 11
      text: "मैं तो तुम्हें पश्चाताप के लिए पानी से बपतिस्मा देता हूँ, परन्तु जो मेरे बाद आ रहा है, वह मुझसे अधिक शक्तिशाली है। मैं उसकी चप्पलें उठाने के योग्य भी नहीं हूँ। वह तुम्हें पवित्र आत्मा और आग से बपतिस्मा देगा।"
    - verse: 12
      text: "उसका सूप उसके हाथ में है। वह अपने खलिहान को पूरी तरह साफ करेगा और अपने गेहूँ को भंडार में इकट्ठा करेगा, परन्तु भूसी को ऐसी आग में जला देगा जो कभी नहीं बुझती।\""
    - verse: 13
      text: "तब यीशु यूहन्ना से बपतिस्मा लेने के लिए गलील से यर्दन नदी के किनारे आया।"
    - verse: 14
      text: "परन्तु यूहन्ना उसे रोकने लगा और कहा, \"मुझे तो आपसे बपतिस्मा लेने की आवश्यकता है, फिर भी आप मेरे पास आए हैं?\""
    - verse: 15
      text: "यीशु ने उसे उत्तर दिया, \"अभी ऐसा ही होने दो, क्योंकि इसी तरह हमारे लिए सारी धार्मिकता पूरी करना उचित है।\" तब यूहन्ना ने उसकी बात मान ली।"
    - verse: 16
      text: "बपतिस्मा लेने के बाद यीशु तुरंत पानी से बाहर आया। और देखो, उसके लिए आकाश खुल गया। उसने परमेश्वर की आत्मा को कबूतर की तरह उतरते और अपने ऊपर आते देखा।"
    - verse: 17
      text: "और देखो, आकाश से एक आवाज आई: \"यह मेरा प्रिय पुत्र है, जिससे मैं प्रसन्न हूँ।\""
