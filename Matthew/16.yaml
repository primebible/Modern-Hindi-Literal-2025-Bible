- book: "मत्ती"
  chapter: 16
  verses:
    - verse: 1
      text: "फरीसी और सदूकी उसके पास आए और उसे परखने के लिए उससे स्वर्ग से कोई चिन्ह दिखाने को कहा।"
    - verse: 2
      text: "उसने उन्हें उत्तर दिया, \"शाम होने पर तुम कहते हो, 'मौसम साफ रहेगा, क्योंकि आकाश लाल है।'"
    - verse: 3
      text: "और सुबह, 'आज मौसम खराब रहेगा, क्योंकि आकाश लाल और धुँधला है।' तुम आकाश का रूप पहचानना जानते हो, लेकिन समय के चिन्ह नहीं पहचान सकते।\""
    - verse: 4
      text: "\"बुरी और व्यभिचारी पीढ़ी चिन्ह की खोज करती है, लेकिन योना के चिन्ह के सिवा उसे कोई चिन्ह नहीं दिया जाएगा।\" फिर वह उन्हें छोड़कर चला गया।"
    - verse: 5
      text: "जब चेले उस पार पहुँचे, तो वे रोटियाँ लेना भूल गए थे।"
    - verse: 6
      text: "यीशु ने उनसे कहा, \"देखो, फरीसियों और सदूकियों के खमीर से सावधान रहो।\""
    - verse: 7
      text: "वे आपस में विचार करते हुए कहने लगे, \"हम रोटियाँ नहीं लाए हैं।\""
    - verse: 8
      text: "यीशु ने यह जानकर कहा, \"कम विश्वास रखने वालो, तुम आपस में यह विचार क्यों कर रहे हो कि तुम रोटियाँ नहीं लाए?"
    - verse: 9
      text: "क्या तुम अब तक नहीं समझते? क्या तुम्हें पाँच हजार लोगों के लिए पाँच रोटियाँ और यह याद नहीं कि तुमने कितनी टोकरियाँ उठाई थीं?"
    - verse: 10
      text: "और न चार हजार लोगों के लिए सात रोटियाँ और यह कि तुमने कितने बड़े टोकरे उठाए थे?"
    - verse: 11
      text: "तुम क्यों नहीं समझते कि मैंने तुमसे रोटियों के विषय में नहीं कहा था? बल्कि फरीसियों और सदूकियों के खमीर से सावधान रहो।\""
    - verse: 12
      text: "तब वे समझ गए कि उसने रोटियों के खमीर से नहीं, बल्कि फरीसियों और सदूकियों की शिक्षा से सावधान रहने को कहा था।"
    - verse: 13
      text: "जब यीशु कैसरिया फिलिप्पी के क्षेत्र में आया, तो उसने अपने चेलों से पूछा, \"लोग मनुष्य के पुत्र को कौन कहते हैं?\""
    - verse: 14
      text: "उन्होंने कहा, \"कुछ लोग बपतिस्मा देने वाला यूहन्ना, कुछ एलिय्याह, और कुछ यिर्मयाह या भविष्यवक्ताओं में से कोई एक कहते हैं।\""
    - verse: 15
      text: "उसने उनसे कहा, \"लेकिन तुम मुझे कौन कहते हो?\""
    - verse: 16
      text: "शमौन पतरस ने उत्तर दिया, \"आप मसीह हैं, जीवित परमेश्वर के पुत्र हैं।\""
    - verse: 17
      text: "यीशु ने उसे उत्तर दिया, \"तुम धन्य हो, शमौन बरयोना, क्योंकि मांस और लहू ने यह बात तुम पर प्रकट नहीं की, बल्कि मेरे स्वर्गीय पिता ने।"
    - verse: 18
      text: "और मैं तुमसे कहता हूँ कि तुम पतरस हो, और इस चट्टान पर मैं अपनी कलीसिया बनाऊँगा; अधोलोक के फाटक उस पर प्रबल नहीं होंगे।"
    - verse: 19
      text: "मैं तुम्हें स्वर्ग के राज्य की कुंजियाँ दूँगा। जो कुछ तुम पृथ्वी पर बाँधोगे, वह स्वर्ग में बँधा हुआ होगा; और जो कुछ तुम पृथ्वी पर खोलोगे, वह स्वर्ग में खुला हुआ होगा।\""
    - verse: 20
      text: "तब उसने चेलों को कड़ी चेतावनी दी कि वे किसी से न कहें कि वह मसीह है।"
    - verse: 21
      text: "उस समय से यीशु अपने चेलों को बताने लगा कि उसे अवश्य यरूशलेम जाना होगा, प्राचीनों, प्रधान याजकों और शास्त्रियों से बहुत दुःख उठाना होगा, मार डाला जाना होगा और तीसरे दिन जीवित किया जाना होगा।"
    - verse: 22
      text: "पतरस उसे अलग ले गया और उसे डाँटने लगा, \"प्रभु, परमेश्वर ऐसा न होने दे! आपके साथ ऐसा कभी नहीं होगा।\""
    - verse: 23
      text: "लेकिन यीशु ने मुड़कर पतरस से कहा, \"मेरे पीछे हट, शैतान! तू मेरे लिए ठोकर का कारण है, क्योंकि तू परमेश्वर की बातों पर नहीं, बल्कि मनुष्यों की बातों पर मन लगाता है।\""
    - verse: 24
      text: "तब यीशु ने अपने चेलों से कहा, \"यदि कोई मेरे पीछे आना चाहे, तो वह अपने आपको नकार दे, अपना क्रूस उठाए और मेरे पीछे चले।"
    - verse: 25
      text: "क्योंकि जो अपने प्राण बचाना चाहे, वह उसे खो देगा; और जो मेरे कारण अपना प्राण खो देगा, वह उसे पाएगा।"
    - verse: 26
      text: "यदि कोई मनुष्य सारे संसार को पा ले, लेकिन अपने प्राण गँवा दे, तो उसे क्या लाभ होगा? या मनुष्य अपने प्राण के बदले क्या देगा?"
    - verse: 27
      text: "क्योंकि मनुष्य का पुत्र अपने पिता की महिमा में अपने स्वर्गदूतों के साथ आने वाला है, और तब वह हर एक को उसके किए के अनुसार प्रतिफल देगा।"
    - verse: 28
      text: "मैं तुमसे सच कहता हूँ: यहाँ खड़े लोगों में कुछ ऐसे हैं जो मनुष्य के पुत्र को उसके राज्य में आते हुए देख लेने तक मृत्यु का स्वाद निश्चय ही नहीं चखेंगे।\""
