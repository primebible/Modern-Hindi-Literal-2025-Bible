- book: "मत्ती"
  chapter: 9
  verses:
    - verse: 1
      text: "यीशु नाव में चढ़ा, उस पार गया और अपने नगर में आया।"
    - verse: 2
      text: "और देखो, लोग खाट पर पड़े एक लकवे के रोगी को उसके पास लाए। उनका विश्वास देखकर यीशु ने उस रोगी से कहा, \"बेटे, हिम्मत रखो! तुम्हारे पाप क्षमा कर दिए गए हैं।\""
    - verse: 3
      text: "और देखो, कुछ शास्त्रियों ने अपने मन में कहा, \"यह तो परमेश्वर की निंदा कर रहा है।\""
    - verse: 4
      text: "यीशु ने उनके विचार जानकर कहा, \"तुम अपने हृदयों में बुरा क्यों सोचते हो?"
    - verse: 5
      text: "कौन-सी बात कहना आसान है: 'तुम्हारे पाप क्षमा कर दिए गए हैं,' या 'उठो और चलो'?"
    - verse: 6
      text: "परन्तु ताकि तुम जानो कि मनुष्य के पुत्र को पृथ्वी पर पाप क्षमा करने का अधिकार है...\" तब उसने लकवे के रोगी से कहा, \"उठो, अपनी खाट उठाओ और अपने घर जाओ।\""
    - verse: 7
      text: "वह उठकर अपने घर चला गया।"
    - verse: 8
      text: "यह देखकर भीड़ें भयभीत हो गईं और उन्होंने परमेश्वर की महिमा की, जिसने मनुष्यों को ऐसा अधिकार दिया।"
    - verse: 9
      text: "वहाँ से आगे बढ़ते हुए यीशु ने मत्ती नाम के एक व्यक्ति को चुंगी की चौकी पर बैठे देखा। उसने उससे कहा, \"मेरे पीछे आओ।\" वह उठकर उसके पीछे हो लिया।"
    - verse: 10
      text: "और ऐसा हुआ कि जब यीशु घर में भोजन करने बैठा था, तो देखो, बहुत से चुंगी लेने वाले और पापी आए और यीशु तथा उसके चेलों के साथ भोजन करने बैठे।"
    - verse: 11
      text: "यह देखकर फरीसियों ने उसके चेलों से कहा, \"तुम्हारा गुरु चुंगी लेने वालों और पापियों के साथ क्यों खाता है?\""
    - verse: 12
      text: "यह सुनकर यीशु ने कहा, \"स्वस्थ लोगों को वैद्य की आवश्यकता नहीं होती, बल्कि बीमारों को होती है।"
    - verse: 13
      text: "जाकर सीखो कि इसका अर्थ क्या है: 'मैं दया चाहता हूँ, बलिदान नहीं।' क्योंकि मैं धर्मियों को बुलाने नहीं, बल्कि पापियों को बुलाने आया हूँ।\""
    - verse: 14
      text: "तब यूहन्ना के चेले उसके पास आए और कहने लगे, \"ऐसा क्यों है कि हम और फरीसी अक्सर उपवास करते हैं, पर आपके चेले उपवास नहीं करते?\""
    - verse: 15
      text: "यीशु ने उनसे कहा, \"क्या बाराती तब तक शोक मना सकते हैं, जब तक दूल्हा उनके साथ है? लेकिन वे दिन आएँगे जब दूल्हा उनसे ले लिया जाएगा; तब वे उपवास करेंगे।"
    - verse: 16
      text: "कोई भी पुराने वस्त्र पर बिना सिकुड़े नए कपड़े का पैबंद नहीं लगाता, क्योंकि वह पैबंद वस्त्र को खींचता है और फटाव और भी बढ़ जाता है।"
    - verse: 17
      text: "और लोग नया दाखरस पुरानी मशकों में नहीं भरते। ऐसा करने पर मशकें फट जाती हैं, दाखरस बह जाता है और मशकें नष्ट हो जाती हैं। बल्कि वे नया दाखरस नई मशकों में भरते हैं, और दोनों सुरक्षित रहते हैं।\""
    - verse: 18
      text: "जब यीशु उनसे ये बातें कह ही रहा था, तो देखो, एक अधिकारी उसके पास आया, उसे दंडवत किया और कहा, \"मेरी बेटी अभी-अभी मर गई है; लेकिन आप आकर उस पर अपना हाथ रख दें, तो वह जीवित हो जाएगी।\""
    - verse: 19
      text: "यीशु उठा और अपने चेलों के साथ उसके पीछे चला।"
    - verse: 20
      text: "और देखो, एक स्त्री, जिसे बारह वर्ष से रक्तस्राव हो रहा था, पीछे से आई और उसने यीशु के वस्त्र के किनारे की लटकन को छुआ;"
    - verse: 21
      text: "क्योंकि वह अपने मन में कहती थी, \"यदि मैं केवल उसके वस्त्र को छू लूँ, तो स्वस्थ हो जाऊँगी।\""
    - verse: 22
      text: "यीशु ने मुड़कर उसे देखा और कहा, \"बेटी, हिम्मत रखो! तुम्हारे विश्वास ने तुम्हें स्वस्थ कर दिया है।\" और वह स्त्री उसी घड़ी से स्वस्थ हो गई।"
    - verse: 23
      text: "जब यीशु अधिकारी के घर पहुँचा और उसने बाँसुरी बजाने वालों तथा शोर मचाती भीड़ को देखा,"
    - verse: 24
      text: "तो कहा, \"यहाँ से चले जाओ, क्योंकि लड़की मरी नहीं है, बल्कि सो रही है।\" और वे उसकी हँसी उड़ाने लगे।"
    - verse: 25
      text: "जब भीड़ बाहर निकाल दी गई, तब यीशु भीतर गया, लड़की का हाथ पकड़ा और वह उठ खड़ी हुई।"
    - verse: 26
      text: "इस बात की चर्चा उस पूरे क्षेत्र में फैल गई।"
    - verse: 27
      text: "जब यीशु वहाँ से आगे बढ़ा, तो दो अंधे उसके पीछे चल पड़े और पुकारते रहे, \"दाऊद के पुत्र, हम पर दया कीजिए!\""
    - verse: 28
      text: "जब यीशु घर में आया, तो वे अंधे उसके पास आए। यीशु ने उनसे कहा, \"क्या तुम्हें विश्वास है कि मैं यह कर सकता हूँ?\" उन्होंने कहा, \"हाँ, प्रभु।\""
    - verse: 29
      text: "तब उसने उनकी आँखें छुईं और कहा, \"तुम्हारे विश्वास के अनुसार तुम्हारे लिए ऐसा हो।\""
    - verse: 30
      text: "और उनकी आँखें खुल गईं। यीशु ने उन्हें कड़ी चेतावनी देते हुए कहा, \"ध्यान रखना, किसी को इसका पता न चले।\""
    - verse: 31
      text: "परन्तु उन्होंने बाहर निकलकर उस पूरे क्षेत्र में उसकी चर्चा फैला दी।"
    - verse: 32
      text: "जब वे बाहर जा रहे थे, तो देखो, लोग एक मूक व्यक्ति को उसके पास लाए, जो दुष्टात्मा से ग्रस्त था।"
    - verse: 33
      text: "दुष्टात्मा निकाले जाने पर वह मूक व्यक्ति बोलने लगा। भीड़ें आश्चर्यचकित होकर कहने लगीं, \"इस्राएल में ऐसा कभी नहीं देखा गया!\""
    - verse: 34
      text: "परन्तु फरीसियों ने कहा, \"यह दुष्टात्माओं के सरदार के द्वारा दुष्टात्माओं को निकालता है।\""
    - verse: 35
      text: "यीशु सभी नगरों और गाँवों में घूमता रहा, उनके सभाघरों में शिक्षा देता, राज्य के सुसमाचार का प्रचार करता और लोगों को हर प्रकार की बीमारी और हर प्रकार की दुर्बलता से चंगा करता रहा।"
    - verse: 36
      text: "जब उसने लोगों की भीड़ें देखीं, तो उसे उन पर करुणा आई, क्योंकि वे उन भेड़ों की तरह पीड़ित और पस्त थे जिनका कोई चरवाहा न हो।"
    - verse: 37
      text: "तब उसने अपने चेलों से कहा, \"फसल बहुत है, पर मजदूर थोड़े हैं।"
    - verse: 38
      text: "इसलिए फसल के स्वामी से विनती करो कि वह अपनी फसल काटने के लिए मजदूरों को काम में उतारे।\""
