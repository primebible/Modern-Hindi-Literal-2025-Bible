- book: "मत्ती"
  chapter: 24
  verses:
    - verse: 1
      text: "यीशु मंदिर-परिसर से निकलकर जा रहा था। उसके चेले उसके पास आए और उसे मंदिर-परिसर की इमारतें दिखाने लगे।"
    - verse: 2
      text: "उसने उनसे कहा, \"क्या तुम यह सब नहीं देखते? मैं तुमसे सच कहता हूँ: यहाँ पत्थर पर पत्थर नहीं छोड़ा जाएगा; हर एक गिरा दिया जाएगा।\""
    - verse: 3
      text: "जब वह जैतून के पहाड़ पर बैठा था, तो चेले उसके पास अकेले में आए और बोले, \"हमें बताइए, ये बातें कब होंगी? और आपके आगमन तथा युग के अंत का चिन्ह क्या होगा?\""
    - verse: 4
      text: "यीशु ने उन्हें उत्तर दिया, \"ध्यान रखो कि कोई तुम्हें न भटकाए।"
    - verse: 5
      text: "क्योंकि बहुत से मेरा नाम लेकर आएँगे और कहेंगे, 'मैं मसीह हूँ,' और बहुतों को भटका देंगे।"
    - verse: 6
      text: "तुम युद्धों और युद्धों की खबरें सुनोगे। ध्यान रखो कि घबराओ नहीं, क्योंकि इनका होना आवश्यक है, लेकिन अभी अंत नहीं है।"
    - verse: 7
      text: "क्योंकि राष्ट्र के विरुद्ध राष्ट्र और राज्य के विरुद्ध राज्य उठ खड़े होंगे, और जगह-जगह अकाल और भूकंप होंगे।"
    - verse: 8
      text: "ये सब प्रसव-पीड़ाओं की शुरुआत हैं।\""
    - verse: 9
      text: "\"तब वे तुम्हें क्लेश सहने के लिए सौंप देंगे और मार डालेंगे। मेरे नाम के कारण सभी राष्ट्र तुमसे घृणा करेंगे।"
    - verse: 10
      text: "तब बहुत से ठोकर खाएँगे, एक-दूसरे को सौंप देंगे और एक-दूसरे से घृणा करेंगे।"
    - verse: 11
      text: "बहुत से झूठे भविष्यवक्ता उठ खड़े होंगे और बहुतों को भटका देंगे।"
    - verse: 12
      text: "अधर्म बढ़ने के कारण बहुतों का प्रेम ठंडा पड़ जाएगा।"
    - verse: 13
      text: "पर जो अंत तक धीरज धरेगा, वही बचाया जाएगा।"
    - verse: 14
      text: "राज्य का यह सुसमाचार सारी दुनिया में सभी राष्ट्रों के लिए गवाही के रूप में प्रचार किया जाएगा, और तब अंत आएगा।\""
    - verse: 15
      text: "\"इसलिए जब तुम दानिय्येल भविष्यवक्ता के द्वारा कही गई उजाड़ लाने वाली घृणित वस्तु को पवित्र स्थान में खड़ी देखो (पढ़ने वाला समझ ले),"
    - verse: 16
      text: "तब जो यहूदिया में हों, वे पहाड़ों पर भाग जाएँ।"
    - verse: 17
      text: "जो छत पर हो, वह अपने घर से कुछ लेने के लिए नीचे न उतरे,"
    - verse: 18
      text: "और जो खेत में हो, वह अपना चोगा लेने के लिए पीछे न लौटे।"
    - verse: 19
      text: "उन दिनों गर्भवती स्त्रियों और दूध पिलाने वाली माताओं पर हाय!"
    - verse: 20
      text: "प्रार्थना करो कि तुम्हारा भागना सर्दियों में या सब्त के दिन न हो।"
    - verse: 21
      text: "क्योंकि तब ऐसा बड़ा क्लेश होगा, जैसा संसार की शुरुआत से अब तक नहीं हुआ और फिर कभी भी नहीं होगा।"
    - verse: 22
      text: "यदि वे दिन घटाए न जाते, तो कोई भी जीवित न बचता; लेकिन चुने हुओं के कारण वे दिन घटाए जाएँगे।\""
    - verse: 23
      text: "\"तब यदि कोई तुमसे कहे, 'देखो, मसीह यहाँ है,' या, 'वहाँ है,' तो विश्वास मत करना।"
    - verse: 24
      text: "क्योंकि झूठे मसीह और झूठे भविष्यवक्ता उठ खड़े होंगे और बड़े चिन्ह तथा चमत्कार दिखाएँगे, ताकि संभव हो तो चुने हुओं को भी भटका दें।"
    - verse: 25
      text: "देखो, मैंने तुम्हें पहले ही बता दिया है।"
    - verse: 26
      text: "इसलिए यदि वे तुमसे कहें, 'देखो, वह निर्जन प्रदेश में है,' तो बाहर मत जाना; या, 'देखो, वह भीतरी कमरों में है,' तो विश्वास मत करना।"
    - verse: 27
      text: "क्योंकि जैसे बिजली पूरब से निकलकर पश्चिम तक दिखाई देती है, वैसे ही मनुष्य के पुत्र का आगमन होगा।"
    - verse: 28
      text: "जहाँ शव होगा, वहाँ गिद्ध इकट्ठे होंगे।\""
    - verse: 29
      text: "\"उन दिनों के क्लेश के तुरंत बाद सूर्य अंधकारमय हो जाएगा, चंद्रमा अपना प्रकाश नहीं देगा, तारे आकाश से गिरेंगे और आकाश की शक्तियाँ हिलाई जाएँगी।"
    - verse: 30
      text: "तब मनुष्य के पुत्र का चिन्ह आकाश में दिखाई देगा। पृथ्वी के सभी गोत्र छाती पीटेंगे और मनुष्य के पुत्र को सामर्थ्य तथा बड़ी महिमा के साथ आकाश के बादलों पर आते देखेंगे।"
    - verse: 31
      text: "वह एक बड़ी तुरही के साथ अपने स्वर्गदूतों को भेजेगा, और वे उसके चुने हुओं को चारों दिशाओं से, आकाश के एक छोर से दूसरे छोर तक, इकट्ठा करेंगे।\""
    - verse: 32
      text: "\"अंजीर के पेड़ से यह दृष्टांत सीखो: जैसे ही उसकी डाल कोमल हो जाती है और पत्ते निकल आते हैं, तुम जानते हो कि गर्मी निकट है।"
    - verse: 33
      text: "इसी प्रकार जब तुम यह सब होते देखो, तो जान लो कि वह निकट है, द्वार पर ही है।"
    - verse: 34
      text: "मैं तुमसे सच कहता हूँ: यह पीढ़ी निश्चय ही नहीं बीतेगी, जब तक यह सब न हो जाए।"
    - verse: 35
      text: "आकाश और पृथ्वी टल जाएँगे, लेकिन मेरे वचन निश्चय ही नहीं टलेंगे।\""
    - verse: 36
      text: "\"उस दिन और घड़ी के विषय में कोई नहीं जानता, न स्वर्ग के स्वर्गदूत, न पुत्र, बल्कि केवल पिता।"
    - verse: 37
      text: "क्योंकि जैसे नूह के दिन थे, वैसे ही मनुष्य के पुत्र का आगमन होगा।"
    - verse: 38
      text: "जलप्रलय से पहले के दिनों में लोग खाते-पीते और विवाह करते तथा विवाह करवाते थे, उस दिन तक जब नूह जहाज में गया।"
    - verse: 39
      text: "उन्हें कुछ पता नहीं चला, जब तक जलप्रलय आकर सबको बहा नहीं ले गया। मनुष्य के पुत्र का आगमन भी ऐसा ही होगा।"
    - verse: 40
      text: "तब दो पुरुष खेत में होंगे; एक ले लिया जाएगा और दूसरा छोड़ दिया जाएगा।"
    - verse: 41
      text: "दो स्त्रियाँ चक्की पीस रही होंगी; एक ले ली जाएगी और दूसरी छोड़ दी जाएगी।"
    - verse: 42
      text: "इसलिए जागते रहो, क्योंकि तुम नहीं जानते कि तुम्हारा प्रभु किस दिन आएगा।"
    - verse: 43
      text: "लेकिन यह जान लो: यदि घर के स्वामी को पता होता कि चोर रात के किस पहर आएगा, तो वह जागता रहता और अपने घर में सेंध न लगने देता।"
    - verse: 44
      text: "इसलिए तुम भी तैयार रहो, क्योंकि जिस घड़ी की तुम अपेक्षा नहीं करते, मनुष्य का पुत्र आएगा।\""
    - verse: 45
      text: "\"तो वह विश्वासयोग्य और बुद्धिमान दास कौन है, जिसे उसके स्वामी ने अपने घर के सेवकों पर नियुक्त किया है कि उन्हें समय पर भोजन दे?"
    - verse: 46
      text: "धन्य है वह दास, जिसे उसका स्वामी आकर ऐसा करते पाए।"
    - verse: 47
      text: "मैं तुमसे सच कहता हूँ: वह उसे अपनी सारी संपत्ति पर नियुक्त करेगा।"
    - verse: 48
      text: "लेकिन यदि वह बुरा दास अपने हृदय में कहे, 'मेरा स्वामी देर कर रहा है,'"
    - verse: 49
      text: "और अपने साथी दासों को पीटने लगे तथा शराबियों के साथ खाने-पीने लगे,"
    - verse: 50
      text: "तो उस दास का स्वामी ऐसे दिन आएगा जिसकी वह अपेक्षा नहीं करता और ऐसी घड़ी में जिसे वह नहीं जानता।"
    - verse: 51
      text: "वह उसे दो टुकड़े कर देगा और उसका भाग कपटियों के साथ रखेगा; वहाँ रोना और दाँत पीसना होगा।\""
