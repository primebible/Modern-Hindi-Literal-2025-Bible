- book: "मत्ती"
  chapter: 26
  verses:
    - verse: 1
      text: "जब यीशु ये सब बातें कह चुका, तो उसने अपने चेलों से कहा:"
    - verse: 2
      text: "\"तुम जानते हो कि दो दिन बाद फसह है, और मनुष्य का पुत्र क्रूस पर चढ़ाए जाने के लिए सौंपा जाएगा।\""
    - verse: 3
      text: "तब प्रधान याजक और लोगों के प्राचीन कयाफा नामक महायाजक के आँगन में इकट्ठे हुए"
    - verse: 4
      text: "और यीशु को छल से पकड़कर मार डालने की योजना बनाने लगे।"
    - verse: 5
      text: "लेकिन वे कहते थे, \"पर्व के समय नहीं, कहीं लोगों में हंगामा न मच जाए।\""
    - verse: 6
      text: "जब यीशु बैतनिया में कुष्ठ रोगी शमौन के घर था,"
    - verse: 7
      text: "तो एक स्त्री बहुत महँगे सुगंधित तेल से भरी पत्थर की कुप्पी लेकर उसके पास आई। जब वह भोजन के लिए बैठा था, उसने वह तेल उसके सिर पर उँडेल दिया।"
    - verse: 8
      text: "यह देखकर चेले नाराज़ हुए और बोले, \"यह बरबादी क्यों?\""
    - verse: 9
      text: "\"इसे बहुत बड़ी कीमत पर बेचकर गरीबों को दिया जा सकता था।\""
    - verse: 10
      text: "यीशु ने यह जानकर उनसे कहा, \"तुम इस स्त्री को क्यों परेशान करते हो? उसने मेरे लिए अच्छा काम किया है।"
    - verse: 11
      text: "गरीब हमेशा तुम्हारे साथ हैं, लेकिन मैं हमेशा तुम्हारे साथ नहीं रहूँगा।"
    - verse: 12
      text: "इस स्त्री ने मेरे शरीर पर यह सुगंधित तेल डालकर मेरे दफनाए जाने की तैयारी की है।"
    - verse: 13
      text: "मैं तुमसे सच कहता हूँ: सारे संसार में जहाँ कहीं यह सुसमाचार प्रचार किया जाएगा, वहाँ इस स्त्री ने जो किया है, वह भी उसकी याद में बताया जाएगा।\""
    - verse: 14
      text: "तब बारह में से एक, यहूदा इस्करियोती नामक व्यक्ति, प्रधान याजकों के पास गया"
    - verse: 15
      text: "और बोला, \"तुम मुझे क्या देना चाहते हो? मैं उसे तुम्हें सौंप दूँगा।\" उन्होंने उसे चाँदी के तीस सिक्के तौलकर दिए।"
    - verse: 16
      text: "तब से वह यीशु को सौंपने का उचित अवसर ढूँढ़ने लगा।"
    - verse: 17
      text: "अखमीरी रोटी के पहले दिन चेले यीशु के पास आए और बोले, \"आप कहाँ चाहते हैं कि हम आपके लिए फसह का भोजन तैयार करें?\""
    - verse: 18
      text: "उसने कहा, \"नगर में अमुक व्यक्ति के पास जाओ और उससे कहो, 'गुरु कहते हैं: मेरा समय निकट है। मैं अपने चेलों के साथ तुम्हारे घर फसह मनाऊँगा।'\""
    - verse: 19
      text: "चेलों ने यीशु के आदेश के अनुसार किया और फसह का भोजन तैयार किया।"
    - verse: 20
      text: "शाम होने पर वह बारह चेलों के साथ भोजन के लिए बैठा।"
    - verse: 21
      text: "जब वे खा रहे थे, तो उसने कहा, \"मैं तुमसे सच कहता हूँ: तुममें से एक मुझे सौंप देगा।\""
    - verse: 22
      text: "वे बहुत दुखी हुए और एक-एक करके उससे पूछने लगे, \"प्रभु, कहीं वह मैं तो नहीं?\""
    - verse: 23
      text: "उसने उत्तर दिया, \"जिसने मेरे साथ कटोरे में हाथ डुबोया है, वही मुझे सौंप देगा।"
    - verse: 24
      text: "मनुष्य का पुत्र तो जाता है, जैसा उसके विषय में लिखा है; लेकिन उस मनुष्य पर हाय, जिसके द्वारा मनुष्य का पुत्र सौंपा जाता है! उस मनुष्य के लिए अच्छा होता, यदि वह जन्मा ही न होता।\""
    - verse: 25
      text: "तब उसे सौंपने वाला यहूदा बोला, \"रब्बी, कहीं वह मैं तो नहीं?\" उसने उससे कहा, \"तुमने कहा है।\""
    - verse: 26
      text: "जब वे खा रहे थे, तो यीशु ने रोटी ली, आशीष देकर उसे तोड़ा और चेलों को देकर कहा, \"लो, खाओ; यह मेरा शरीर है।\""
    - verse: 27
      text: "फिर उसने प्याला लिया, धन्यवाद दिया, उन्हें देकर कहा, \"तुम सब इसमें से पियो,"
    - verse: 28
      text: "क्योंकि यह मेरा लहू है, वाचा का लहू, जो बहुतों के पापों की क्षमा के लिए बहाया जाता है।"
    - verse: 29
      text: "मैं तुमसे कहता हूँ: अब से मैं दाखलता का यह फल उस दिन तक निश्चय ही नहीं पिऊँगा, जब मैं इसे अपने पिता के राज्य में तुम्हारे साथ नए रूप में पिऊँगा।\""
    - verse: 30
      text: "भजन गाकर वे जैतून के पहाड़ की ओर निकल गए।"
    - verse: 31
      text: "तब यीशु ने उनसे कहा, \"आज रात तुम सब मेरे कारण ठोकर खाओगे, क्योंकि लिखा है: 'मैं चरवाहे को मारूँगा, और झुंड की भेड़ें तितर-बितर हो जाएँगी।'"
    - verse: 32
      text: "लेकिन मेरे जीवित किए जाने के बाद मैं तुमसे पहले गलील जाऊँगा।\""
    - verse: 33
      text: "पतरस ने उससे कहा, \"चाहे सब आपके कारण ठोकर खाएँ, मैं कभी ठोकर नहीं खाऊँगा।\""
    - verse: 34
      text: "यीशु ने उससे कहा, \"मैं तुमसे सच कहता हूँ: आज ही रात, मुर्गे के बाँग देने से पहले, तुम तीन बार मेरा इनकार करोगे।\""
    - verse: 35
      text: "पतरस ने उससे कहा, \"यदि मुझे आपके साथ मरना भी पड़े, तो भी मैं आपका इनकार कभी नहीं करूँगा।\" सभी चेलों ने भी यही कहा।"
    - verse: 36
      text: "तब यीशु उनके साथ गथसमनी नामक स्थान पर आया और चेलों से कहा, \"यहाँ बैठो, जब तक मैं वहाँ जाकर प्रार्थना करूँ।\""
    - verse: 37
      text: "वह पतरस और जब्दी के दोनों पुत्रों को साथ ले गया और उदास तथा व्याकुल होने लगा।"
    - verse: 38
      text: "तब उसने उनसे कहा, \"मेरा प्राण मृत्यु तक उदास है। यहाँ ठहरो और मेरे साथ जागते रहो।\""
    - verse: 39
      text: "वह थोड़ा आगे बढ़ा, मुँह के बल गिरा और प्रार्थना करने लगा, \"हे मेरे पिता, यदि संभव हो, तो यह प्याला मुझसे टल जाए; फिर भी जैसा मैं चाहता हूँ वैसा नहीं, बल्कि जैसा आप चाहते हैं।\""
    - verse: 40
      text: "फिर वह चेलों के पास आया, उन्हें सोते पाया और पतरस से कहा, \"क्या तुम मेरे साथ एक घड़ी भी जाग नहीं सके?\""
    - verse: 41
      text: "\"जागते रहो और प्रार्थना करो, ताकि तुम परीक्षा में न पड़ो। आत्मा तो तैयार है, लेकिन शरीर दुर्बल है।\""
    - verse: 42
      text: "वह फिर दूसरी बार गया और प्रार्थना की, \"हे मेरे पिता, यदि इसे मेरे पिए बिना टलना संभव नहीं, तो आपकी इच्छा पूरी हो।\""
    - verse: 43
      text: "वह फिर आया और उन्हें सोते पाया, क्योंकि उनकी आँखें बोझिल थीं।"
    - verse: 44
      text: "वह उन्हें छोड़कर फिर चला गया और तीसरी बार वही बात कहकर प्रार्थना की।"
    - verse: 45
      text: "तब वह चेलों के पास आया और उनसे कहा, \"क्या तुम अब भी सो रहे हो और विश्राम कर रहे हो? देखो, घड़ी आ पहुँची है, और मनुष्य का पुत्र पापियों के हाथों सौंपा जा रहा है।"
    - verse: 46
      text: "उठो, चलें। देखो, मुझे सौंपने वाला निकट आ गया है।\""
    - verse: 47
      text: "वह बोल ही रहा था कि देखो, बारह में से एक, यहूदा, आ पहुँचा। उसके साथ प्रधान याजकों और लोगों के प्राचीनों की ओर से तलवारों और लाठियों के साथ एक बड़ी भीड़ थी।"
    - verse: 48
      text: "उसे सौंपने वाले ने उन्हें यह चिन्ह दिया था, \"जिसे मैं चूमूँ, वही है; उसे पकड़ लेना।\""
    - verse: 49
      text: "वह तुरंत यीशु के पास आया और बोला, \"प्रणाम, रब्बी!\" और उसे चूम लिया।"
    - verse: 50
      text: "यीशु ने उससे कहा, \"मित्र, जिस काम के लिए आए हो, वह करो।\" तब उन्होंने आगे बढ़कर यीशु पर हाथ डाले और उसे पकड़ लिया।"
    - verse: 51
      text: "और देखो, यीशु के साथ वालों में से एक ने हाथ बढ़ाकर अपनी तलवार खींची, महायाजक के दास पर चलाई और उसका कान काट दिया।"
    - verse: 52
      text: "तब यीशु ने उससे कहा, \"अपनी तलवार वापस उसके स्थान पर रख दो, क्योंकि तलवार उठाने वाले सभी लोग तलवार से नष्ट होंगे।"
    - verse: 53
      text: "क्या तुम समझते हो कि मैं अपने पिता से विनती नहीं कर सकता? वह तुरंत मेरे पास स्वर्गदूतों के बारह से अधिक सेना-दल भेज देंगे।"
    - verse: 54
      text: "तो फिर शास्त्र कैसे पूरे होंगे कि ऐसा होना आवश्यक है?\""
    - verse: 55
      text: "उसी घड़ी यीशु ने भीड़ से कहा, \"क्या तुम मुझे डाकू समझकर तलवारें और लाठियाँ लेकर पकड़ने निकले हो? मैं प्रतिदिन मंदिर-परिसर में बैठकर शिक्षा देता था, और तुमने मुझे नहीं पकड़ा।"
    - verse: 56
      text: "लेकिन यह सब इसलिए हुआ कि भविष्यवक्ताओं के लिखे वचन पूरे हों।\" तब सभी चेले उसे छोड़कर भाग गए।"
    - verse: 57
      text: "जिन लोगों ने यीशु को पकड़ा था, वे उसे कयाफा महायाजक के पास ले गए, जहाँ शास्त्री और प्राचीन इकट्ठे थे।"
    - verse: 58
      text: "पतरस दूर से उसके पीछे महायाजक के आँगन तक गया। भीतर जाकर वह पहरेदारों के साथ बैठ गया, ताकि देखे कि अंत में क्या होता है।"
    - verse: 59
      text: "प्रधान याजक और पूरी महासभा यीशु के विरुद्ध झूठी गवाही ढूँढ़ रहे थे, ताकि उसे मार डालें,"
    - verse: 60
      text: "लेकिन बहुत से झूठे गवाह आने पर भी उन्हें कुछ नहीं मिला। बाद में दो गवाह आए"
    - verse: 61
      text: "और बोले, \"इस व्यक्ति ने कहा था, 'मैं परमेश्वर के मंदिर के पवित्र भवन को ढा सकता हूँ और तीन दिनों में उसे फिर बना सकता हूँ।'\""
    - verse: 62
      text: "तब महायाजक खड़ा हुआ और उससे पूछा, \"क्या तुम कोई उत्तर नहीं देते? ये लोग तुम्हारे विरुद्ध क्या गवाही दे रहे हैं?\""
    - verse: 63
      text: "लेकिन यीशु चुप रहा। महायाजक ने उससे कहा, \"मैं तुम्हें जीवित परमेश्वर की शपथ देता हूँ: हमें बताओ, क्या तुम मसीह, परमेश्वर के पुत्र हो?\""
    - verse: 64
      text: "यीशु ने उससे कहा, \"तुमने कहा है। फिर भी मैं तुम सबसे कहता हूँ: अब से तुम मनुष्य के पुत्र को सामर्थ्य के दाहिने बैठे और आकाश के बादलों पर आते देखोगे।\""
    - verse: 65
      text: "तब महायाजक ने अपने वस्त्र फाड़कर कहा, \"उसने निंदा की है! अब हमें गवाहों की क्या आवश्यकता है? देखो, अभी तुमने निंदा सुन ली है।"
    - verse: 66
      text: "तुम्हारा क्या विचार है?\" उन्होंने उत्तर दिया, \"वह मृत्यु के योग्य है!\""
    - verse: 67
      text: "तब उन्होंने उसके मुँह पर थूका, उसे मुक्के मारे, और कुछ ने उसे थप्पड़ मारे"
    - verse: 68
      text: "और कहा, \"मसीह, हमें भविष्यवाणी करके बता, तुझे किसने मारा?\""
    - verse: 69
      text: "पतरस बाहर आँगन में बैठा था। एक दासी उसके पास आई और बोली, \"तुम भी गलील के यीशु के साथ थे।\""
    - verse: 70
      text: "लेकिन उसने सबके सामने इनकार किया, \"मैं नहीं जानता तुम क्या कह रही हो।\""
    - verse: 71
      text: "जब वह द्वार की ओर गया, तो दूसरी दासी ने उसे देखा और वहाँ के लोगों से कहा, \"यह व्यक्ति भी नासरत के यीशु के साथ था।\""
    - verse: 72
      text: "उसने फिर शपथ खाकर इनकार किया, \"मैं उस व्यक्ति को नहीं जानता।\""
    - verse: 73
      text: "थोड़ी देर बाद वहाँ खड़े लोग पतरस के पास आए और बोले, \"निश्चय ही तुम भी उन्हीं में से हो, क्योंकि तुम्हारी बोली तुम्हें प्रकट करती है।\""
    - verse: 74
      text: "तब वह अपने ऊपर शाप बुलाकर शपथ खाने लगा, \"मैं उस व्यक्ति को नहीं जानता!\" तुरंत मुर्गे ने बाँग दी।"
    - verse: 75
      text: "तब पतरस को यीशु का कहा हुआ वचन याद आया: \"मुर्गे के बाँग देने से पहले तुम तीन बार मेरा इनकार करोगे।\" वह बाहर गया और कड़वे आँसू बहाए।"
