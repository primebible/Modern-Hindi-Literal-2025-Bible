- book: "मत्ती"
  chapter: 14
  verses:
    - verse: 1
      text: "उस समय चौथाई प्रदेश के शासक हेरोदेस ने यीशु की चर्चा सुनी।"
    - verse: 2
      text: "उसने अपने सेवकों से कहा, \"यह बपतिस्मा देने वाला यूहन्ना है। वह मरे हुओं में से जी उठा है, और इसीलिए उसके द्वारा ये सामर्थ्य के काम हो रहे हैं।\""
    - verse: 3
      text: "हेरोदेस ने अपने भाई फिलिप्पुस की पत्नी हेरोदियास के कारण यूहन्ना को पकड़कर बाँध दिया और जेल में डाल दिया था।"
    - verse: 4
      text: "क्योंकि यूहन्ना उससे कहता रहा था, \"उसे अपनी पत्नी के रूप में रखना तुम्हारे लिए उचित नहीं है।\""
    - verse: 5
      text: "हेरोदेस उसे मार डालना चाहता था, लेकिन भीड़ से डरता था, क्योंकि लोग यूहन्ना को भविष्यवक्ता मानते थे।"
    - verse: 6
      text: "हेरोदेस के जन्मदिन के उत्सव में हेरोदियास की बेटी ने सबके बीच नृत्य किया और हेरोदेस को प्रसन्न कर दिया।"
    - verse: 7
      text: "इसलिए उसने शपथ खाकर उससे वादा किया कि वह जो कुछ माँगेगी, उसे देगा।"
    - verse: 8
      text: "अपनी माँ के उकसाने पर उसने कहा, \"मुझे बपतिस्मा देने वाले यूहन्ना का सिर यहीं एक थाल में दे दीजिए।\""
    - verse: 9
      text: "राजा दुखी हुआ, लेकिन अपनी शपथों और साथ भोजन करने वालों के कारण उसने उसे देने की आज्ञा दी।"
    - verse: 10
      text: "उसने किसी को भेजकर जेल में यूहन्ना का सिर कटवा दिया।"
    - verse: 11
      text: "उसका सिर थाल में लाकर लड़की को दिया गया, और वह उसे अपनी माँ के पास ले गई।"
    - verse: 12
      text: "यूहन्ना के चेले आए, उसका शव ले गए और उसे दफना दिया। फिर उन्होंने जाकर यीशु को बताया।"
    - verse: 13
      text: "जब यीशु ने यह सुना, तो वह वहाँ से नाव में एक निर्जन स्थान पर अकेला चला गया। यह सुनकर लोगों की भीड़ें नगरों से पैदल उसके पीछे चलीं।"
    - verse: 14
      text: "जब यीशु बाहर आया, तो उसने बड़ी भीड़ देखी। उसे उन पर करुणा आई और उसने उनके बीमारों को चंगा किया।"
    - verse: 15
      text: "शाम होने पर उसके चेले उसके पास आए और कहा, \"यह स्थान निर्जन है और समय पहले ही बीत चुका है। लोगों को विदा कर दीजिए, ताकि वे गाँवों में जाकर अपने लिए भोजन खरीद लें।\""
    - verse: 16
      text: "लेकिन यीशु ने उनसे कहा, \"उन्हें जाने की आवश्यकता नहीं है। तुम ही उन्हें खाने को दो।\""
    - verse: 17
      text: "उन्होंने उससे कहा, \"हमारे पास यहाँ पाँच रोटियों और दो मछलियों के सिवा कुछ नहीं है।\""
    - verse: 18
      text: "उसने कहा, \"उन्हें यहाँ मेरे पास ले आओ।\""
    - verse: 19
      text: "उसने लोगों को घास पर बैठने की आज्ञा दी। फिर उसने पाँच रोटियाँ और दो मछलियाँ लीं, स्वर्ग की ओर देखकर आशीष दी, रोटियाँ तोड़ीं और चेलों को दीं; और चेलों ने लोगों को दीं।"
    - verse: 20
      text: "सबने खाया और तृप्त हो गए। फिर उन्होंने बचे हुए टुकड़ों से भरी बारह टोकरियाँ उठाईं।"
    - verse: 21
      text: "खाने वाले पुरुष लगभग पाँच हजार थे; इनके अलावा स्त्रियाँ और बच्चे भी थे।"
    - verse: 22
      text: "तुरंत यीशु ने चेलों को विवश किया कि वे नाव में चढ़कर उससे पहले उस पार चले जाएँ, जब तक वह भीड़ को विदा करे।"
    - verse: 23
      text: "भीड़ को विदा करने के बाद वह प्रार्थना करने के लिए अकेला पहाड़ पर चढ़ गया। शाम होने पर वह वहाँ अकेला था।"
    - verse: 24
      text: "नाव तब तक किनारे से बहुत दूर जा चुकी थी। लहरें उसे बुरी तरह झकझोर रही थीं, क्योंकि हवा विपरीत दिशा से चल रही थी।"
    - verse: 25
      text: "रात के चौथे पहर में यीशु सागर पर चलता हुआ उनके पास आया।"
    - verse: 26
      text: "जब चेलों ने उसे सागर पर चलते देखा, तो वे घबरा गए और बोले, \"यह कोई भूत है!\" और डर के मारे चिल्ला उठे।"
    - verse: 27
      text: "लेकिन यीशु ने तुरंत उनसे कहा, \"हिम्मत रखो! मैं हूँ। मत डरो।\""
    - verse: 28
      text: "पतरस ने उसे उत्तर दिया, \"प्रभु, यदि आप ही हैं, तो मुझे आज्ञा दीजिए कि मैं पानी पर चलकर आपके पास आऊँ।\""
    - verse: 29
      text: "उसने कहा, \"आओ।\" पतरस नाव से उतरकर पानी पर चला और यीशु की ओर बढ़ा।"
    - verse: 30
      text: "लेकिन तेज हवा देखकर वह डर गया। जब वह डूबने लगा, तो चिल्लाया, \"प्रभु, मुझे बचाइए!\""
    - verse: 31
      text: "यीशु ने तुरंत हाथ बढ़ाकर उसे पकड़ लिया और कहा, \"कम विश्वास रखने वाले, तुमने संदेह क्यों किया?\""
    - verse: 32
      text: "जब वे नाव में चढ़ गए, तो हवा थम गई।"
    - verse: 33
      text: "जो नाव में थे, उन्होंने उसे दंडवत किया और कहा, \"सचमुच आप परमेश्वर के पुत्र हैं!\""
    - verse: 34
      text: "पार पहुँचकर वे गन्नेसरत की भूमि पर आए।"
    - verse: 35
      text: "उस स्थान के लोगों ने उसे पहचान लिया और आसपास के पूरे क्षेत्र में खबर भेजी। फिर वे सभी बीमारों को उसके पास लाए।"
    - verse: 36
      text: "वे उससे विनती करने लगे कि उन्हें केवल उसके वस्त्र के किनारे की लटकन छू लेने दी जाए। जितनों ने उस लटकन को छुआ, वे सभी पूरी तरह स्वस्थ हो गए।"
