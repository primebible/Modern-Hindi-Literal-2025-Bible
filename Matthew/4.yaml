- book: "मत्ती"
  chapter: 4
  verses:
    - verse: 1
      text: "तब यीशु आत्मा के द्वारा निर्जन प्रदेश में ले जाया गया, ताकि इब्लीस उसे परखे।"
    - verse: 2
      text: "चालीस दिन और चालीस रातों तक उपवास करने के बाद उसे भूख लगी।"
    - verse: 3
      text: "तब परखने वाला उसके पास आया और उससे कहा, \"यदि तू परमेश्वर का पुत्र है, तो कह दे कि ये पत्थर रोटियाँ बन जाएँ।\""
    - verse: 4
      text: "परन्तु उसने उत्तर दिया, \"लिखा है: 'मनुष्य केवल रोटी से नहीं, बल्कि परमेश्वर के मुँह से निकलने वाले हर वचन से जीवित रहेगा।'\""
    - verse: 5
      text: "तब इब्लीस उसे पवित्र नगर में ले गया और मंदिर के कंगूरे पर खड़ा कर दिया।"
    - verse: 6
      text: "और उससे कहा, \"यदि तू परमेश्वर का पुत्र है, तो अपने आप को नीचे गिरा दे, क्योंकि लिखा है: 'वह तेरे विषय में अपने दूतों को आज्ञा देगा,' और 'वे तुझे अपने हाथों पर उठा लेंगे, ताकि तेरा पाँव किसी पत्थर से न टकराए।'\""
    - verse: 7
      text: "यीशु ने उससे कहा, \"यह भी लिखा है: 'तू अपने प्रभु परमेश्वर को मत परख।'\""
    - verse: 8
      text: "फिर इब्लीस उसे एक बहुत ऊँचे पहाड़ पर ले गया और उसे संसार के सभी राज्य और उनका वैभव दिखाया।"
    - verse: 9
      text: "उसने उससे कहा, \"यदि तू मेरे सामने भूमि पर झुककर मेरी आराधना करे, तो मैं यह सब तुझे दे दूँगा।\""
    - verse: 10
      text: "तब यीशु ने उससे कहा, \"दूर हो जा, शैतान! क्योंकि लिखा है: 'तू अपने प्रभु परमेश्वर की आराधना कर और केवल उसी की सेवा कर।'\""
    - verse: 11
      text: "तब इब्लीस उसे छोड़कर चला गया, और देखो, स्वर्गदूत आए और उसकी सेवा करने लगे।"
    - verse: 12
      text: "जब यीशु ने सुना कि यूहन्ना को सौंप दिया गया था, तो वह गलील चला गया।"
    - verse: 13
      text: "नासरत छोड़कर वह जबूलून और नप्ताली के क्षेत्र में सागर के किनारे बसे कफरनहूम में आकर रहने लगा,"
    - verse: 14
      text: "ताकि भविष्यवक्ता यशायाह के द्वारा कही गई यह बात पूरी हो:"
    - verse: 15
      text: "\"जबूलून की भूमि और नप्ताली की भूमि, सागर का मार्ग, यर्दन नदी के पार, गैर-यहूदियों का गलील:"
    - verse: 16
      text: "अंधकार में बैठे लोगों ने महान प्रकाश देखा, और मृत्यु के प्रदेश और उसकी छाया में बैठे लोगों पर प्रकाश उदय हुआ।\""
    - verse: 17
      text: "तब से यीशु यह प्रचार करने लगा: \"पश्चाताप करो, क्योंकि स्वर्ग का राज्य निकट आ गया है।\""
    - verse: 18
      text: "गलील सागर के किनारे चलते हुए यीशु ने दो भाइयों को देखा: शमौन, जो पतरस कहलाता है, और उसका भाई अन्द्रियास। वे सागर में जाल डाल रहे थे, क्योंकि वे मछुआरे थे।"
    - verse: 19
      text: "उसने उनसे कहा, \"मेरे पीछे आओ, और मैं तुम्हें मनुष्यों के मछुआरे बनाऊँगा।\""
    - verse: 20
      text: "वे तुरंत अपने जाल छोड़कर उसके पीछे हो लिए।"
    - verse: 21
      text: "वहाँ से आगे बढ़कर यीशु ने दो और भाइयों को देखा: जब्दी के पुत्र याकूब और उसके भाई यूहन्ना। वे अपने पिता जब्दी के साथ नाव में अपने जाल ठीक कर रहे थे। उसने उन्हें बुलाया।"
    - verse: 22
      text: "वे तुरंत नाव और अपने पिता को छोड़कर उसके पीछे हो लिए।"
    - verse: 23
      text: "यीशु पूरे गलील में घूमता रहा, वहाँ के सभाघरों में शिक्षा देता, राज्य के सुसमाचार का प्रचार करता और लोगों को हर प्रकार की बीमारी और हर प्रकार की दुर्बलता से चंगा करता रहा।"
    - verse: 24
      text: "उसकी चर्चा पूरे सीरिया में फैल गई। लोग उसके पास सभी बीमारों को लाए: तरह-तरह के रोगों और पीड़ाओं से जकड़े हुए लोगों को, दुष्टात्माओं से ग्रस्त लोगों को, मिर्गी के रोगियों को और लकवे के रोगियों को। उसने उन्हें चंगा किया।"
    - verse: 25
      text: "गलील, दिकापुलिस, यरूशलेम, यहूदिया और यर्दन नदी के पार से लोगों की बड़ी-बड़ी भीड़ें उसके पीछे हो लीं।"
