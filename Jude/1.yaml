- book: "यहूदा"
  chapter: 1
  verses:
    - verse: 1
      text: "यहूदा, यीशु मसीह का दास और याकूब का भाई, उन बुलाए हुए लोगों के नाम, जो परमेश्वर पिता के प्रिय हैं और यीशु मसीह के लिए रखे गए हैं।"
    - verse: 2
      text: "तुम पर दया, शांति और प्रेम बहुतायत से बढ़ते जाएँ।"
    - verse: 3
      text: "प्रिय लोगो, मैं हमारे साझा उद्धार के विषय में तुम्हें लिखने का पूरा प्रयास कर रहा था, पर मुझे यह आवश्यक लगा कि तुम्हें लिखकर आग्रह करूँ कि तुम उस विश्वास के लिए पूरी दृढ़ता से संघर्ष करो, जो पवित्र जनों को एक ही बार सदा के लिए सौंपा गया था।"
    - verse: 4
      text: "क्योंकि कुछ लोग चुपके से घुस आए हैं, जिनके लिए इस दंड का निर्णय बहुत पहले लिख दिया गया था। वे भक्तिहीन लोग हैं, जो हमारे परमेश्वर के अनुग्रह को बेलगाम अनैतिकता में बदल देते हैं और हमारे एकमात्र स्वामी और प्रभु, यीशु मसीह का इनकार करते हैं।"
    - verse: 5
      text: "अब मैं तुम्हें याद दिलाना चाहता हूँ, यद्यपि तुम यह सब पहले ही जान चुके हो, कि यीशु ने मिस्र देश से एक प्रजा को बचाने के बाद विश्वास न करने वालों को नष्ट कर दिया।"
    - verse: 6
      text: "और जिन स्वर्गदूतों ने अपने अधिकार-क्षेत्र को बनाए नहीं रखा, बल्कि अपना निवास-स्थान छोड़ दिया, उन्हें उसने उस महान दिन के न्याय के लिए घोर अंधकार में अनंत बंधनों में रखा है।"
    - verse: 7
      text: "इसी तरह सदोम और अमोरा तथा उनके आसपास के नगरों ने भी इनकी तरह यौन अनैतिकता में अपने आपको दे दिया और पराए शरीर के पीछे चले। वे अनंत आग का दंड भोगते हुए एक उदाहरण के रूप में सामने रखे गए हैं।"
    - verse: 8
      text: "फिर भी ये स्वप्न देखने वाले लोग भी उसी प्रकार शरीर को अशुद्ध करते, प्रभुता को ठुकराते और महिमामय प्राणियों की निंदा करते हैं।"
    - verse: 9
      text: "लेकिन प्रधान स्वर्गदूत मीकाएल ने, जब मूसा के शरीर के विषय में इब्लीस से विवाद कर रहा था, तब उसके विरुद्ध निंदा भरा फैसला सुनाने का साहस नहीं किया, बल्कि कहा, \"प्रभु तुझे डाँटे!\""
    - verse: 10
      text: "लेकिन ये लोग उन बातों की निंदा करते हैं जिन्हें वे जानते ही नहीं। और जिन बातों को वे बिना बुद्धि वाले पशुओं की तरह स्वाभाविक रूप से जानते हैं, उन्हीं के द्वारा वे नष्ट हो जाते हैं।"
    - verse: 11
      text: "उन पर हाय! वे कैन के मार्ग पर चले, लाभ के लिए बिलाम के भटकाव में बेकाबू होकर दौड़े और कोरह के विद्रोह में नष्ट हो गए।"
    - verse: 12
      text: "ये तुम्हारे प्रेम-भोजों में छिपी चट्टानें हैं। वे तुम्हारे साथ भोज करते हुए बिना किसी भय के केवल अपने आपको ही चराते हैं। वे बिना पानी के बादल हैं, जिन्हें हवाएँ उड़ा ले जाती हैं; पतझड़ के फलहीन पेड़ हैं, जो दो बार मर चुके और जड़ से उखाड़े गए हैं।"
    - verse: 13
      text: "वे सागर की उग्र लहरें हैं, जो अपनी लज्जाओं का झाग उछालती हैं; भटकते तारे हैं, जिनके लिए घोर अंधकार सदा के लिए रखा गया है।"
    - verse: 14
      text: "आदम से सातवीं पीढ़ी के हनोक ने भी इनके विषय में भविष्यवाणी करते हुए कहा, \"देखो, प्रभु अपने हजारों-हजार पवित्र जनों के साथ आया,"
    - verse: 15
      text: "ताकि वह सबका न्याय करे और सभी भक्तिहीन लोगों को उनके सभी भक्तिहीन कामों के लिए दोषी ठहराए, जिन्हें उन्होंने भक्तिहीन रीति से किया, और उन सभी कठोर बातों के लिए भी, जो भक्तिहीन पापियों ने उसके विरुद्ध कही हैं।\""
    - verse: 16
      text: "ये लोग कुड़कुड़ाने और शिकायत करने वाले हैं। वे अपनी अभिलाषाओं के अनुसार चलते हैं। उनका मुँह घमंड की बड़ी-बड़ी बातें करता है, और वे अपना लाभ पाने के लिए लोगों की चापलूसी करते हैं।"
    - verse: 17
      text: "लेकिन प्रिय लोगो, उन बातों को याद रखो जो हमारे प्रभु यीशु मसीह के प्रेरितों ने पहले कही थीं।"
    - verse: 18
      text: "उन्होंने तुमसे कहा था, \"अंतिम समय में उपहास करने वाले होंगे, जो अपनी भक्तिहीन अभिलाषाओं के अनुसार चलेंगे।\""
    - verse: 19
      text: "ये वही लोग हैं जो फूट डालते हैं। वे सांसारिक स्वभाव के हैं और उनमें आत्मा नहीं है।"
    - verse: 20
      text: "लेकिन प्रिय लोगो, तुम अपने सबसे पवित्र विश्वास की नींव पर अपने जीवन का निर्माण करते जाओ और पवित्र आत्मा में प्रार्थना करते रहो।"
    - verse: 21
      text: "अपने आपको परमेश्वर के प्रेम में रखो और अनंत जीवन के लिए हमारे प्रभु यीशु मसीह की दया की प्रतीक्षा करते रहो।"
    - verse: 22
      text: "जो संदेह में हैं, उन पर दया करो।"
    - verse: 23
      text: "कुछ लोगों को आग में से छीनकर बचाओ, और कुछ पर भय के साथ दया करो; शरीर से दागदार कुर्ते तक से घृणा करो।"
    - verse: 24
      text: "अब जो तुम्हें ठोकर खाने से बचाने और अपनी महिमा के सामने बड़े आनंद के साथ निर्दोष खड़ा करने में समर्थ है,"
    - verse: 25
      text: "हमारे प्रभु यीशु मसीह के द्वारा उस एकमात्र परमेश्वर, हमारे उद्धारकर्ता की महिमा, प्रताप, प्रभुता और अधिकार सभी युगों से पहले, अब और सदा-सर्वदा बने रहें। आमीन।"
